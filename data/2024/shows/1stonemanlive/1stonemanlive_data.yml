- postinstagram:
    id: C9rwnPPpPTP
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-07-21
    text: |-
      2024.07.20
      
      NEK! 1ST ONE MAN LIVE @ дёӢеҢ—жІўSHELTER
      
      жҳЁж—Ҙз„ЎдәӢгҖҒзөӮдәҶгҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒпјҒпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶж§ҳжң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹвқӨпёҸвҖҚрҹ”Ҙ
      
      еҲқгӮҒгҒ«е®ўеёӯгӮ’иҰӢгҒҰжҖқгҒЈгҒҹгҒ“гҒЁгҒҜгҖҒгҖҒдәәеӨҡгҒЈпјҒпјҒпјҒ
      гҒ“гӮҢгҒ гҒ‘еӨҡгҒҸгҒ®ж–№гҒҢNEK!гҒ®йҹігӮ’иҒҙгҒҚгҒ«SHELTERгҒ«йӣҶгҒҫгҒЈгҒҰгҒҸгӮҢгҒҹгӮ“гҒ гҒЁжҖқгҒҶгҒЁгҒҷгҒ”гҒҸж„ҹж…Ёж·ұгҒӢгҒЈгҒҹгҒ§гҒҷгҖӮ
      жӣІгҒҢе§ӢгҒҫгӮӢгҒЁгӮӨгғӨгғўгғӢгӮ’йҖҡгӮҠи¶ҠгҒ—гҒҰиҖігҒ«еұҠгҒҸгҒҸгӮүгҒ„еӨ§гҒҚгҒӘеЈ°гӮ’еҮәгҒ—гҒҰгҒҸгӮҢгҒҰгҒҰгӮҒгҒЎгӮғгӮҒгҒЎгӮғе¬үгҒ—гҒӢгҒЈгҒҹгғјпјҒ
      
      еҪ“ж—ҘгҒ©гӮ“гҒӘе®ўеёӯгҒҢиҰӢгӮүгӮҢгӮӢгҒ®гҒ гӮҚгҒҶпјҹгҒЈгҒҰжғіеғҸгҒ—гҒӘгҒҢгӮүж—ҘгҖ…з·ҙзҝ’гҒ—гҒҰгҒҹгҒ‘гҒ©гҖҒSHELTERгҒ«гҒ„гӮӢе…Ёе“ЎгҒ®з¬‘йЎ”гҒҢгӮӯгғ©гғғгӮӯгғ©ијқгҒ„гҒҰгҒҰгҖҒжғіеғҸгӮҲгӮҠдҪ•еҖҚгӮӮдҪ•еҚҒеҖҚгӮӮзҙ ж•өгҒӘе…үжҷҜгҒ§гҒ—гҒҹрҹҘ№
      
      иүІгҖ…гҒӘгӮўгғјгғҶгӮЈгӮ№гғҲгҒ•гӮ“гҒ®жҘҪжӣІгӮ’гӮ«гғҗгғјгҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҹгӮҠ(иҒ–ең°гҒ§гҒјгҒ–гӮҚгҒ§гҒҚгҒҹгҒ®е¬үгҒ—гҒӢгҒЈгҒҹгҒӘ^^)гҖҒжҝҖгғ гӮәж–°жӣІгӮӮжҠ«йңІгҒ—гҒҹгӮҠгҖҒд»ҠгҒҫгҒ§гӮ„гҒЈгҒҰгҒҚгҒҹгғ©гӮӨгғ–гҒ®дёӯгҒ§гҒ„гҒЎгҒ°гӮ“гҒ®жҘҪжӣІж•°гҒ§и¶…жҘҪгҒ—гҒӢгҒЈгҒҹпјҒпјҒпјҒ
      
      гҒҫгҒҹMCдёӯгҒ«гӮӮзҷәиЎЁгҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҹгҒ®гҒ§гҒҷгҒҢгҖҒ11/24(ж—Ҙ)гҒ«2ND ONE MAN LIVEгӮ’Shibuya eggmanгҒ•гӮ“гҒ§гӮ„гӮүгҒӣгҒҰгҒ„гҒҹгҒ гҒҸгҒ“гҒЁгҒ«гҒӘгӮҠгҒҫгҒ—гҒҹпјҒпјҒрҹҳӯвңЁ
      еҲқгғ©гӮӨгғ–гҒ®гҒЁгҒҚгҒӢгӮүе№ҫеәҰгҒЁгҒӘгҒҸеҮәжј”гҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҰгҒ„гӮӢeggmanгҒ•гӮ“гҒ§гғҜгғігғһгғігғ©гӮӨгғ–гӮ’й–ӢеӮ¬гҒ§гҒҚгӮӢгҒ“гҒЁгҖҒеҝғгҒӢгӮүе¬үгҒ—гҒ„гҒ§гҒҷгҖӮи©ізҙ°гҒҜгҒҫгҒҹеҫҢж—ҘгҒ”жЎҲеҶ…гҒ—гҒҫгҒҷгҒ®гҒ§гҒҠжҘҪгҒ—гҒҝгҒ«вҳәпёҸ
      
      1st EP гҖҢEXCLAMAT!ONгҖҚгҒ®гғӘгғӘгғјгӮ№гҒЁгҖҢMAZEгҖҚгҒ®Music Videoгғ•гғ«е…¬й–ӢгӮӮгҒҠжҘҪгҒ—гҒҝгҒ«рҹ«¶рҹҸ»(гҒӮгҒЁ3ж—ҘгҒ гҒӯпјҒгӮҸгҒҸгӮҸгҒҸпјҒ)
      
      NEK!гҒҜж—…гӮ’е§ӢгӮҒгҒҹгҒ°гҒӢгӮҠгҒ§гҒҷгҒҢгҖҒгҒ“гӮҢгҒӢгӮүгӮӮж–°гҒ—гҒ„жҷҜиүІгӮ’гҒҹгҒҸгҒ•гӮ“иҰӢгҒҰгҒ„гҒҚгҒҹгҒ„пјҒпјҒзҡҶгҒ•гӮ“гҒ®еҝңжҸҙгҒҢгӮЁгғҚгғ«гӮ®гғјгҒЁгҒӘгӮҠйҖІгҒҝз¶ҡгҒ‘гӮӢгҒ“гҒЁгҒҢгҒ§гҒҚгҒҫгҒҷгҖӮеј•гҒҚз¶ҡгҒҚеҝңжҸҙгӮҲгӮҚгҒ—гҒҸгҒҠйЎҳгҒ„гҒ—гҒҫгҒҷрҹ”Ҙ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #дёӢеҢ—жІўshelter
    translation: |-
      2024.07.20
      
      NEK! 1ST ONE MAN LIVE @ Shimokitazawa SHELTER
      
      It ended successfully yesterday!!!
      To everyone who came, thank you so muchвқӨпёҸвҖҚрҹ”Ҙ
      
      The first thing I thought when I saw the audience was... so many people!!!
      Thinking that this many people gathered at SHELTER to hear NEK!'s sound made me really emotional.
      When the songs started, I was so happy to hear voices so loud they reached my ears right through my in-ear monitors!
      
      I practiced every day while imagining what the audience would look like that day, but everyone's smiles at SHELTER were sparkling so brightlyвҖ”it was a scene tens of times more wonderful than I imaginedрҹҘ№
      
      We covered songs from various artists (I was happy to play Bocchi the Rock at the holy land ^^), performed a super difficult new song, and it was the most songs we've ever played in a live show, so it was tons of fun!!!
      
      Also, as announced during the MC, we will be holding our 2ND ONE MAN LIVE at Shibuya eggman on 11/24 (Sun)!!рҹҳӯвңЁ
      I'm sincerely happy to be able to hold a one-man live at eggman, a place we've performed at many times since our first live. Details will be provided at a later date, so please look forward to itвҳәпёҸ
      
      Please also look forward to the release of our 1st EP "EXCLAMAT!ON" and the full Music Video release for "MAZE"рҹ«¶рҹҸ» (3 days left! So excited!)
      
      NEK! has only just begun its journey, but I want to keep seeing many new sights from here on!! Your support becomes our energy and allows us to keep moving forward. Please continue to support usрҹ”Ҙ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #ShimokitazawaSHELTER
