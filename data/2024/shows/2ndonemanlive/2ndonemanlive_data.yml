- postinstagram:
    id: DCxucmfvDog
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-11-25
    text: |-
      2024.11.24
      
      「NEK! 2ND ONE MAN LIVE」@ Shibuya eggman
      お越しいただいた皆様本当にありがとうございました！⚡️
      
      今年の3月7日に初ライブをやらせていただいたNEK!始まりの地Shibuya eggmanで、今までの活動を通して出会えた多くのファンの皆さんと一緒にワンマンライブを楽しめたこと、本当に心から嬉しかった🥲❤️‍🔥
      
      NEK!お馴染みの楽曲たちはもちろん、新たに2曲初披露、そして老若男女みんなに愛されてきた楽曲を4曲カバーさせていただいて、、この日のためにメンバーで一生懸命準備してきたことをやっとファンの皆さんにお届けできてほっとしました☺️
      
      初披露したのはBlinkに続く哀愁漂うバラード曲と、めちゃくちゃ激しい見せ場盛りだくさんの骨太ロックという完全正反対の2曲！これからもやっていくので、昨日来れなかった方はぜひ聴ける日を楽しみにしててくださいねー！
      
      カバーは、昔から大好きで個人チャンネルにも叩いてみた動画を載せたことがあるエルレのジターバグと、Hikaの歌声に合いそうだなと密かにずっと思ってて、いつかカバーしてみたかったレベッカのフレンズを私からはリクエストさせていただいて、大好きなNEK!メンバーと一緒に大好きな曲をやれて本当に幸せでした！！！！
      他にもアヴリルのSk8er Boiでみんなで飛び跳ねたり、モンパチのあなたにで大合唱したり、もうとにかく楽しすぎた笑
      
      どの曲もイントロをやってるときファンの皆さんの「これ来たか、、、！！」みたいな表情が観てて面白かった😂
      
      MAZEやGet Overはもちろん大盛り上がりで、かなり大圧縮起きてたけど前の方にいたお客さんたち大丈夫だったかな？？ワンマンならではの一体感が最っっ高に熱かったね🔥
      
      あ、そうだそうだ、昨日から新グッズも販売開始しまして、みんな早速ゲットしてくれてて嬉しかったです！
      アンコールではメンバー全員でNEKI_SOUNDTを着たよ💫
      ぜひみんなで一緒にお揃いしましょー！
      
      情報盛りだくさんですが、他にも新曲Dreams!!!!の配信が12/11(水)0:00に決定しました🎉
      ライブに来てくれている方はわかると思いますが、いつも最後にやっている"あの曲"です！！笑
      ライブの多幸感がそのまま伝わってくるハッピーでキャッチーな楽曲になっているので、まだ聴いたことない方もぜひ楽しみにしててくださいね🤘🏻🌟
      
      NEK!はこれからもノンストップで駆け抜けていきます！！みんなでいろんな景色を見ていきたいな🔥
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #neki2ndonemanlive
    translation: |-
      2024.11.24
      
      "NEK! 2ND ONE MAN LIVE" @ Shibuya eggman
      To everyone who came, thank you so much! ⚡️
      
      At Shibuya eggman, the place where NEK! started with our first live on March 7th of this year, I was truly, sincerely happy to be able to enjoy a one-man live together with so many fans we've met through our activities so far 🥲❤️‍🔥
      
      Of course we played the familiar NEK! songs, but we also premiered 2 new songs and covered 4 songs loved by people of all ages... I'm so relieved we could finally deliver what the members worked so hard to prepare for this day to all the fans ☺️
      
      The two songs we premiered were completely opposite: a melancholy ballad following "Blink," and a heavy rock song with tons of intense highlights! We'll keep playing them, so if you couldn't make it yesterday, please look forward to the day you can hear them!
      
      For the covers, I requested ELLEGARDEN's "Jitterbug," which I've loved for a long time and even posted a drum cover of on my personal channel, and REBECCA's "Friends," which I'd secretly always thought would suit Hika's voice and wanted to cover someday. I was so happy to play my favorite songs with my favorite NEK! members!!!!
      Besides those, jumping around with everyone to Avril's "Sk8er Boi" and the big sing-along to Mongol800's "Anata ni" was just too much fun lol
      
      It was funny watching the fans' expressions during the intros of every song, like they were thinking, "Here it comes...!!" 😂
      
      "MAZE" and "Get Over" were obviously huge hits, and there was quite a lot of crowding at the front—I hope the people up there were okay?? That unity unique to a one-man live was the abso-lute hottest 🔥
      
      Oh, that's right, new merch went on sale starting yesterday, and I was happy to see everyone grabbing it right away!
      All the members wore the NEKI_SOUNDT during the encore 💫
      Let's all match together!
      
      There's a lot of info, but the digital release of the new song "Dreams!!!!" has been set for 12/11 (Wed) 0:00 🎉
      If you've been to our lives, you'll know it's "that song" we always play at the end!! lol
      It's a happy, catchy song that conveys the euphoria of a live show exactly as it is, so even if you haven't heard it yet, please look forward to it 🤘🏻🌟
      
      NEK! will keep running non-stop from here on out!! I want to see many different sights together with everyone 🔥
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #neki2ndonemanlive
