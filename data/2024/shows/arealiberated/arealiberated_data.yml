- postinstagram:
    id: C5Z3flFR4W9
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-04-06
    text: |-
      2024.04.05
      
      SHIBUYA THE GAME PRESENTS『Area Liberated』
      
      お越しいただいた皆様ありがとうございました！！
      初めての箱で、初めましての出演者さんたちに囲まれてのワクワクドキドキの1日でした❤️‍🔥
      課題もたっっっくさん見つかってやる気もたっっっくさん出たので、明日からまた全力で頑張っていきます！！
      
      次回は4/9(火)のGirl's UP!!! vol.350 @ Shibuya eggman
      渾身の爆音を準備してお待ちしております😌🚿‪🎶‬
      
      #neki #nekiband #girlsband #girldrummer #femaledrummer #shibuyathegame #arealiberated
    translation: |-
      2024.04.05
      
      SHIBUYA THE GAME PRESENTS "Area Liberated"
      
      Thank you to everyone who came!!
      It was an exciting and thrilling day, as it was our first time at this venue and we were surrounded by performers we were meeting for the first time ❤️‍🔥
      We found a tonnnn of things to work on and got a tonnnn of motivation, so we will keep giving it our all starting tomorrow!!
      
      Next time will be 4/9 (Tue) for Girl's UP!!! vol.350 @ Shibuya eggman
      We are preparing our maximum explosive sound and waiting for you 😌🚿‪🎶‬
      
      #neki #nekiband #girlsband #girldrummer #femaledrummer #shibuyathegame #arealiberated
