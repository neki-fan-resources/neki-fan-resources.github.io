- postinstagram:
    id: C8mlPbtpUHu
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-06-24
    text: |-
      2024.06.24
      
      гҖҢBeyond The Singularity vol.6гҖҚгҒ«еҮәжј”гҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒ
      иҰігҒ«жқҘгҒҰгҒҸгҒ гҒ•гҒЈгҒҹзҡҶж§ҳгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹвҡЎпёҸ
      
      еҲқз®ұгҒ®еҲқеҸ°DOORSгҒ•гӮ“пјҒй§…гҒӢгӮүгӮҒгҒЈгҒЎгӮғиҝ‘гҒҸгҒҰжңҖй«ҳгҒ§гҒ—гҒҹпјҒпјҒгӮӮгҒЎгӮҚгӮ“йҹігӮӮз…§жҳҺгӮӮжңҖй«ҳгҒ§гҒ—гҒҹпјҒпјҒпјҒ
      
      зү©иІ©гҒӣгҒЈгҒӢгҒҸзҡҶгҒ•гӮ“гҒЁгҒҠи©ұгҒ§гҒҚгӮӢж©ҹдјҡгҒӘгҒ®гҒ«д»ҠеӣһгҒҜгҒҠдј‘гҒҝгҒ—гҒҰгҒ—гҒҫгҒЈгҒҰгҒҷгҒҝгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹрҹҘІ
      гҒҫгҒҹд»Ҡж—ҘгҒ®еҲҶгӮӮд»ҠеәҰгҒ®зү©иІ©гҒ§гҒҠи©ұгҒ—гҒҫгҒ—гӮҮгҒҶгҒӯгғјпјҒ
      
      ж¬ЎеӣһгҒҜ7/1(Mon)гҖҒShibuya eggmanгҒ®гҖҢGirl's UP!!! vol.357гҖҚгҒ§еҫ…гҒЈгҒҰгҒҫгҒҷрҹ‘ӢрҹҸ»
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.06.24
      
      We performed at "Beyond The Singularity vol.6"!
      Thank you to everyone who came to watchвҡЎпёҸ
      
      Our first time at Hatsudai DOORS! It was super close to the station, which was great!! Of course, the sound and lighting were awesome too!!!
      
      I'm sorry I had to miss the merch booth session this time, even though it's a precious chance to talk with you allрҹҘІ
      Let's make up for today and talk at the next merch session!
      
      Next time is 7/1 (Mon), waiting for you at "Girl's UP!!! vol.357" at Shibuya eggmanрҹ‘ӢрҹҸ»
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
