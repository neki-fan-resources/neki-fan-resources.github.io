- postinstagram:
    id: C8PVZAzpNQG
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-06-15
    text: |-
      2024.06.15
      
      CODE OF ZERO X 東名阪TOUR@ 下北沢ReGに出演いたしました！
      お越しくださった皆様ありがとうございました🙏🏻🔥
      フロアは今日も激アツだったねー！！初モッシュも起こってて嬉しかったです。体張ってくれてありがとう笑
      
      今回ツアーに呼んでくださったCODE OF ZERO Xさん本当にありがとうございました！
      
      次回のライブは明後日Girl's UP!!! vol.356！Shibuya eggmanでお待ちしております👋🏻
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.06.15
      
      We performed at CODE OF ZERO X Tomeihan TOUR @ Shimokitazawa ReG!
      Thank you to everyone who came!!🙏🏻🔥
      The floor was super hot again today!! I was happy to see the first mosh pit happening. Thanks for putting your bodies on the line lol
      
      Thank you so much to CODE OF ZERO X for inviting us on this tour!
      
      The next live is the day after tomorrow, Girl's UP!!! vol.356! We'll be waiting for you at Shibuya eggman👋🏻
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
