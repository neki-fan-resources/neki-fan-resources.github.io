    id: DEOinT1vIHW
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-12-31
    text: |-
      2024.12.29
      
      「NEK! DEBUT YEAR LAST LIVE」無事終了しました！
      お越しくださった皆様本当にありがとうございました🔥
      
      8月19日に年内ラストワンマンをシャングリラでできることになっていつも応援してくれている皆さんにすぐお知らせしましたが、それと同時に、え…？あのキャパ埋められるのかな…？という不安も押し寄せていて、正直ここ数日までその不安は消えていませんでした。
      
      でもライブが始まり幕が開いた瞬間、その不安は嘘のように吹き飛びました。
      超満員のシャングリラ。どこを見ても私たちのファンで埋め尽くされている。
      
      これが私たちの見たかった景色だ、、と心から思いました。
      
      今まで私たちがやってきたライブハウスの中ではダントツで大きい会場だったので、こちらから見る景色はひとまわりもふたまわりも違って見えました。
      
      ライブ中、視線をどこに移しても今年ライブで幾度となくお会いしたファンの方たちと目が合って、まるで今年の走馬灯を観ている感覚に陥りました笑
      
      今年作った楽曲たち全曲やりましたが、どれもいい曲だな、、と改めて実感。
      私はプレイヤーとしてもリスナーとしてもNEK!の楽曲が大好きなので、演奏しているときの感情は幸せ以外の何物でもありません。
      
      ライブでは何度もやっているけどまだ音源化していない楽曲もたくさんあるから、今後のリリースを楽しみにしててもらえたら嬉しいです☺️
      
      定番の曲はもちろん、初披露の曲も盛り上がってくれてて嬉しかったです！
      MAZE前のセッションコーナーかっこよかったでしょ？😎
      
      今回のワンマンではアコースティックコーナーもやりました！
      moon、Blink、令現少女の3曲を披露させていただいたのですが、アコースティックver.としてみんなで話し合って元々の曲構成からアレンジを加えたりして、また一味違ったNEK!を楽しんでもらえたかな？と思っています。
      
      私実はカホンをやったことがなくて、今月から始めたので、色々おぼつかないところもあったと思うのですが、なんとか形になってよかったです😂
      みんなで目合わせて呼吸合わせて演奏するあの感じめっちゃ楽しかった〜！！またいつかできたらいいな🌿
      
      これは完全に個人的なことになってしまうのですが、実は一週間前から風邪を引いてしまっていて、熱は下がったけど鼻水がまだ止まらない状態でのライブだったので、MCとかも所々聴き取りにくい部分あったかもしれません、、！
      本当に申し訳ありませんでした🥲(ライブ中もずーっと鼻すすりまくってたからもしマイクに音乗っちゃってたら本当にすみません)
      
      毎年この時期になったら言ってるけど、体調管理って本当に大事だなというのを再確認しました！！プロドラマーたるもの体調管理は基本中の基本！！
      
      皆さんもまだまだ寒い日続くので健康第一でお過ごしくださいね(誰が言うてんねん)
      
      今年は人生でいちばんライブができた年でした。
      NEK!と出会えて、そしてNEK!を応援してくれるファンの方とも出会えて、最高に幸せな一年だったな。
      
      そして周りの方の支えがなくては一年間走りきることはできませんでした。本当にありがとうございます。今年も大変お世話になりました！！！
      
      こんな素敵な2024年の締めくくりとなる今回の年末ワンマン、皆さんのおかげで最高のライブとなりました！！本当にありがとう！！
      
      来年は更にバンドも個人も成長した姿を見せられるように頑張っていきますので、2025年もよろしくお願いいたします🐍🤍🔥
      
      それでは、良いお年をお迎えください！
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer 
      
      photo by @tm_livephoto
    translation: |-
      2024.12.29
      
      "NEK! DEBUT YEAR LAST LIVE" has successfully concluded!
      To everyone who came, thank you so much🔥
      
      On August 19th, when it was decided we could do our final one-man live of the year at Shangri-La, I immediately let all of you who always support us know. At the same time, I was hit by a wave of anxiety, thinking... Eh? Can we fill a venue that size...? To be honest, that anxiety didn't disappear until just a few days ago.
      
      But the moment the live started and the curtain opened, that anxiety was blown away like it was never there.
      A packed Shangri-La. No matter where I looked, it was filled with our fans.
      
      I thought from the bottom of my heart, "This is the view we wanted to see..."
      
      Since it was by far the largest venue among the live houses we've played at so far, the scenery from our side looked completely different.
      
      During the live, no matter where I moved my gaze, I locked eyes with fans I've met countless times at shows this year, and it felt like I was watching a revolving lantern of this year's memories lol.
      
      We played every single song we created this year, and I realized once again what great songs they are.
      As both a player and a listener, I love NEK!'s music so much that my emotions while performing are nothing but happiness.
      
      There are many songs we've played live many times but haven't officially released yet, so I'd be happy if you look forward to future releases☺️
      
      I was glad that the standard songs, as well as the newly debuted ones, were so exciting!
      The session corner before MAZE was cool, wasn't it?😎
      
      We also did an acoustic corner for this one-man live!
      We performed three songs—moon, Blink, and Reigen Shoujo. As an acoustic version, we all discussed it and added arrangements to the original song structures. I hope you were able to enjoy a slightly different flavor of NEK!.
      
      Actually, I had never played the cajon before and only started this month, so I think there were some shaky parts, but I'm glad it took shape somehow😂
      That feeling of making eye contact and breathing together while performing was so much fun!! I hope we can do it again someday🌿
      
      This is a completely personal matter, but I actually caught a cold a week ago. Although my fever went down, I was performing with a runny nose that wouldn't stop, so there might have been parts of the MC that were hard to hear...!
      I am truly sorry🥲 (I was sniffing the whole time during the live, so I'm really sorry if that sound got picked up by the mic.)
      
      I say this every year around this time, but I reconfirmed that health management is truly important!! For a professional drummer, health management is the most basic of basics!!
      
      Everyone, the cold days will continue, so please prioritize your health (look who's talking).
      
      This year was the year I was able to play the most lives in my life.
      Meeting NEK!, and meeting the fans who support NEK!, it was a supremely happy year.
      
      And I wouldn't have been able to run through this year without the support of those around me. Thank you truly. You've been a great help this year!!!
      
      This year-end one-man live, which serves as a wonderful conclusion to 2024, became the best show thanks to all of you!! Thank you truly!!
      
      Next year, I will do my best so that I can show you how much both the band and I have grown, so please look forward to working with us in 2025 too🐍🤍🔥
      
      Well then, have a happy new year!
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer 
      
