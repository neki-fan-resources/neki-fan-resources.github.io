- postinstagram:
    id: DC_uUelvxBs
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-11-30
    text: |-
      2024.11.27
      
      「Diggin’ Sound vol.2」に出演いたしました⚡️
      お越しくださった皆様ありがとうございました！！
      
      初めて訪れた下北沢 近道さん、あちこちお洒落でとても落ち着く空間でした〜！
      まんまるの照明も月みたいで可愛かった🌕
      
      「いつか下北のライブハウスを制覇したい」ってNEK!が初めて下北でライブやったときにMCで話したんだけど、こうやって新しい会場でやらせてもらうと少しずつその夢に近づいていっている感じがしてすごく嬉しいです🥹
      
      これからもいろんなライブハウスと出会ってそれぞれの空気感を楽しんでいきたいな〜！！
      
      今回の対バンライブは同世代の演者さんがたくさんいて、みんな頑張ってるな〜私も頑張らないとな〜と自然と気合い注入されました😌🔥
      
      やっぱりバンドってそれぞれの良さがあるけど、NEK!はNEK!らしく、NEK!のペースでNEK!にしか出せない良さを伸ばしていけたなと🌱
      
      これからも応援よろしくお願いします！
      
      (最後のはかなでん帰った後に撮ったので不在です😢sorry)
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.11.27
      
      We appeared in "Diggin’ Sound vol.2" ⚡️
      Thank you to everyone who came!!
      
      Shimokitazawa Chikamichi, which I visited for the first time, was a very relaxing space with stylish touches everywhere!
      The round lighting was also cute, like the moon 🌕
      
      During NEK!'s first live in Shimokitazawa, we said in our MC that "we want to conquer the live houses in Shimokita someday," and getting to play at a new venue like this makes me so happy because it feels like we're getting closer to that dream bit by bit 🥹
      
      I want to keep encountering various live houses and enjoying their unique atmospheres!!
      
      This battle-of-the-bands live had many performers from the same generation, which naturally fired me up, thinking "everyone is working so hard—I have to work hard too" 😌🔥
      
      Every band has its own strengths, but I want NEK! to stay true to NEK!, and at NEK!'s own pace, develop the unique qualities that only NEK! can produce 🌱
      
      Please keep supporting us!
      
      (Kanaden had already left when the last photo was taken, so she's missing 😢 sorry)
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
