- postinstagram:
    id: C9eMEN7RVZV
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-07-16
    text: |-
      2024.07.15
      
      「彪presents Drive You Crazy vol.7」@ 両国SUNRISEに出演させていただきました！
      見に来てくださった皆様ありがとうございました⚡️
      
      今回はEPにも収録している新曲ENDLESS GAMEの解禁もあって、それに伴い初めて同期を使用したドキドキワクワクだらけのライブとなりました！！(同期出しは私のお仕事なので失敗しないかヒヤヒヤしたけど無事ノーミスで終われました😂)
      
      今回たくさん海外からのお客様が来てくださって、皆肩組みながら満面の笑みで見てくれてて、ピースフルなフロアで激アツ＆最高でした✌🏻🔥
      物販にも多くの方が寄ってくださって、タオルもTシャツ全サイズも完売してしまうという事態…！せっかく並んでくれていたのに買えなかった方ごめんなさい🥲🙏🏻
      
      次回はとうとう今週末に迫ってきました下北沢SHELTERさんでの初ワンマン！！！！準備たくさんしてるよ〜〜
      来れる方は楽しみにしててくださいね❤️‍🔥
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.07.15
      
      We performed at "Aya presents Drive You Crazy vol.7" @ Ryogoku SUNRIZE!
      Thank you to everyone who came to see us⚡️
      
      This time we premiered our new song "ENDLESS GAME," which is also on the EP, and with that came our first live using backing tracks, so it was full of excitement and nerves!! (Starting the tracks is my job, so I was worried about making a mistake, but I finished without any errors😂)
      
      We had many guests from overseas today, and seeing everyone watching with big smiles while putting their arms around each other's shoulders made for a peaceful floor that was super hot and the best✌🏻🔥
      So many people stopped by the merch booth that our towels and all T-shirt sizes sold out...! I'm so sorry to those who lined up but couldn't buy anything🥲🙏🏻
      
      The next one is finally our first solo show at Shimokitazawa SHELTER coming up this weekend!!!! We're doing so much prep~~
      For those coming, please look forward to it❤️‍🔥
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
