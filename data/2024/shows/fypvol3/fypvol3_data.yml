- postinstagram:
    id: C-MVV08Jo2T
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-08-03
    text: |-
      2024.08.02
      
      #FYPгҖҺFor You PlaceгҖҸvol.3 @ SHIBUYA THE GAME
      гҒ«гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶгҒ•гҒҫгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹпјҒпјҒ
      
      NEK!еҲқгҒ®гғҲгғӘгӮ’еӢҷгӮҒгҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒҚгҖҒж„ҹз„ЎйҮҸгҒ§гҒ—гҒҹрҹҘІвңЁ
      THE GAMEгҒ•гӮ“гҒҜ3еәҰзӣ®гҒ®еҮәжј”гҒ«гҒӘгӮӢгҒ®гҒ§гҒҷгҒҢгҖҒжҜҺеӣһгҒ„гӮҚгӮ“гҒӘгӮёгғЈгғігғ«гҒ®жј”иҖ…гҒ•гӮ“гҒҹгҒЎгҒЁе…ұжј”гҒҷгӮӢгҒ®гҒ§гҒ„гҒӨгӮӮж–°й®®гҒӘж°—жҢҒгҒЎгҒ§жҢ‘гӮ“гҒ§гҒ„гҒҫгҒҷрҹ”Ҙ
      
      гӮ№гғҶгӮЈгғғгӮҜгҒҜе®ҷгҒ«иҲһгҒҶгҒ—гҖҒеҗҢжңҹгӮӮиүІгҖ…гҒЁе•ҸйЎҢзҷәз”ҹгҒҷгӮӢгӮҸгҒ§зөӮе§ӢгғҗгғғгӮҝгғҗгӮҝгҒӘз§ҒгҒ§гҒ—гҒҹгҒҢз¬‘гҖҒгҒқгҒҶгҒ„гҒҶгғҸгғ—гғӢгғігӮ°гӮӮгғ©гӮӨгғ–гҒ®йҶҚйҶҗе‘ігҒ пјҒгҒЁж„ӣгҒҠгҒ—гҒҸжҖқгҒ„жҳҮиҸҜгҒ—гӮҲгҒҶгҒЁжҖқгҒ„гҒҫгҒҷрҹҳӮ
      
      жқҘйҖұгҒҜе®Ңз’§гҒ«д»•дёҠгҒ’гҒҰгҒҠеұҠгҒ‘гҒ§гҒҚгӮӢгӮҲгҒҶй ‘ејөгӮӢгӮҲгғјпјҒпјҒпјҒз¬‘
      8/8(Thu)гҖҢгғҸгғ”гӮігғ¬!! vol.530гҖҚ@ е…ӯжң¬жңЁunravel tokyoгҒ§еҫ…гҒЈгҒҰгҒҫгҒҷрҹ‘ӢрҹҸ»
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.08.02
      
      Thank you to everyone who came to #FYP "For You Place" vol.3 @ SHIBUYA THE GAME!!
      
      It was an overwhelming feeling to serve as the headliner for the first time as NEK!рҹҘІвңЁ
      This was our third time performing at THE GAME, but since we co-star with performers of various genres every time, I always go into it with a fresh mindsetрҹ”Ҙ
      
      My sticks were flying through the air, and various issues popped up with the backing tracks, so I was in a total frantic rush from start to finish lol, but I'll try to embrace those kinds of mishaps as the real thrill of a live show and turn them into something positive!рҹҳӮ
      
      I'll do my best to make next week perfect for you guys!!! lol
      I'll be waiting for you on 8/8 (Thu) at "Hapikore!! vol.530" @ Roppongi unravel tokyoрҹ‘ӢрҹҸ»
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
