- postinstagram:
    id: DAOPx7cT2s9
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-09-22
    text: |-
      2024.09.19
      
      #FYPгҖҺFor You PlaceгҖҸvol.5 @ SHIBUYA THE GAME
      гҒ«еҮәжј”гҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶгҒ•гӮ“гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹпјҒ
      
      е°‘гҒ—гғҗгӮҝгғҗгӮҝгҒ—гҒҰгҒҰжӣҙж–°йҒ…гҒҸгҒӘгҒЈгҒЎгӮғгҒЈгҒҹрҹҘІрҹҷҸрҹҸ»
      
      д»ҠеӣһгҒҜENDLESS GAMEгҒЁгҒӢLonerгҒЁгҒӢгҖҒжңҖиҝ‘гҒ§гҒҚгҒҹжӣІгҒҜгӮ„гӮүгҒҡгҒ«гҖҒе°‘гҒ—еүҚгҒ®гғ©гӮӨгғ–гҒ§гӮ„гҒЈгҒҰгҒҹгҒҝгҒҹгҒ„гҒӘгӮ»гғҲгғӘгҒ«гҒ—гҒҰгҒҝгҒҫгҒ—гҒҹпјҒгҒҹгҒҫгҒ«гҒҜеҲқеҝғгҒ«жҲ»гӮӢгҒ®гӮӮеӨ§еҲҮгҒ гҒӯрҹҳҢ(дҪ•е№ҙгҒӢзөҢгҒЈгҒҰгӮӮгҒЈгҒЁжҘҪжӣІеў—гҒҲгҒҹгӮүгӮҲгӮҠеј·гҒҸж„ҹгҒҳгҒқгҒҶ)
      
      гҒӮгҒЁжңҖиҝ‘гҒ®гғ©гӮӨгғ–гҒ§еј·гҒҸж„ҹгҒҳгӮӢгҒ®гҒҜгҖҒгҒҠе®ўгҒ•гӮ“гҒҹгҒЎгҒ®гғҺгғӘж–№гҒҢж—ҘгҒ«ж—ҘгҒ«еҖӢжҖ§еҮәгҒҰгҒҚгҒҰгӮҒгҒЈгҒЎгӮғжҘҪгҒ—гҒ„пјҒз¬‘
      йҰ–гӮ„гҒЈгҒЎгӮғгҒҶгӮ“гҒҳгӮғгҒӘгҒ„вҖҰпјҒпјҹгҒЈгҒҰгҒҸгӮүгҒ„гҒҡгҒЈгҒЁжҝҖгҒ—гҒҸй ӯжҢҜгҒЈгҒҰгҒҸгӮҢгҒҰгӮӢж–№гӮӮгҒ„гӮҢгҒ°гҖҒи»ҪгҒҸгғўгғғгӮ·гғҘгҒҝгҒҹгҒ„гҒӘгҒ®гҒҢиө·гҒҚгҒҰгҒ„гҒҹгӮҠгҖҒгҒҠе®ўгҒ•гӮ“гӮӘгғӘгӮёгғҠгғ«гҒ®гҒҫгҒңгҒҫгҒңгғҖгғігӮ№гӮ’гҒ—гҒҰгҒҸгӮҢгҒҰгӮӢж–№гҒЁгҒӢгӮӮгҒ„гҒҰгҖҒгҖҒ
      жң¬жқҘгҒҜз§ҒгҒҹгҒЎгҒҢзҡҶгҒ•гӮ“гҒ®гҒ“гҒЁгӮ’жҘҪгҒ—гҒҫгҒӣгӮӢеҒҙгҒӘгҒ®гҒ§гҒҷгҒҢгҖҒжӯЈзӣҙз§ҒгҒҜзҡҶгҒ•гӮ“гҒ«гӮҒгҒЈгҒЎгӮғжҘҪгҒ—гҒҫгҒӣгҒҰгӮӮгӮүгҒЈгҒҰгҒҫгҒҷрҹҳӮ
      гҒ“гӮҢгҒӢгӮүгӮӮиҮӘз”ұгҒ«гғ©гӮӨгғ–гӮ’жҘҪгҒ—гӮ“гҒ§гҒ„гҒЈгҒҰгҒҸгҒ гҒ•гҒ„гҒӯрҹӨқрҹҸ»
      
      ж¬ЎеӣһгҒ®гғ©гӮӨгғ–гҒҜжҳҺеҫҢж—ҘгҒ®9/24гҖҢGirl's UP!!!vol.365гҖҚ
      @ Shibuya eggmanгҒ§гҒҷпјҒгҒҫгҒҹдёҖз·’гҒ«жҘҪгҒ—гҒҝгҒҫгҒ—гӮҮвқӨпёҸвҖҚрҹ”Ҙ
      
      вҖ»жңҖеҫҢгҒ®еҶҷзңҹгҒҜгҒӢгҒӘгҒ§гӮ“е…ҘгӮҠеүҚгҒ«ж’®гҒЈгҒҹгӮ„гҒӨгҒӘгҒ®гҒ§гҒӢгҒӘгҒ§гӮ“дёҚеңЁгҒ§гҒҷвҖҰпјҒпјҒжіЈ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer
    translation: |-
      2024.09.19
      
      We performed at
      #FYP "For You Place" vol.5 @ SHIBUYA THE GAME!
      Thank you to everyone who came!
      
      Things have been a bit hectic, so my update is lateрҹҘІрҹҷҸрҹҸ»
      
      This time, we didn't play "ENDLESS GAME" or "Loner" or any of the recent songs, and instead tried a setlist like the ones we used to do a little while back! It's important to go back to your roots once in a whileрҹҳҢ (I feel like I'll feel that even more strongly in a few years when we have more songs)
      
      Also, what I've been feeling strongly at recent lives is that the way the audience gets into it is becoming more unique every day, and it's so much fun! Lol
      There are people shaking their heads so hard I worry they'll hurt their necks...!? and others starting light mosh pits, or people doing their own original "Maze-Maze" dances...
      Originally, we are the ones supposed to be entertaining you, but honestly, I'm being entertained so much by all of youрҹҳӮ
      Please continue to enjoy the shows freelyрҹӨқрҹҸ»
      
      Our next live is the day after tomorrow, 9/24, "Girl's UP!!! vol.365"
      @ Shibuya eggman! Let's have fun together againвқӨпёҸвҖҚрҹ”Ҙ
      
      *The last photo was taken before Kanaden arrived, so she is missing...!! Crying
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer
