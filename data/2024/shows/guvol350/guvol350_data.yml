- postinstagram:
    id: C5kENsoBTkC
    account: natsu08_guitar
    label: Natsu's report
    info: deleted post
    published-date: 2024-04-10
    text: |-
      2024.04.09「Girl's UP!!! vol.350」@ Shibuya eggman
      
      ありがとうございました!
      
      フロアのお客さまの盛り上がりが凄くて楽しかったーー‼️‼️
      皆さんに負けないぐらいパフォーマンスができるように成長したい💪🏻
      そして、演奏面もね❤️‍🔥❤️‍🔥
      
      次はまたまたShibuya eggmanさんにて「Girl’s UP!!! vol.351」に出演させていただきます！
      またみなさまとお会いできますよーに!
      
      #neki #girlsband #ロックバンド
    translation: |-
      2024.04.09 "Girl's UP!!! vol.350" @ Shibuya eggman
      
      Thank you very much!
      
      The audience's excitement on the floor was amazing, and we had so much fun!! ‼️‼️
      I want to grow so that we can perform just as well as you all cheered 💪🏻
      And improve our playing too ❤️‍🔥❤️‍🔥
      
      Next, we will be performing at "Girl's UP!!! vol.351" at Shibuya eggman again!
      Hope to see you all again!
      
      #neki #girlsband #rockband
