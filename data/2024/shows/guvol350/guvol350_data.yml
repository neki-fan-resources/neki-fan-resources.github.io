- postinstagram:
    id: C5j_-YTxWES
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-04-10
    text: |-
      2024.04.09
      
      昨日、Girl's UP!!! Vol.350に出演させていただきました！
      いつにも増してフロアが盛り上がってくれていて、ステージから見ていて最高に楽しかったです❤️‍🔥
      
      とあるお客様からeggmanのフロアの中心にある柱はサークルをするための柱だと教えていただきました(本当かな？笑)
      いつか私たちNEK!のライブで皆さんがグルグル回る光景を見れたらいいな〜
      もっともっともっともっと激アツなライブができるよう頑張っていきます！！！
      
      これからも応援よろしくお願いします🔥
      
      次回は5/7(Tue) Girl's UP!!! Vol.351で待ってます！またね！
      
      #neki #nekiband #girlsband #shibuyaeggman #shibuya #eggman #girldrummer #femaledrummer
    translation: |-
      We performed at Girl's UP!!! Vol.350 yesterday!
      The floor was more energized than ever, and it was incredibly fun to see from the stage ❤️‍🔥
      
      One audience member told me that the pillar in the center of the eggman floor is for doing circles (is that true? lol)
      I hope to one day see everyone spinning around at a NEK! show~
      We will work hard to be able to put on even more, more, more, more intensely exciting live shows!!!
      
      Please continue to support us 🔥
      
      Next time, we'll be waiting for you at Girl's UP!!! Vol.351 on 5/7 (Tue)! See you then!
