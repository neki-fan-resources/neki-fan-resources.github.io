- postinstagram:
    id: C6rA8WmpOvY
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-05-07
    text: |-
      2024.05.07
      
      本日Girl's UP!!! Vol.351に出演させていただきました！
      お越しいただいた皆さんありがとうございましたー！
      新曲初披露したよ！盛り上がってくださって嬉しかったです🔥
      
      Ludwig様のブラックビューティーも初出動！！
      パー！っと弾けるような明るいサウンドで頑張ってくれました🌟
      
      次回は明後日5/9(Thu)今日と同じshibuya eggmanさんのGirl's UP!!!Vol.352です！気合い入れてお待ちしてます🤘🏻🔥
      
      #neki #nekiband #girlsband #japanesegirl #drum #drummer #girlsdrummer #femaledrummer #ludwigdrums #blackbeauty
    translation: |-
      2024.05.07
      
      We performed at Girl's UP!!! Vol.351 today!
      Thank you to everyone who came out!
      We debuted our new song! I was so happy you all got fired up for it🔥
      
      Ludwig's Black Beauty also made its first appearance!!
      It did a great job with a bright, popping sound🌟
      
      Next time is the day after tomorrow, 5/9 (Thu), at shibuya eggman for Girl's UP!!! Vol.352 just like today! We'll be waiting for you with full energy🤘🏻🔥
      
      #neki #nekiband #girlsband #japanesegirl #drum #drummer #girlsdrummer #femaledrummer #ludwigdrums #blackbeauty
