- postinstagram:
    id: C84kmPhJcnb
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-07-01
    text: |-
      2024.07.01
      
      жң¬ж—ҘгҖҒGirl's UP!!! vol.357гҒ«еҮәжј”гҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶж§ҳгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹрҹҢ»
      
      жңқгҒӢгӮүгӮёгғЎгӮёгғЎгҒ®гғ гӮ·гғ гӮ·гҒ®гҒ©гӮ“гӮҲгҖңгӮҠгҒ—гҒҹеҶҙгҒҲгҒӘгҒ„гҒҠеӨ©ж°—гҒ§гҒ—гҒҹгҒҢгҖҒгғ•гғӯгӮўгҒҜгҒқгӮ“гҒӘгҒ®й–ўдҝӮгҒӯгҒҮ(cv.е°Ҹеі¶гӮҲгҒ—гҒҠ)гҒЈгҒҰгҒҸгӮүгҒ„жҝҖгӮўгғ„гҒ«д»•дёҠгҒҢгҒЈгҒҰгҒҰжңҖй«ҳгҒ«жҘҪгҒ—гҒӢгҒЈгҒҹрҹ”Ҙрҹ”Ҙрҹ”Ҙ
      
      зү©иІ©гҒ§и©ұгҒ—гҒҹж„ҹгҒҳгҒ гҒЁд»Ҡж—ҘеҲқгӮҒгҒҰNEK!гҒ®гғ©гӮӨгғ–гҒ«жқҘгҒҰгҒҸгҒ гҒ•гҒЈгҒҹгҒЁгҒ„гҒҶж–№гҒҢзөҗж§ӢгҒ„гҒҰгҖҒNEK!гҒ®ијӘгҒҢеәғгҒҫгҒЈгҒҰгҒҚгҒҰгӮӢгҒ®гӮ’е®ҹж„ҹгҒ§гҒҚгҒҰе¬үгҒ—гҒӢгҒЈгҒҹгҒ§гҒҷ^^
      ж°—гҒ«гҒӘгҒЈгҒҰгӮӢгҒқгҒ“гҒ®гҒӮгҒӘгҒҹгӮӮгҖҒгҒңгҒІдёҖеәҰз”ҹNEK!гӮ’дҪ“ж„ҹгҒ—гҒ«жқҘгҒҰгҒҝгҒҰгҒҸгҒ гҒ•гҒ„вқӨпёҸвҖҚрҹ”Ҙзө¶еҜҫгғҲгғӘгӮігҒ«гҒ•гҒӣгҒҫгҒҷгҒ®гҒ§вқӨпёҸвҖҚрҹ”Ҙ
      
      ж¬ЎеӣһгҒ®гғ©гӮӨгғ–гҒҜжҳҺеҫҢж—Ҙ7/3(Wed)еҲқеҸ°DOORSгҒ•гӮ“гҒ§гҒҠеҫ…гҒЎгҒ—гҒҰгҒҫгҒҷпјҒпјҒгҒҫгҒҹгҒӯгғјпјҒ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.07.01
      
      We performed at Girl's UP!!! vol.357 today!!
      Thank you to everyone who came sunflower
      
      From the morning, the weather was damp, humid, and gloomy, but the floor was so hot it felt like "that doesn't matter" (cv. Yoshio Kojima), and it was the most fun everрҹ”Ҙрҹ”Ҙрҹ”Ҙ
      
      From talking at the merch booth, it felt like quite a few people came to a NEK! live for the first time today, and I was happy to feel the NEK! circle expanding^^
      To those of you who are curious, please come experience NEK! live at least onceвқӨпёҸвҖҚрҹ”Ҙ I promise we'll make you a fanвқӨпёҸвҖҚрҹ”Ҙ
      
      The next live is the day after tomorrow, 7/3 (Wed), waiting for you at Hatsudai DOORS!! See you then!
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
