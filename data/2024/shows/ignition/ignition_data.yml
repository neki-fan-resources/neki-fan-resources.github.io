- postinstagram:
    id: DCDg45hvvob
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-11-07
    text: |-
      2024.11.06
      
      гҖҢ251 presents Ignition!!! гҖң Special Two Man Show гҖңгҖҚ
      гҒ«еҮәжј”гҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹгҒҝгҒӘгҒ•гӮ“жң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹвҡЎпёҸ
      
      еҝөйЎҳгҒ®Bray meгҒ•гӮ“гҒЁгҒ®гғ„гғјгғһгғігғ©гӮӨгғ–пјҒпјҒжңҖй«ҳгҒ гҒЈгҒҹгғјпјҒ
      гҒ“гӮҢгҒһгҒҫгҒ•гҒ«"гғҚгӮӯ"гҒЁгҒ„гҒҶгӮҲгҒҶгҒӘгҒЁгҒҰгӮӮеҠӣеј·гҒ„иІ«зҰ„гҒ®гҒӮгӮӢгӮ№гғҶгғјгӮёгӮ’зӣ®гҒ®еҪ“гҒҹгӮҠгҒ«гҒ—гҒҰи¶…зө¶иғёзҶұгҒ§гҒ—гҒҹвқӨпёҸвҖҚрҹ”Ҙ
      иЈҸгҒ§гӮӮж°—гҒ•гҒҸгҒ«гҒҹгҒҸгҒ•гӮ“гҒҠи©ұгҒ—гҒҰгҒҸгҒ гҒ•гҒЈгҒҰгҖҒгӮҒгҒЎгӮғгҒҸгҒЎгӮғе„ӘгҒ—гҒҸгҒҰзҙ ж•өгҒӘж–№гҒҹгҒЎгҒ§гҒ—гҒҹрҹҘІвңЁпёҸ
      
      NEK!гҒҜгҒӘгӮ“гҒЁж–°жӣІгӮ’еҲқжҠ«йңІгҒ—гҒҫгҒ—гҒҹпјҒпјҒд»ҠгҒҫгҒ§гҒЁгҒҜгҒЎгӮҮгҒЈгҒЁжҜӣиүІгҒ®йҒ•гҒҶж„ҹгҒҳгҒ§гҖҒгҒҫгҒҹж–°гҒ—гҒ„NEK!гҒ®дёҖйқўгҒҢиҰӢгӮүгӮҢгӮӢжӣІгҒ«гҒӘгҒЈгҒҰгҒҫгҒҷгҖӮ(гғүгғ©гғ гҒ®иҰӢгҒӣе ҙгҒҹгҒҸгҒ•гӮ“гҒӮгӮӢгҒ—гҖҒгҒ„гҒӨгӮӮгӮҲгӮҠгӮігғјгғ©гӮ№гӮӮзөҗж§ӢгӮ„гҒЈгҒҰгҒҫгҒҷз¬‘)
      гҒҝгҒӘгҒ•гӮ“гҒ®еҸҚеҝңгҒҢгҒ©гӮ“гҒӘж„ҹгҒҳгҒ«гҒӘгӮӢгҒӢдәҲжғігҒ§гҒҚгҒӘгҒ„жҘҪжӣІгҒ гҒЈгҒҹгҒ®гҒ§гҖҒе°‘гҒ—жҠ«йңІгҒҷгӮӢдёҠгҒ§е°‘гҒ—дёҚе®үгӮӮгҒӮгҒЈгҒҹгҒ‘гҒ©гҖҒгҒ„гҒ„гғӘгӮўгӮҜгӮ·гғ§гғігӮ’жІўеұұгӮӮгӮүгҒҲгҒҹгҒ®гҒ§е®үеҝғгҒ—гҒҫгҒ—гҒҹпјҒ
      гҒ“гӮҢгҒӢгӮүгӮӮгғ©гӮӨгғ–гҒ§гӮ„гҒЈгҒҰгҒ„гҒҸгҒӢгӮүжҳЁж—ҘжқҘгӮҢгҒӘгҒӢгҒЈгҒҹж–№гҒҜгҒңгҒІиҒҙгҒ‘гӮӢж—ҘгӮ’жҘҪгҒ—гҒҝгҒ«гҒ—гҒҰгҒҰгҒҸгҒ гҒ•гҒ„гҒӯрҹҢҝ
      
      гғ„гғјгғһгғігҒҜд»ҠеӣһгҒҢеҲқгӮҒгҒҰгҒ гҒЈгҒҹгҒ‘гҒ©гҖҒгҒҹгҒҸгҒ•гӮ“еҲәжҝҖгӮ’еҸ—гҒ‘гҒҹгҒ—еӯҰгҒ¶гҒ“гҒЁгӮӮгҒҹгҒҸгҒ•гӮ“гҒӮгҒЈгҒҹпјҒпјҒгҒ“гӮҢгҒӢгӮүгӮӮгҒ„гӮҚгӮ“гҒӘгғҗгғігғүгҒ•гӮ“гҒЁгӮ„гҒЈгҒҰгҒ„гҒҚгҒҹгҒ„гҒӘгҒЁжҖқгҒ„гҒҫгҒ—гҒҹрҹӨҳрҹҸ»
      
      гҒқгҒ—гҒҰж—Ҙд»ҳгҒҢеӨүгӮҸгӮҠжң¬ж—ҘгҒҜгҖҒдёӢеҢ—жІўSHELTERгҒ§еҜҫгғҗгғігғ©гӮӨгғ–гҖҢSweet!Sweet!Sweet!гҖҚгҒ«еҮәжј”гҒ—гҒҫгҒҷпјҒ
      д»ҠеӣһгҒ®жј”иҖ…гҒ•гӮ“гҒҜе…Ёе“ЎеҲқе…ұжј”гҒӘгҒ®гҒ§гҒҷгҒ”гҒҸжҘҪгҒ—гҒҝгҒ§гҒҷрҹӨқрҹҸ»рҹ”Ҙ
      жҳЁж—ҘгӮ’и¶…гҒҲгӮӢгғ©гӮӨгғ–гҒ¶гҒЈгҒӢгҒҫгҒ—гҒҫгҒҷпјҒпјҒгҒңгҒІгҒҠеҫ…гҒЎгҒ—гҒҰгҒҫгҒҷпјҒпјҒ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.11.06
      
      We performed at
      "251 presents Ignition!!! гҖң Special Two Man Show гҖң"!
      To everyone who came, thank you so muchвҡЎпёҸ
      
      The long-awaited two-man live with Bray me!! It was the best!
      Witnessing such a powerful and dignified stage presence that truly defined "Neki" was incredibly movingвқӨпёҸвҖҚрҹ”Ҙ
      They were such kind and wonderful people who talked with us casually behind the scenes as wellрҹҘІвңЁпёҸ
      
      NEK! actually performed a new song for the first time!! It has a slightly different vibe than before, showing a new side of NEK!. (The drums have a lot of highlights, and I'm doing more chorus parts than usual lol)
      Since it's a song where I couldn't predict what the reaction would be, I was a bit anxious about performing it, but I felt relieved because we got so many great reactions!
      We'll keep playing it at lives, so for those who couldn't come yesterday, please look forward to the day you can hear itрҹҢҝ
      
      This was our first two-man live, and it was so stimulating and I learned a lot!! It made me want to keep performing with many different bandsрҹӨҳрҹҸ»
      
      And now that the date has changed, today we'll be performing at the multi-band live "Sweet!Sweet!Sweet!" at Shimokitazawa SHELTER!
      I'm really looking forward to it since it's our first time co-starring with all of today's performersрҹӨқрҹҸ»рҹ”Ҙ
      We're going to blow everyone away with a live that tops yesterday!! We'll be waiting for you!!
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
