- postinstagram:
    id: DBOarqyzqNy
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-10-17
    text: |-
      2024.10.13
      
      「FM802 MINAMI WHEEL 2024」に出演いたしました！！
      2ヶ月前の大阪遠征のときに初日に訪れた心斎橋VARONさんで今回もやらせていただきました🐙
      
      フロア超満員！！！！！自分が思っていたよりもたくさん観に来てくださってて、幕が開いた瞬間泣きそうになった🥲✨初めてNEK!のライブを観に来てくださったという方も多くいて、最高に嬉しかったです！
      
      憧れのミナホに結成してから半年ちょっとで出場できたこと、本当に嬉しく思います。
      反省することは相変わらず今回もたくさーーーんあるけど笑、とにかく楽しかった！！
      
      また来年も出たいな〜〜〜というか必ず出る！！
      今年よりも大きなステージで必ず戻ってきます🔥
      
      今回は大阪といえばの粉もん、お好み焼きをライブ前にみんなで食べに行ったよ〜〜！めっちゃ美味しかった🤤
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.10.13
      
      We performed at "FM802 MINAMI WHEEL 2024"!!
      We got to play at Shinsaibashi VARON again, which was the first place we visited during our Osaka trip 2 months ago🐙
      
      The floor was completely packed!!!!! So many more people came to see us than I expected, and I almost cried the moment the curtain opened🥲✨ There were many people who came to see a NEK! live for the first time, and it made me so incredibly happy!
      
      I'm truly happy that we were able to appear at the Minaho I've always admired just over half a year after forming the band.
      As usual, there are soooooo many things to reflect on this time too lol, but anyway, it was fun!!
      
      I want to appear again next year~~~ or rather, I definitely will!!
      I'll definitely be back on a bigger stage than this year🔥
      
      This time, we all went to eat okonomiyaki—a classic Osaka soul food—before the live~~! It was so delicious🤤
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
