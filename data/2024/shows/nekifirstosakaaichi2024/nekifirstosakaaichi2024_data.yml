- postinstagram:
    id: C_cBCEkyHbf
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2024-09-03
    text: |-
      ．
      8/21-8/24
      遅ればせながら、大阪愛知、ありがとうございました❤️‍🔥
      楽しかったヨォ！最高だったヨォ！！
      NEK!の音楽が色々な場所に届いているんだと実感できた4日間でした！
      学びも多くあり、NEK!にとっても自分にとってもすごく意味のある濃い遠征で、今後忘れることのないであろう大切な思い出を作ることができました☺︎
      
      必ずもっともっと成長して、経験を積んで戻ってきますので、そのときはまた一緒に遊んでくださると嬉しいです🫶🏻
      
      #girlsband
    translation: |-
      .
      8/21-8/24
      Better late than never, thank you so much Osaka and Aichi ❤️‍🔥
      It was so fun! It was the best!!
      These 4 days really made me feel that NEK!'s music is reaching so many different places!
      There was a lot to learn, and it was such a meaningful and intense tour for both NEK! and myself; I was able to make precious memories that I'll probably never forget ☺︎
      
      We'll definitely grow much more, gain more experience, and come back, so I'd be happy if you'd hang out with us again then 🫶🏻
      
      #girlsband
