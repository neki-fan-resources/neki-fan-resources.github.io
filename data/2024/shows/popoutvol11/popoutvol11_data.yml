    text: |-
      🔥主催ライブ解禁🔥
      
      2024.6.7(金) 六本木unravel tokyo 
      ラストランプpresents. 
      『POP OUT!!vol.11』
      
      【GUEST】
      ✨Risky Melody
      ✨NEK!
      ✨unSea
      ✨小原涼
      
      OPEN/START 18:10/18:30
      
      🎫4/18 18:00予約開始
      https://tiget.net/events/314471
      
      豪華アーティスト様にご出演いただきます！
      
      久しぶりのPOP OUT!!でなんと...
      
      ・新曲初披露！
      ・重大発表あり！
      
      絶対にお待ちしております🔥
      #ラストランプ
