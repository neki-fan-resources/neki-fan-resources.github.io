- postinstagram:
    id: C763Z2tP7DD
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-06-07
    text: |-
      2024.06.07
      
      POP OUT!! vol.11にお越しいただきありがとうございました🔥
      フロア激アツで楽しかったーーー！！初めましてだったunravel tokyoさんの会場、音響、照明全てが超絶素晴らしくて、めっちゃ気持ち良い演奏ができました🌱
      
      出演者の皆様も優しい方ばかりで、帰り際にたくさん話しかけてくださいました…！女性ミュージシャンとの繋がりが増えてめちゃくちゃ嬉しい涙
      
      そして今日に続けて、8/31のラストランプさん主催サーキットイベント「トラROCK FESTIVAL」にもお誘いいただきました！こちらもとても楽しみですね🐯🔥
      
      次回のライブは6/15(Sat)「CODE OF ZERO X 東名阪TOUR」@ 下北沢ReG！待ってるね！
      
      #neki #neki_band #girlsband #girldrummer #femaledrummer #unraveltokyo
    translation: |-
      2024.06.07
      
      Thank you for coming to POP OUT!! vol.11🔥
      The floor was super hot and it was so much funーーー!! It was my first time at unravel tokyo, and the venue, sound, and lighting were all absolutely wonderful, so I was able to play feeling really good🌱
      
      The other performers were all such kind people and talked to me a lot on the way out...! I'm so incredibly happy to have more connections with female musicians tears
      
      And following today, we've also been invited to Last Lamp's hosted circuit event "Tora ROCK FESTIVAL" on 8/31! I'm really looking forward to this too🐯🔥
      
      The next live is 6/15 (Sat) "CODE OF ZERO X Tomeihan TOUR" @ Shimokitazawa ReG! See you there!
      
      #neki #neki_band #girlsband #girldrummer #femaledrummer #unraveltokyo
