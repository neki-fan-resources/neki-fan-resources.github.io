- postinstagram:
    id: C_uN9I0TT8Y
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-09-10
    text: |-
      2024.09.08
      
      「LIVEHOLIC 9th Anniversaryseries ~Ring! Ring! Ring!~」に出演させていただきました🦋💙
      
      お越しくださった皆さまありがとうございました！！
      MCでも言っていたように、NEK!初めてのサーキットイベントで立たせていただいた3/9から半年ぶりのLIVEHOLICさんで、しかもトリを務めさせていただけてとても嬉しかったです⚡️
      LIVE HOLICさん9周年本当におめでとうございます！！
      これからも末永くよろしくお願いいたします🙇🏻‍♀️✨
      
      対バンの方たちともたくさんお話できて嬉しかったな〜
      Twitterの方で一緒に撮ってくださったお写真RTしてるので、ぜひご覧ください☺️
      
      そして本日はShibuya eggmanさんのGirl's UP!!!です🔥
      久しぶりのeggman楽しむぞー！
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.09.08
      
      We performed at "LIVEHOLIC 9th Anniversaryseries ~Ring! Ring! Ring!~"🦋💙
      
      To everyone who came, thank you very much!!
      As I mentioned during the MC, it's been half a year since we performed at LIVEHOLIC on 3/9 for NEK!'s first-ever circuit event, and I was so happy that we got to play the closing set⚡️
      A huge congratulations to LIVEHOLIC on your 9th anniversary!!
      We look forward to working with you for a long time to come🙇🏻‍♀️✨
      
      I was so happy to talk a lot with the other bands on the lineup~
      I'm RT-ing the photos we took together on Twitter, so please check them out☺️
      
      And today is Girl's UP!!! at Shibuya eggman🔥
      I'm going to enjoy eggman for the first time in a while!
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
