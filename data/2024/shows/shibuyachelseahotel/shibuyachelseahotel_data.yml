- postinstagram:
    id: C4wjU64xReF
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-03-21
    text: |-
      2024.03.20
      
      NEK!の初単独フリーライブが昨日無事終了いたしましたーーー！！
      1部も2部もたくさんの方にご来場いただいて最高に嬉しかったです🔥
      昨日から発売開始した私たちのオリジナル曲GetOverの手焼きCDもとうとう私たちの手元から巣立ち、昨日ご購入いただいた多くの皆さんの耳に届いたのかと思うとなんだか感慨深いです。本当にありがとうございます！！！！
      
      毎回"かっこいい"を更新できるようこれからも日々精進いたします🔥
      
      次は4/9(Tue)、渋谷eggmanのGirl'sUP!!!でお待ちしています！またね！！
      
      #neki #nekiband #girlsband #femaledrummer #femalemusician #chelseahotel #shibuya
    translation: |-
      2024.03.20
      
      NEK!'s first solo free live show successfully concluded yesterdayーーー!!
      We were incredibly happy to have so many people attend both the 1st and 2nd performances 🔥
      The hand-burned CD of our original song "Get Over," which went on sale yesterday, finally left our hands, and it's quite moving to think it has reached the ears of the many people who purchased it yesterday. Thank you so much!!!!
      
      We will continue to work hard every day so we can always raise our level of "coolness" 🔥
      
      Next, we will be waiting for you at Girl's UP!!! at Shibuya eggman on 4/9 (Tue)! See you later!!
      
      #neki #nekiband #girlsband #femaledrummer #femalemusician #chelseahotel #shibuya
