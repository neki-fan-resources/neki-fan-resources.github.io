- postinstagram:
    id: C7MjVPeRGlL
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2024-05-20
    text: |-
      2024.05.20
      
      жң¬ж—ҘгҒҜSweet!Sweet!Sweet! гҒ«еҮәжј”гҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒҚгҒҫгҒ—гҒҹпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶж§ҳгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹпјҒпјҒ
      гҒ„гҒӨгҒ«гӮӮеў—гҒ—гҒҰгӮ°гғӯгғјгғҗгғ«гҒӘз©әй–“гҒ§гҖҒзү©иІ©гҒ«гӮӮгҒҹгҒҸгҒ•гӮ“жө·еӨ–гҒ®ж–№гҒҢжқҘгҒҰгҒҸгҒ гҒ•гҒЈгҒҰе¬үгҒ—гҒӢгҒЈгҒҹгҒ§гҒҷрҹҢҸрҹӨҳрҹҸ»
      зөӮе§ӢThank you!гҒЁSorry...!гҒ—гҒӢиЁҖгҒҲгҒӘгҒҸгҒҰгҖҒгҒЎгӮғгӮ“гҒЁиӢұиӘһеӢүеј·гҒ—гҒӘгҒҚгӮғгҒӘгҒЁжҖқгҒЈгҒҹз¬‘
      
      7/20(жңҲ)гӮӮгҒ“гҒ“гҒ§гӮ„гӮӢгҒ®гҒӢгғјпјҒгҒЁжҖқгҒ„гҒӘгҒҢгӮүд»Ҡж—ҘгӮ№гғҶгғјгӮёгҒ«з«ӢгҒЈгҒҰгҒҰгҖҒгӮӨгғЎгғјгӮёгҒҢе°‘гҒ—гҒҡгҒӨиҶЁгӮүгӮ“гҒ§гҒҚгҒҰгӮҲгӮҠгғҜгғігғһгғігҒҢжҘҪгҒ—гҒҝгҒ«гҒӘгӮҠгҒҫгҒ—гҒҹрҹ”Ҙ
      
      иӘІйЎҢгӮӮеұұгҒ»гҒ©гҒӮгӮӢгҒ—гҖҒгӮӮгҒЈгҒЁгӮӮгҒЈгҒЁзҡҶгҒ•гӮ“гҒ«жҘҪгҒ—гӮ“гҒ§гҒ„гҒҹгҒ гҒ‘гӮӢгғ©гӮӨгғ–гҒҢгҒ§гҒҚгӮӢгӮҲгҒҶгҒ«еј•гҒҚз¶ҡгҒҚй ‘ејөгӮҠгҒҫгҒҷпјҒпјҒ
      
      ж¬ЎеӣһгҒҜ6/3(жңҲ)гҖҒSHIBUYA THE GAMEгҒ•гӮ“гҒ«гҒҰиЎҢгӮҸгӮҢгӮӢеҜҫгғҗгғігғ©гӮӨгғ–гҖҢ#FYP ~For You Place~ DAY1гҖҚгҒ§гҒҠеҫ…гҒЎгҒ—гҒҰгҒҫгҒҷпјҒпјҒгҒҫгҒҹгҒӯгғјпјҒпјҒ
      
      вҖ»3жһҡзӣ® гҒӢгҒӘгҒ§гӮ“ж—©йҖҖгҒ—гҒҹгҒ®гҒ§дёҚеңЁгҒ§гҒҷпјҒрҹҷҸрҹҸ»
      
      #neki #nekiband #girlsband #shelter #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2024.05.20
      
      We performed at Sweet!Sweet!Sweet! today!
      Thank you to everyone who came!!
      It was a more global atmosphere than usual, and I was happy that many people from overseas came to the merch boothрҹҢҸрҹӨҳрҹҸ»
      I could only say "Thank you!" and "Sorry...!" the whole time, so I thought I really need to study English lol
      
      I stood on stage today thinking, "We're doing it here on 7/20 (Mon) too!" and as my vision for it grew bit by bit, I got even more excited for the solo showрҹ”Ҙ
      
      There are a mountain of challenges, and I'll continue to do my best so we can put on lives that everyone can enjoy even more!!
      
      Next time is 6/3 (Mon), we'll be waiting for you at the battle-of-the-bands live "#FYP ~For You Place~ DAY1" at SHIBUYA THE GAME!! See you!!
      
      *3rd photo: Kanaden is missing because she had to leave early!рҹҷҸрҹҸ»
      
      #neki #nekiband #girlsband #shelter #drum #drummer #girldrummer #femaledrummer
