- postx:
    id: 1993556722968154273
    account: natsu08_guitar
    label: Thank you
    published-date: 2025-11-26
    text: |-
      FM yokohama「Kiss & Ride」
      
      お聴きいただきありがとうございました！！
      景色も綺麗で目も耳も楽しいラジオでした📻🤍🤍
      横浜最高！！！
      明後日もツアーでも横浜お邪魔するので遊びに来てくださると嬉しいです！
      ぜひアーカイブでもお聴きください👂🏻
    translation: |-
      FM yokohama "Kiss & Ride"
      
      Thank you for listening!!
      It was a radio show where both my eyes and ears had fun with the beautiful scenery📻🤍🤍
      Yokohama is the best!!!
      I'll be visiting Yokohama again the day after tomorrow for the tour, so I'd be happy if you come to see us!
      Please listen to the archive as well👂🏻
