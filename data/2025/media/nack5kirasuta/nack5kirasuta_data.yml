- postx:
    id: 1947255012091900252
    account: coco_102
    label: Great time at NACK5. Also met the bunny
    info: image - selfie with Hika and bunnies, in front of the big bunny.
    published-date: 2025-07-21
    text: |-
      #キラスタ ゲスト生出演終わりましたー！
      
      私は初のNACK5出演でしたが、酒井直斗さんと斉藤百香さんのおかげで楽しくおしゃべりできました！念願のらじっと君にも会えたよ〜
      
      ぜひアーカイブでもお楽しみください👂🏻🩵
    translation: |-
      #KiraSuta Guest live appearance is over!
      
      It was my first time appearing on NACK5, but thanks to Naoto Sakai-san and Momoka Saito-san, I had a great time chatting! I even got to meet the long-awaited Raditto-kun~
      
      Please enjoy the archive as well👂🏻🩵
