- postinstagram:
    id: DRtO4c2Etfo
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-12-01
    text: |-
      NEK! 1st Album『MEME』リリース記念ワンマンライブ
      📍YOKOHAMA RaNY beta
      
      お越しくださった皆様ありがとうございました！
      
      ソールドアウトしたパンッパンのフロアと共に最高にアツい時間を過ごすことができました🔥
      アルバム収録曲を中心につくったセットリストでいくつか初披露の楽曲もありましたが、前から後ろまでみんなが拳上げたり一緒に歌ってくれてて、終始フロアの熱がビシビシ伝わって来て嬉しかったです！！1曲目から汗だくでした！笑
      会場を包み込む熱気と一体感が堪らなく心地よかったです❤️‍🔥
      
      お手紙やプレゼントもたくさんありがとうございます！！
      メンバー一同とても励みになっています🥲✨️
      
      MEMEの楽曲が仲間入りしたこれからのライブが自分のことながらとても楽しみです！
      NEK!を更にレベルアップさせてくれる強者揃いの今作をこれからもたくさん聴いて、末永く愛していただけたら嬉しいです！よろしくお願いします🙂‍↕️🫶🏻
      
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      NEK! 1st Album 『MEME』 Release Commemoration One-Man Live
      📍YOKOHAMA RaNY beta
      
      Thank you to everyone who came!
      
      We were able to spend an incredibly passionate time with a sold-out, packed floor 🔥
      The setlist was centered around the album tracks and included some songs performed for the first time, but everyone from the front to the back was raising their fists and singing along with us, and I was happy that the heat from the floor was strongly conveyed throughout the entire show!! I was sweating from the very first song! lol
      The passion and sense of unity that enveloped the venue was unbearably comforting ❤️‍🔥
      
      Thank you also for the many letters and presents!!
      It's a great encouragement for all the members 🥲✨️
      
      I'm really looking forward to our future shows with the addition of the MEME songs!
      I'd be happy if you continue to listen to this work, filled with powerful songs that will level up NEK! even further, and love it for a long time! Thank you in advance 🙂‍↕️🫶🏻
      
      #neki #neki_band #girlsband #drum #femaledrummer
