      たまらない時間でした‼︎
      
      ありがとうございました！
    translation: |-
      Thank you very much for today!
      
      Choosing this day and taking time out of your valuable weekday schedule,
      and coming all the way to the live house,
      I am filled with gratitude.
      
      From the very start, with all your smiles and energetic voices,
      the venue became one, and it was a truly fun and
      unforgettable time‼︎
      
      Thank you very much!
