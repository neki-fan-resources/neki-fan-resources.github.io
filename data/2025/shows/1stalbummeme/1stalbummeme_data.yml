- postinstagram:
    id: DRzcyQUkgt3
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2025-12-03
    text: |-
      .
      NEK! 1st Album『MEME』
      リリース記念ワンマンライブ
       @ 横浜ReNY beta
      改めてありがとうございました🌟
      
      たくさんの新曲を引っさげて挑んだリリースワンマン！
      盛り上がってくれるかなと少し不安もありましたが、
      そんな気持ちは一瞬で吹き飛ぶほどの熱気で、もう最高でした❤️‍🔥❤️‍🔥
      本当に楽しかったーーーーー！！！
      
      ライブをするたびに思うんだけど、
      ほんとにねー！！いつもみんなから元気をもらっています！！！
      ありがとうございますございます❤️‍🔥
      
      「MEME」はNEK!にとって初のアルバム
      これからのNEK!にとって欠かせない存在になっていく作品なので、
      ずっとずっと愛し続けてもらえたら嬉しいです！💿
      すでにライブや次の日のリリイベで、
      みなさんがこのアルバムへの想いを、愛を伝えてくださって
      思わずニマニマしちゃいましたけどね☺︎
      これからも末長くよろしくお願いします🫶🏻🫶🏻
      
      #neki #guitarist #girlsband
    translation: |-
      .
      NEK! 1st Album "MEME"
      Release Commemorative One-Man Live
       @ Yokohama ReNY beta
      Thank you once again🌟
      
      A release one-man show where we challenged ourselves with many new songs!
      I was a little worried if everyone would get into it,
      but that feeling was blown away in an instant by the heat—it was just the best❤️‍🔥❤️‍🔥
      It was seriously so much funーーーーー!!!
      
      I think this every time we do a live show,
      but really!! I always get so much energy from all of you!!!
      Thank you so so much❤️‍🔥
      
      "MEME" is NEK!'s first album.
      Since it’s a work that will become indispensable for NEK! moving forward,
      I’d be happy if you continue to love it forever and ever!💿
      Already at the live and the release event the next day,
      everyone expressed their thoughts and love for this album,
      which honestly made me grin from ear to ear☺︎
      I look forward to our long relationship ahead🫶🏻🫶🏻
      
      #neki #guitarist #girlsband
