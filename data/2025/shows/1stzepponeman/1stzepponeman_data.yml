    text: |-
      明日はついに…初のZepp ONEMANLIVE
      
      ずっと憧れていた夢の舞台に皆さんと一緒に行けることが心から嬉しいです。
      明日はたくさんのありがとうを私たちの音楽で伝えたい。
      そして、それを受け取ってほしいです。
      
      皆さんと一緒にZepp Shinjukuを地球でいちばん熱い場所にしちゃおうぜ！🌏🔥
      
      #ネキ界隈
    translation: |-
      Tomorrow is finally… our first Zepp ONEMAN LIVE
      
      I am truly happy from the bottom of my heart that I can go to this dream stage I've always looked up to together with all of you.
      Tomorrow, I want to convey many "thank yous" through our music.
      And, I want you to receive them.
      
      Together with everyone, let's make Zepp Shinjuku the hottest place on Earth! 🌏🔥
      
      #NEKIKaiwai
    image:
    - GzgPLpwbkAEbIPV
    part-of:
