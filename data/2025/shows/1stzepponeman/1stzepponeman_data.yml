- postinstagram:
    id: DOD-RjkEmDB
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-09-01
    text: |-
      2025.08.30
      
      NEK! 1ST ZEPP ONE MAN【#拡散中 #ネキ界隈】
      無事終了しましたー！！
      お越しくださった皆さま本当にありがとうございました❤️‍🔥
      
      余韻に浸り続けて投稿遅くなってしまいました！失礼！！
      
      初めてZeppでライブをやってみて思ったのは、今までと景色が違いすぎるということ！！登場SEが流れてステージに出たとき、お客さんの多さに圧倒されて、ええ！！これは現実ですか？！と心から驚きました😂
      
      フロアいっぱいに溢れるたくさんの笑顔を見て、ここに集まってくれた全員のことを幸せにして帰したい！！と思いながらウキウキとドラムに向かったのを覚えています💪🏻
      
      アカペラで伸びやかに歌うHikaの後ろ姿を見守り、とうとう始まるぞ〜、、と思いながらカウントをしてライブは幕を開け、そこからは怒涛の体力勝負セトリ笑
      
      今自分はあのずっと立ちたかったZeppで演奏しているのか、、すごいなぁ、、と思いながら終始ニヤニヤが止まらなかったのですが、汗も同じくらい止まりませんでした😂💦
      
      実は6月末に今回のセトリを考えて、そのあとべードラ2人で試しにやってみたらめちゃくちゃしんどくて、少し後悔したのですが、これが余裕でできるようになったらまたプレイヤーとしてレベルアップできるじゃん！！とワクワクしながらリハをしてきました😌
      2人で繰り返しやっていくとだんだん慣れてきて、達成感と同時にZeppに立つ自信がついていったのを実感していました🔥
      
      初披露の曲もいくつかあり、C&Rをやってみたり、ファンのみなさんにノリ方をレクチャーしたり、zero-sumを匂わせるインストコーナーをやったりと、今回のセトリはいろんな角度から挑戦できたかなと思います！
      何度も来てくれているお客さんにも新鮮な気持ちで楽しんでもらえてたら嬉しいです💫
      
      ライブが始まるまではさすがに緊張するかな〜と思っていたのですが、最後まで緊張することなく純粋に楽しめたので、今回のライブは自分にとってとても大きな自信に繋がりました！
      
      アンコールでは同時生配信を行い、1stアルバム「MEME」の発売とそちらのリリース記念ワンマンライブの開催と来年結成2周年を記念した全国ツアーを行うことと来年ポニーキャニオンさんからメジャーデビューさせていただくことを発表しました！！
      鳴り止まない拍手とフロアから聞こえるたくさんの「おめでとう！」という暖かい声に思わず涙が溢れました🥲
      皆さんと一緒に掴み取ったDreams!!!!なので、きちんと直接伝えることができて嬉しかったです！
      
      これからもたくさん夢を叶えて、いろんな景色を皆さんと一緒に見ていきたいし、ゆくゆくは世界で活躍するバンドにもなりたい！！
      いつも支えてくれているファンの皆さんやバンドメンバー、周りのスタッフさんや家族に感謝しながら個人としてもバンドとしても引き続き頑張っていきますので、これからも応援よろしくお願いします🔥
      
      とにかく初Zeppはめちゃくちゃ楽しかった！に尽きる！！
      一生モノの思い出をありがとう！
      
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2025.08.30
      
      NEK! 1ST ZEPP ONE MAN【#NowSpreading #NekiNeighborhood】
      Finished safelyー!!
      To everyone who came, thank you so so much❤️‍🔥
      
      I've been soaking in the afterglow so much that my post got delayed! My apologies!!
      
      What I thought after trying a live show at Zepp for the first time was that the scenery is just too different from before!! When the intro SE played and I went out on stage, I was overwhelmed by the size of the crowd and was truly shocked, thinking, "Wait!! Is this reality?!"😂
      
      Seeing so many smiles filling the floor, I remember heading to the drums with excitement, thinking, "I want to make everyone gathered here happy before they go home!!"💪🏻
      
      Watching Hika's back as she sang beautifully a cappella, thinking, "It's finally starting...", I did the count and the live show kicked off, and from there it was a non-stop, physical battle of a setlist lol
      
      I couldn't stop grinning the whole time thinking, "Am I really performing at Zepp, the place I've always wanted to stand...", but the sweat didn't stop either😂💦
      
      Actually, when we thought of this setlist at the end of June and the two of us (bass and drums) tried it out, it was incredibly tough and I regretted it a little, but then I got excited during rehearsals thinking, "If I can do this with ease, I'll level up as a player!!"😌
      As the two of us did it over and over, we gradually got used to it, and I felt my confidence in standing at Zepp grow along with a sense of accomplishment🔥
      
      With several songs performed for the first time, doing C&R, lecturing the fans on how to move to the music, and an instrumental corner hinting at zero-sum, I think we were able to challenge ourselves from various angles with this setlist!
      I'd be happy if the customers who have come many times were able to enjoy it with a fresh feeling💫
      
      I thought I'd be nervous until the live started, but I was able to purely enjoy it without getting nervous until the end, so this live lead to a very big boost in confidence for me!
      
      During the encore, we did a simultaneous livestream and announced the release of our 1st album "MEME," the holding of a one-man live to commemorate that release, a nationwide tour to celebrate our 2nd anniversary next year, and our major debut with Pony Canyon next year!!
      The endless applause and the many warm voices shouting "Congratulations!" from the floor made me burst into tears involuntarily🥲
      Since these are Dreams!!!! we grabbed together with all of you, I was happy to be able to tell you properly and directly!
      
      I want to keep making many dreams come true and see various sights together with everyone, and eventually, I want us to become a band that is active worldwide!!
      While being grateful to the fans who always support us, the band members, the surrounding staff, and my family, I will continue to do my best both as an individual and as a band, so please continue to support us🔥
      
      Anyway, the first Zepp was incredibly fun! That sums it up!!
      Thank you for the memory of a lifetime!
      
      #neki #neki_band #girlsband #drum #femaledrummer
