- postinstagram:
    id: DQq-UYsEm-W
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-11-05
    text: |-
      「バズリズム LIVE 2025 -BUZZER STAGE-」に出演しました！
      NEK!のステージを観てくださった皆さま本当にありがとうございました❤️‍🔥
      
      バズリズムさんは以前から拝見させていただいてて、大好きな歌番組のひとつなので今回こうやって出演者として参加できてとっても嬉しかったです！！
      しかもBUZZER STAGEは今年から誕生したステージだそうで、そんな記念すべき初回にお呼びいただき本当にありがとうございました🥲🙏🏻
      
      いつも色々なアーティストさんのライブを観に行っている横浜アリーナに自分がライブをしに行くというのが本当に信じ難くてずっと夢見心地な気分でした🫢
      そしていつも物販を買いに行くセンテニアルホールで自分たちがライブをするというのも更に不思議な感覚がしました！
      
      私たちが出演した2日目のBUZZER STAGEは、私たち以外2組ともアイドルさんだったので、普段とは違う界隈の皆さんにもNEK!のライブを観てもらえてとても貴重な経験をさせていただきました！ライブ中も楽しんでくれてる姿が見えて嬉しかったです🥰
      
      KAWAII LAB. MATESの皆さんもStraight Angeliの皆さんもすーーーっごく可愛くてキラキラ輝いてました🥹🫶🏻
      
      Straight Angeliさんとは一緒にTikTokも撮影したので、まだ見てない方はぜひ見に行ってください✊🏻
      
      次バズリズムLIVEに戻ってくるときにはメインステージに必ず立つということを目標に掲げ、メインステージに見合う魅力的なバンドを目指してこれからも頑張ります！！
      
      #neki #neki_band #drum #femaledrummer #バズリズム #ネキミーム
    translation: |-
      We performed at "Buzzrhythm LIVE 2025 -BUZZER STAGE-"!
      Thank you very much to everyone who watched NEKI's performance❤️‍🔥
      
      I've been watching Buzzrhythm for a while now, and it's one of my favorite music shows, so I was really happy to be able to participate as a performer this time!!
      And the BUZZER STAGE was born this year, so thank you so much for inviting us to this memorable first edition🥲🙏🏻
      
      It was truly unbelievable to go and perform a show at Yokohama Arena, where I usually go to watch various artists' concerts, and I felt like I was dreaming the whole time🫢
      And performing in the Centennial Hall, where I usually go to buy merchandise, felt even stranger!
      
      The BUZZER STAGE on the second day, which we performed on, featured two idol groups besides us, so it was a very valuable experience to have people from a different scene watch NEKI's performance! I was happy to see them enjoying themselves during the live show🥰
      
      Both the members of KAWAII LAB. MATES and Straight Angeli were exxxxtremely cute and sparkling🥹🫶🏻
      
      We also shot a TikTok with Straight Angeli, so if you haven't seen it yet, please go check it out✊🏻
      
      We've set the goal of definitely standing on the main stage when we return to Buzzrhythm LIVE next time, and we'll keep working hard to become a charming band worthy of the main stage!!
      
      #neki #neki_band #drum #femaledrummer #Buzzrhythm #NekiMEME
