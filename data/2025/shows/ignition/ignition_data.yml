- postx:
    id: 1989011716701843707
    account: 46_hikaa
    label: Thank you
    published-date: 2025-11-13
    text: |-
      本日!!お越しくださった皆様
      ありがとうございました！
      
      下北沢CLUB251さんで一年ぶりの
      Bray meさんとのツーマンライブ。
      本当に嬉しかったです！
      すごく楽しかったし、少しでも進化したNEK!をお届けできたのかなと思ってます！
      
      最高の夜をありがとうございました！
    translation: |-
      To everyone who came today!!
      Thank you very much!
      
      Our two-man live with Bray me-san at Shimokitazawa CLUB251
      after one year.
      We were truly happy!
      It was so much fun, and I hope we were able to deliver a NEK! that has evolved even a little!
      
      Thank you for a great night!
