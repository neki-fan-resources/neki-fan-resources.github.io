    id: 1988999123501216092
    account: natsu08_guitar
    label: Thank you
    published-date: 2025-11-13
    text: |-
      251 presents Ignition!!! 
      ～ Special Two Man Show ～
      
      平日なのに多くの方が足を運んでくださり嬉しかったです！
      1年ぶりのBray meさんとのツーマン！🔥
      痺れました、、、ほんまにカッコ良すぎる姉貴様です、、、
      食らいついていけるようもっと頑張ります！！！
      今後ともよろしくお願いします😭🤍
    translation: |-
      251 presents Ignition!!!
      ～ Special Two Man Show ～
      
      I was happy that so many people came out even though it was a weekday!
      Our first two-man show with Bray me-san in a year! 🔥
      We were thrilled/stunned... they really are too cool, our big sisters (aneki)...
      We will work harder so we can keep up!!!
      Please continue to support us 😭🤍
