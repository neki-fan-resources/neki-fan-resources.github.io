    id: 1988991929821151489
    account: cure_bass_baka
    label: Thank you
    published-date: 2025-11-13
    text: |-
      251 presents Ignition!!! 
      ～ Special Two Man Show ～
      @ 下北沢CLUB251
      
      お越しくださりありがとうございました🌟
      今年もBray meさんと251でツーマンできて本当に嬉しかったし、
      Bray meさんは私たちにとってのアネキです👩💙
      この先もまたツーマンできたら嬉しく思います(｡•̀ᴗ-)☆
    translation: |-
      251 presents Ignition!!!
      ～ Special Two Man Show ～
      @ Shimokitazawa CLUB251
      
      Thank you for coming 🌟
      We were genuinely happy to have a two-man show with Bray me-san at 251 again this year, and
      Bray me-san is like an older sister (aneki) to us 👩💙
      We would be delighted if we can have another two-man show in the future (｡•̀ᴗ-)☆
