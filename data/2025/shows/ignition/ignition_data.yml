- postx:
    id: 1988995037615853822
    account: coco_102
    label: Thank you
    published-date: 2025-11-13
    text: |-
      Bray meさんとのツーマン無事終演しました❤️‍🔥
      お越しくださった皆様ありがとうございました！！
      フロアの熱量に圧倒されてるうちに気づいたらライブが終わってました！笑
      今日も暑かった！これぞライブ！ありがとう！！
      
      Bray me姉さん、これからもNEK!のネキとしてよろしくお願いいたします！！！👊🏻🔥
    translation: |-
      Our two-man show with Bray me-san safely concluded ❤️‍🔥
      Thank you to everyone who came!!
      I was so overwhelmed by the heat of the floor that before I knew it, the show was over! lol
      It was hot again today! That's what a live show is all about! Thank you!!
      
      Bray me big sister (aneki), please continue to look out for NEK! (neki) from now on!!! 👊🏻🔥
    image:
    - G5pUb1-bIAAzVHh
