- postx:
    id: 1988550113870897593
    account: coco_102
    label: Tomorrow
    published-date: 2025-11-12
    text: |-
      明日はこちら！
      Bray me姉さんとの約１年ぶりのツーマンです✌🏻🤍
      前売りは本日の23:59まで！まだ間に合うよー！
      
      明日限定のオリカクもめーっちゃ楽しみ🍹🌟
      NEK!のMAZEドリ!!!!はノンアルコールなので、運転される方やお酒が苦手な方、20歳以下の方でも楽しめます♡私はどっちも楽しみます♡
    translation: |-
      Tomorrow is this one!
      Our first two-man show with Bray me sisters in about a year✌🏻🤍
      Advance tickets are available until 23:59 tonight! You can still make it!
      
      I'm also super excited for the limited-time original cocktail tomorrow🍹🌟
      NEK!'s MAZE Drink!!!! is non-alcoholic, so those driving, those who don't like alcohol, and those under 20 can all enjoy it too♡ I'm going to enjoy both♡
    image:
    - G5i_yaGa8AA8SOI
