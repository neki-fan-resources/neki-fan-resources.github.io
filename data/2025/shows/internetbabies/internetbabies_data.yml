- postinstagram:
    id: DMoNx7wzlap
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-07-27
    text: |-
      2025.07.27
      
      еҲқгҖҒд»Је®ҳеұұUNITвқ•еҲқгҖҒгӮўгӮҜгғӘгғ«жқҝеӣІгҒҫгӮҢвқ•
      
      еҲқгӮҒгҒҰгҒҘгҒҸгҒ—гҒ®еҜҫгғҗгғігғ©гӮӨгғ–жңҖгғғй«ҳгҒ«жҘҪгҒ—гҒӢгҒЈгҒҹ
      гғ©гӮӨгғ–дёӯгҒҜгӮўгӮҜгғӘгғ«жқҝгҒ«еҸҚе°„гҒҷгӮӢиҮӘеҲҶгҒЁзөӮе§Ӣеҗ‘гҒӢгҒ„еҗҲгҒЈгҒҰгҒҰгҒҡгҒЈгҒЁгҒЎгӮҮгҒЈгҒЁж°—гҒҫгҒҡгҒӢгҒЈгҒҹ^^иҮӘеҲҶгҒ«дәәиҰӢзҹҘгӮҠгҒ—гҒҰгҒ„гҒӨгӮӮгӮҲгӮҠгҒӮгӮ“гҒҫгӮҠеүҚеҗ‘гҒ‘гҒӘгҒӢгҒЈгҒҹж°—гҒҢгҒ—гҒҫгҒҷгҖҒгҒҷгҒҝгҒҫгҒӣгӮ“пјҒпјҒ
      
      дё»еӮ¬гҒ®жөңйҮҺгҒҜгӮӢгҒҚгҒ•гӮ“гҒ«гӮҒгҒЈгҒЎгӮғгҒӢгӮҸгҒ„гҒ„гӮ°гғғгӮәгҒ®гғҗгғігғҖгғҠгӮ’гҒ„гҒҹгҒ гҒ„гҒҹгҒ®гҒ§ж—©йҖҹиә«гҒ«гҒӨгҒ‘гҒҰеҸ©гҒ„гҒҹгӮҲрҹҘ·рҹҸ»рҹ–Ө
      гҒҹгҒҸгҒ•гӮ“гҒҠи©ұгҒ—гҒҰгҒҸгҒ гҒ•гҒЈгҒҰзҙ ж•өгҒӘдәәжҹ„гӮ’зҹҘгӮҢгҒҰгҖҒгӮҲгӮҠдёҖеұӨеҘҪгҒҚгҒ«гҒӘгӮҠгҒҫгҒ—гҒҹрҹҘ№рҹ«¶рҹҸ»
      е‘јгӮ“гҒ§гҒ„гҒҹгҒ гҒҚгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹпјҒ
      
      гҒқгҒ—гҒҰд»ҠеӣһгҒ®гғ©гӮӨгғ–гҒ§гҒҜд»Ҡе№ҙгҒ®жҳҘгҒ«иЎҢгҒЈгҒҹжқұеҗҚйҳӘгғ„гӮўгғјгҒ¶гӮҠгҒ«ж–°жӣІrip-offгӮ’гӮ»гғҲгғӘгҒ«зө„гҒҝиҫјгҒҝгҖҒ8/6(ж°ҙ)0жҷӮгҒӢгӮүеҗҢжӣІй…ҚдҝЎгғӘгғӘгғјгӮ№гҒҷгӮӢгҒ“гҒЁгӮ’зҷәиЎЁгҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒҚгҒҫгҒ—гҒҹпјҒ
      гӮ№гғҲгғјгғӘгғјгҒ«гӮӮжӣёгҒ„гҒҹгҒ‘гҒ©гҖҒгғүгғ©гғ гҒҜйҒҺеҺ»гӮӨгғҒиӨҮйӣ‘гҒӘгғ•гғ¬гғјгӮәгҒҢзӣӣгӮҠгҒ гҒҸгҒ•гӮ“гҒӘгҒ®гҒ§жҘҪгҒ—гҒҝгҒ«гҒ—гҒҰгҒ„гҒҹгҒ гҒ‘гҒҹгӮүгҒӘгҒЁпјҒ
      
      ж¬ЎеӣһгҒ®гғ©гӮӨгғ–гҒҜгҒӨгҒ„гҒ«гӮ„гҒЈгҒҰгҒҚгҒҫгҒ—гҒҹгҖҒгҖҒгҖҒ
      NEK! 1ST ZEPP ONE MANгҖҗ#жӢЎж•Јдёӯ #гғҚгӮӯз•ҢйҡҲгҖ‘пјҒпјҒ
      
      зөҗжҲҗгҒӢгӮүзҙ„дёҖе№ҙеҚҠгҖҒд»ҠгҒҫгҒ§зөҢйЁ“гҒ—гҒҰгҒҚгҒҹгҒ“гҒЁгҒ®е…ЁгҒҰгӮ’еҖӢгҖ…гҒ®еҠӣгҒ«еӨүгҒҲгҒҰгҒҝгҒӘгҒ•гӮ“гҒ«жңҖй«ҳгҒ®гғ©гӮӨгғ–гӮ’гҒҠеұҠгҒ‘гҒ—гҒҫгҒҷпјҒпјҒ
      
      Zepp ShinjukuгҒ§еҫ…гҒЈгҒҰгҒҫгҒҷрҹ‘ҠрҹҸ»рҹ”Ҙ
    translation: |-
      2025.07.27
      
      First time at Daikanyama UNITвқ• First time surrounded by acrylic panelsвқ•
      
      This co-headlining live full of "firsts" was the absolute best time
      During the live, I was facing my own reflection in the acrylic panels the whole time, so it was a bit awkward throughout^^ I felt like I was shy toward myself and couldn't look forward as much as usual, sorry!!
      
      Haruki Hamano, the organizer, gave me a super cute bandana from the merch, so I put it on right away to playрҹҘ·рҹҸ»рҹ–Ө
      We talked a lot and getting to know her wonderful personality made me like her even moreрҹҘ№рҹ«¶рҹҸ»
      Thank you so much for inviting us!
      
      Also, for this live, we included our new song "rip-off" in the setlist for the first time since the Tomeihan tour we did this spring, and we announced that the song will be released on streaming services starting at midnight on August 6th (Wed)!
      Like I wrote in my story, the drums are packed with the most complex phrases I've ever done, so I hope you look forward to it!
      
      And finally, our next live is...
      NEK! 1ST ZEPP ONE MANгҖҗ#Spreading #NEKIKaiwaiгҖ‘!!
      
      It's been about a year and a half since we formed, and we're going to turn everything we've experienced into our individual strengths to deliver the best live show to all of you!!
      
      We'll be waiting for you at Zepp Shinjukuрҹ‘ҠрҹҸ»рҹ”Ҙ
