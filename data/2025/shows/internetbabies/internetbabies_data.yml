- postx:
    id: 1953425358717591622
    account: coco_102
    label: rip-off on stage
    info: About the drums
    published-date: 2025-08-07
    text: |-
      rip-off💋
      
      サビ前のフィル、ギアひとつ上げまっせ感あって好き！笑 2サビ終わりのイントロを彷彿とさせる間奏もお気に入り❤️‍🔥
      
      私フロア大好きなんだけど普段はあんまり注目してもらえないタムだからイントロと間奏はみんなに素敵な低音を聴いてもらうために目一杯叩く✊🏻
      
      #NEKI #拡散中 #ネキ界隈
    translation: |-
      rip-off💋
      
      I love the fill before the chorus, it feels like shifting up a gear! lol Also a fan of the interlude after the 2nd chorus that reminds me of the intro❤️‍🔥
      
      I love the floor tom, but usually it doesn't get much attention, so during the intro and interlude I hit it with everything I've got so everyone can hear those cool low tones✊🏻
      
      #NEKI #NowSpreading #NEKIsphere
