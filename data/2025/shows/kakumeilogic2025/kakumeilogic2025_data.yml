- postinstagram:
    id: DJQ-mDkvfG9
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-05-05
    text: |-
      2025.05.04
      
      LIVEHOLIC presents. вҖңйқ©е‘ҪгғӯгӮёгғғгӮҜ2025вҖң supported by Skream! & жҝҖгғӯгғғгӮҜ гҒ«еҮәжј”гҒ„гҒҹгҒ—гҒҫгҒ—гҒҹпјҒ
      
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶгҒ•гҒҫгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹвҡЎпёҸ
      
      йқ©е‘ҪгғӯгӮёгғғгӮҜгҒҜд»ҠеӣһеҲқгӮҒгҒҰеҮәжј”гҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҹгӮӨгғҷгғігғҲгҒ§гҖҒжңқгҒӢгӮүжҷ©гҒҫгҒ§иұӘиҸҜгҒӘгғҗгғігғүгҒҢеӢўжҸғгҒ„гҒ—гҒҰгҒ„гӮӢдёӯгҒ«з§ҒгҒҹгҒЎгӮӮе…ҘгӮҢгҒҰгҒ„гҒҹгҒ гҒ„гҒҰгҖҒжң¬еҪ“гҒ«ж„ҹи¬қгҒ®ж°—жҢҒгҒЎгҒ§гҒ„гҒЈгҒұгҒ„гҒ§гҒҷпјҒгҒҠе‘јгҒігҒ„гҒҹгҒ гҒҚгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹпјҒ
      
      NEK!гҒҜгҒЎгӮҮгҒЈгҒҙгӮҠд№…гҖ…гҒ®гғ©гӮӨгғ–гҒ гҒЈгҒҹгҒЁгҒ„гҒҶгҒ“гҒЁгӮӮгҒӮгӮҠгҖҒжәңгҒҫгӮҠгҒ«жәңгҒҫгҒЈгҒҹгҒҝгӮ“гҒӘгҒ®гғ‘гғҜгғјгҒ«иІ гҒ‘гҒӘгҒ„гӮҲгҒҶгҒ«еҝ…жӯ»гҒ«гҒ¶гҒЈеҸ©гҒҚгҒҫгҒ—гҒҹпјҒ
      гӮөгӮҰгғігғүгғҒгӮ§гғғгӮҜгҒ®гҒЁгҒҚгҒ«MAZEгӮ’гҒЎгӮҮгҒ“гҒЈгҒЁгӮ„гҒЈгҒҹгӮүгҖҒе№•и¶ҠгҒ—гҒ«иҒһгҒ“гҒҲгҒҰгҒҚгҒҹгҒӢгҒ‘еЈ°гҒҢгҒ§гҒӢгҒҷгҒҺгҒҰжҖқгӮҸгҒҡз¬‘гҒЈгҒЎгӮғгҒ„гҒҫгҒ—гҒҹрҹҳӮ
      
      гҒқгҒ—гҒҰгҖҒжҳЁе№ҙ3/20гҒ®гғ•гғӘгғјгғ©гӮӨгғ–гҒ¶гӮҠгҒ«ж’®еҪұOKгҒӘжӣІгӮ’иЁӯгҒ‘гҒҰгҖҒгҒҹгҒҸгҒ•гӮ“гӮ«гғЎгғ©гӮ’еҗ‘гҒ‘гҒҰгӮӮгӮүгҒ„гҒӘгҒҢгӮүдёҚжҖқиӯ°гҒӘж°—жҢҒгҒЎгҒ§Get OverгӮ’жј”еҘҸгҒ—гҒҫгҒ—гҒҹпјҒ
      SNSгҒ«ијүгҒӣгҒҰгҒҸгӮҢгҒҹгҒҝгҒӘгҒ•гӮ“гҖҒгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒҷ^^
      
      жҳЁж—ҘNEK!е…¬ејҸYouTubeгғҒгғЈгғігғҚгғ«гҒ§е…¬й–ӢгҒ—гҒҹGet OverгҒ®гғ©гӮӨгғ–жҳ еғҸгҒЁгҖҒгҒҝгҒӘгҒ•гӮ“гҒ«ж’®гҒЈгҒҰгӮӮгӮүгҒЈгҒҹеӢ•з”»гҒҹгҒЎгӮ’иҰігҒҰгҖҒ8/30гҒ®еҲқZEPPгғҜгғігғһгғігӮ’иҰігҒ«иЎҢгҒҚгҒҹгҒ„гҒЁжҖқгҒҶдәәгҒҢгӮҲгӮҠеў—гҒҲгҒҹгӮүе¬үгҒ—гҒ„гҒӘгҖң
      
      гғ©гӮӨгғ–жҒ’дҫӢгҒ®Drum CamгӮӮж’®гҒЈгҒҹгҒ®гҒ§гҒҫгҒҹеҫҢж—ҘијүгҒӣгҒҫгҒҷгҒӯпјҒ
      гҒҠжҘҪгҒ—гҒҝгҒ«рҹ«¶рҹҸ»
      
      ж¬ЎеӣһгҒҜ6/2(жңҲ)гҖҢNEK!/komsume TWO-MAN SHOWгҖҚ@дёӢеҢ—жІўSHELTERгҒ§гҒҷпјҒ
      д№…гҖ…гҒ®гғ„гғјгғһгғігҒ гғјпјҒж°—еҗҲгҒ„е…ҘгӮҢгҒҰгҒҠеҫ…гҒЎгҒ—гҒҰгҒҫгҒҷрҹ”Ҙ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #жӢЎж•Јдёӯ #гғҚгӮӯз•ҢйҡҲ
    translation: |-
      2025.05.04
      
      We appeared at LIVEHOLIC presents. "Kakumei Logic 2025" supported by Skream! & Gekirock!
      
      Thank you to everyone who came outвҡЎпёҸ
      
      Kakumei Logic was an event we performed at for the first time, and I'm truly filled with gratitude to have been included among such a gorgeous lineup of bands from morning till night! Thank you so much for having us!
      
      Since it had been a little while since NEK!'s last live, I drummed desperately to keep up with everyone's pent-up power!
      When we did a bit of MAZE during soundcheck, the cheers I heard through the curtain were so loud I couldn't help but laughрҹҳӮ
      
      Also, for the first time since the free live on March 20th last year, we had a song where filming was allowed, and I played Get Over with a strange feeling while so many cameras were pointed at me!
      Thank you to everyone who posted it on SNS^^
      
      I hope that by watching the Get Over live footage released on the NEK! official YouTube channel yesterday and the videos everyone took, more people will want to come see our first ZEPP solo show on August 30th~
      
      I also filmed the usual Drum Cam from the live, so I'll post that at a later date!
      Look forward to itрҹ«¶рҹҸ»
      
      Next time is June 2nd (Mon) "NEK!/komsume TWO-MAN SHOW" @ Shimokitazawa SHELTER!
      It's our first two-man in a while! We'll be waiting for you with full spiritрҹ”Ҙ
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #spreading #NEKIKaiwai
