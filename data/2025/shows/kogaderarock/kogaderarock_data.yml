    text: |-
      本日もご来場ありがとうございました✩.*˚
      久しぶりのライブ楽しすぎて燃えたぁ!!
      
      今日、NEK!初めて見たよって方
      少しでも気になっとる方も！
      
      8/30のZeppワンマンライブ！
      2次先行チケット受付中ですので
      是非遊びに来て下さい·͜·ᰔᩚ
      
      #こがでらロック #NEKI
    translation: |-
      Thank you for coming today too✩.*˚
      It was too much fun performing for the first time in a while, I'm fired up!!
      
      For those who saw NEK! for the first time today
      And those who are even a little interested!
      
      Our Zepp one-man live on 8/30!
      Secondary advance tickets are now available
      So please come and visit us·͜·ᰔᩚ
      
      #KogaderaRock #NEKI
