    text: |-
      ＼タイムテーブル解禁❗️／
      
      KOGA RECORDS presents
      【下北沢こがでらROCK FESTIVAL 2025】
      
      🗓️2025年4月12日(土)下北沢3会場
      📍下北沢SHELTER / LIVEHOLIC / 大衆居酒屋こがみ下北沢
      
      OPEN 12:00 / START 13:00 (22:00終演)
      TICKET : 前売 ¥3,500 / 当日 ¥4,000
      (パス交換時に1D ¥600 頂戴致します)
      
      ＊4/13(日)でらロック東京編チケットをこがみにて提示でドリンク割引！
       [アルコール  ¥400 / ソフトドリンク ¥300]
      ＊大衆居酒屋こがみ下北沢にてクローク[¥600] も受け付けております。パス交換時に是非ご利用ください。
      ＊当日券は大衆居酒屋こがみ下北沢にて販売いたします。
      
      🎫前売チケットご購入はこちら
      https://eplus.jp/sf/detail/4287680001-P0030001?P6=001&P1=0402&P59=1
      
      🏚️パス交換所 11:30〜こがみ下北沢
      https://maps.app.goo.gl/zxQ8pNveJpp8jGZE7?g_st=com.google.maps.preview.copy
      
