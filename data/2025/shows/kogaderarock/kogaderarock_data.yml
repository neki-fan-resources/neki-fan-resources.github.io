      📍 Shimokitazawa SHELTER / LIVEHOLIC / Taishu Izakaya Kogami Shimokitazawa
      
      OPEN 12:00 / START 13:00 (Ends 22:00)
      TICKET : Advance ¥3,500 / Day-of ¥4,000
      (1 drink ¥600 required upon pass exchange)
      
      *Present your 4/13 (Sun) Derarock Tokyo ticket at Kogami for a drink discount!
