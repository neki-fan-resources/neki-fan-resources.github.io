    account: coco_102
    label: Dreams!!!! Cocoro-cam
    published-date: 2025-04-14
    text: |-
      ひかっちが途中でファンサしに来てくれた✌🏻❤️
      
      Dreams!!!!はいつもみんなの声がしっかり聞こえるから嬉しい〜 自然と笑顔になっちゃう^^
      
      Zeppワンマンでもとびっきり大きな声聴かせてね！！
      
      #NEKI #拡散中 #ネキ界隈
    translation: |-
      Hikacchi came over to give some fan service in the middle ✌🏻❤️
      
      I'm so happy because I can always hear everyone's voices clearly during Dreams!!!!~ It naturally makes me smile^^
      
      Let me hear your extra big voices at the Zepp one-man too!!
      
      #NEKI #NowSpreading #NEKICircle
