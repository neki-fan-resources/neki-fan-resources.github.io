- postx:
    id: 2006007521472045524
    account: natsu08_guitar
    label: Thank you
    published-date: 2025-12-30
    text: |-
      2025ラストライブ！！
      
      みなさんの声にパワーをもらい、最高の年末を過ごせました！！
      本当にありがとうございました❤️‍🔥
      これにてNEK!は、今年のライブが全て終了いたしました！！どのライブも全部楽しかった‼️‼️
      来年もたくさんライブでお会いしましょう〜！良いお年を〜！！！🤍
    translation: |-
      2025 last live!!
      
      I got so much power from everyone's voices, and was able to spend the best year-end!!
      Thank you so truly much❤️‍🔥
      With this, all of NEK!'s live shows for this year have concluded!! Every single show was so much fun‼️‼️
      Let's meet at many more live shows next year too~! Have a great new year~!!!🤍
    image:
    - G9bFM8IakAAIitJ
    part-of:
      show:
        year: 2025
        id: livediga
    reference:
    - postximage:
        post: 2006004818280952078
        image: G9bCv4nbMAA0Fl9

- postx:
    id: 2006011375294775688
    account: coco_102
    label: Thank you
    published-date: 2025-12-30
    text: |-
      💜🤍 LIVE DI:GA JUDGEMENT 2025 🤍🩵
      
      年内最後のライブでしたが、観に来てくれた皆さんと一緒に最高にアツく楽しくやらせていただきました🔥
      
      今年のライブも全部楽しかったなー！
      どれもこれも応援してくれる皆さんのおかげです！
      本当にありがとう！！来年もよろしくお願いします🫶🏻
    translation: |-
      💜🤍 LIVE DI:GA JUDGEMENT 2025 🤍🩵
      
      It was our last live show of the year, but we had an incredibly hot and fun time together with everyone who came to see us🔥
      
      Every single live show this year was so much fun!
      It's all thanks to everyone who supports us!
      Thank you truly!! Please continue to support us next year too🫶🏻
    image:
    - G9bIr3vaYAEXH1A
