- postinstagram:
    id: DR1d7rvkgoa
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-12-04
    text: |-
      2025.11.29
      
      NEK! 1st Album『MEME』発売記念イベント
      アコースティックミニライブ＆サイン会
      
      お越しくださった皆様本当にありがとうございました！
      
      今年の春以来のアコースティック編成で、そもそもアコースティックだけのライブは今回が初めてだったので終始ソワソワしていましたが、新鮮な気持ちで楽しめました🌱
      
      アルバムに収録しているバラードの楽曲とアルバムリード曲であるGiMMiCKのアコースティックver.などをやってみて、前日に開催したバンド編成のワンマンライブとはひと味もふた味も違うちょっぴり落ち着いた雰囲気のNEK!をお届けできたんじゃないかなと思っています🌿
      
      久しぶりに愛しのマイカホンと一緒にステージ上がれたのがより嬉しかった！心做しかカホンも楽しそうにしてた気がする☺️
      
      サイン会ではファンのみなさんから直接、アルバムやライブの感想を聞けてとても嬉しかったし最高に楽しかったです🫶🏻
      
      みなさんと話しているとNEK!に対する愛がヒシヒシと伝わってきて幸せだなと心から思うし、これからもみなさんの推しバンドでいられるように頑張り続けたいなと強く思いました🔥
      
      #neki #neki_band #girlsband #cajon #drum
    translation: |-
      2025.11.29
      
      NEK! 1st Album『MEME』Release Commemoration Event
      Acoustic Mini-Live & Signing Session
      
      Thank you so much to everyone who came!
      
      It was our first acoustic-only show, and since it was our first acoustic setup since this spring, I was restless the whole time, but I enjoyed the fresh feeling 🌱
      
      By performing the ballad track included in the album and the acoustic version of the album's lead song, GiMMiCK, I think we were able to deliver a slightly calmer side of NEK! that was different from the band-style one-man show held the day before 🌿
      
      I was extra happy to be on stage with my beloved cajon again after a long time! I feel like the cajon also seemed to be enjoying itself ☺️
      
      During the signing session, I was so happy and had the best time being able to hear direct feedback from the fans about the album and the live show 🫶🏻
      
      When I talk with everyone, I sincerely feel happy that your love for NEK! is strongly conveyed, and I strongly feel that I want to continue working hard so that we can remain your favorite band 🔥
      
      #neki #neki_band #girlsband #cajon #drum
