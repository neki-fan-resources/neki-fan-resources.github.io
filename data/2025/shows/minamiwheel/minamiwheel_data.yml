- postx:
    id: 1977673015585624508
    account: coco_102
    label: Thank you
    published-date: 2025-10-13
    text: |-
      #ミナホ ありがとうございました🤙🏻❤️‍🔥
      開演前からの入場規制もめっちゃ嬉しかったです！！
      スネアが破けるくらい全力で楽しめました！！笑
      来年は更に大きなステージに立てるよう頑張るぞっ！
      
      来年2月から始まる全国ツアーでまたみんなの心踊らせに行くので、ぜひ遊びに来てください😌🫶🏻
      
      #NEKI
    translation: |-
      #Minaho Thank you very much 🤙🏻❤️‍🔥
      The crowd control (admission restrictions) before the show even started made us so happy!!
      We gave it our all and had fun until the snare drum broke!! lol
      We're going to work hard so we can stand on an even bigger stage next year!
      
      We're coming to make all your hearts dance again during our nationwide tour starting next February, so please come and join us 😌🫶🏻
      
      #NEKI
    image:
    - G3IbHmEaMAARPBY
    - G3IbHmJaUAAgskC
    part-of:
      show:
        year: 2025
        id: minamiwheel

- postx:
    id: 1977673390971564442
    account: natsu08_guitar
    label: Thank you
    published-date: 2025-10-13
    text: |-
      本日は！2度目のミナホ！
      
      🎉入場規制🎉
      ということで、ステージから見る
      前から後ろの方までパンッパンのBRONZEはさいっこうでした！！！！❤️‍🔥❤️‍🔥❤️‍🔥　
      
      ほんとうに楽しすぎる思い出をありがとう！たくさん声出してくれて嬉しかった😭
      
      また大きくなって絶対ミナホに戻ってきます！
      
      #ミナホ
    translation: |-
      Today was! Our second time at Minaho!
      
      🎉Admission Restricted🎉
      And with that, the BRONZE venue, which was absolutely packed from
      the front all the way to the back when looking from the stage, was the absolute best!!!!❤️‍🔥❤️‍🔥❤️‍🔥　
      
      Thank you so much for the truly fun memories! I was so happy you all cheered so loudly 😭
      
      We'll grow bigger and definitely come back to Minaho!
      
      #Minaho
    image:
    - G3IbdvobMAAAYPR
    part-of:
      show:
        year: 2025
        id: minamiwheel
    reference:
    - postximage:
        post: 1977673015585624508
        image: G3IbHmJaUAAgskC

