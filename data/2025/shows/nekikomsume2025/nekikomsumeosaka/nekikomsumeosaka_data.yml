    translation: |-
      I love that heart-pounding feeling between songs during a live show❤️‍🔥
      
      That moment when everyone's cheers, applause, and the rising excitement for the next song all get mixed together at once is something you can't experience from a recording!!
      
      #NEKI #SpreadingTheWord #NEKcommunity
