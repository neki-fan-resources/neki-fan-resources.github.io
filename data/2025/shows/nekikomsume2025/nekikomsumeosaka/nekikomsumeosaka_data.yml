- postx:
    id: 1946903555937616050
    account: natsu08_guitar
    label: MAZE on stage
    published-date: 2025-07-20
    text: |-
      前回の大阪の熱が冷めないうちに
      MAZE〜！🌀
      撮影OKだったけど、みんな撮影してるとは思えないぐらい盛り上がってくれて声出してくれてほんっとに嬉しかった！♡
      撮影しながらだと盛り上がり下がっちゃうかなーとか思ったけど、ネキ界隈にそんな心配必要なかったね！
      ありがとう！！
      #ネキ界隈 #拡散中
    translation: |-
      Before the heat from the previous Osaka show cools down
      MAZE~!🌀
      Filming was allowed, but I was so happy that everyone got so hyped and raised their voices so much that I couldn't even tell you were filming!♡
      I was worried that the energy might drop if people were filming, but there was no need for such worries with the NEK! community!
      Thank you!!
      #NEKcommunity #SpreadingTheWord
    video:
    - 01
    todo: people film MAZE, check for images
