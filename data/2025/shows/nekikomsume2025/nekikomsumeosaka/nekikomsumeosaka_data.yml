- postx:
    id: 1946211690053505475
    account: cure_bass_baka
    label: Thank you
    info: selfie backstage at NEK!xkomsume Osaka
    published-date: 2025-07-18
    text: |-
      NEK!×komsumeのツーマンライブ2公演終了しました。
      2公演どちらもたくさんの人にお越しいただき嬉しかったし、komsumeさんとも仲良くお話できて本当に嬉しかったです！
      見に来てくれた方や、関わって下さった方もありがとうございました！
      
      P.S.髪を切りすぎた隠しで初帽子ライブでした🧢
    translation: |-
      The two NEK! x komsume two-man live shows have come to an end.
      I was so happy that so many people came to both performances, and I was really glad I got to chat and become friends with everyone from komsume!
      To everyone who came to see us and everyone involved, thank you so much!
      
      P.S. It was my first live show wearing a hat because I cut my hair too short and was hiding it🧢
    image:
    - GwJVNGlboAAgHRY
    part-of:
      show:
        year: 2025
        id: nekikomsumeosaka

- postx:
