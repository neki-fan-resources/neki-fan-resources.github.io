    label: Thank you
    published-date: 2025-07-18
    text: |-
      komsume × NEK!ツーマン大阪編終了しました‼️💥
      フロアを盛り上げてくれた皆さん本当にありがとう！
      大阪も溶けちゃいそうなくらい最高にアツかったね🫠
      komsumeさん今日もバチバチでかっこよかったー！
      
      今日初めて知ってくれた方はぜひ8/30のZeppワンマンも遊びに来てね🔥
    translation: |-
      The komsume × NEK! two-man show Osaka edition has ended‼️💥
      Thank you so much to everyone who hyped up the floor!
      Osaka was incredibly hot, felt like I was going to melt🫠
      komsume were super sharp and cool today too—!
      
      If you just found out about us today, please come hang out at our Zepp solo show on 8/30 too🔥
