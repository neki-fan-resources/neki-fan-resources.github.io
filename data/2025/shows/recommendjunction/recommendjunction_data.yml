- postinstagram:
    id: DRCHp8hEhhQ
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2025-11-14
    text: |-
      .
      2025.11.06
      "リコメンズジャンクション"
      @ EXシアター六本木
      
      遅ればせながら、、
      ありがとうございました！
      
      最強バンドの皆さんと対バンさせていただき、とっても刺激になりした🔥
      ほんとにどのバンドもカッコ良すぎました…
      音楽ってすごいなって、こんなにも力をもらえるんだなと改めて実感しました。
      
      EXシアター、縦にも横にもおっきかったぁぁ！！
      すごかったぁぁ！！！！
      幸せな時間を過ごさせていただきました…！
      いつかまた立てるよう精進して参ります💪🏻❤️‍🔥
      
      #neki #guitarist
    translation: |-
      2025.11.06
      "Recommends Junction"
      @ EX THEATER ROPPONGI
      
      Better late than never,,
      Thank you so much!
      
      Performing alongside such powerful bands was incredibly inspiring🔥
      Seriously, every single band was way too cool...
      It reminded me once again how amazing music is and how much strength it can give you.
      
      EX Theater was so big, both vertically and horizontally!!
      It was incredible!!!!
      I had such a happy time...!
      I'll keep working hard so I can stand on that stage again someday💪🏻❤️‍🔥
      
      #neki #guitarist
