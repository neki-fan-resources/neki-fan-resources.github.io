- postinstagram:
    id: DQyxtV_krcV
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-11-08
    text: |-
      2025.11.06
      
      リコメンズジャンクション無事終了いたしました！
      お越しくださった皆様本当にありがとうございました❤️‍🔥
      
      EX THEATER ROPPONGIという憧れの場所で、集まってくれた皆様と楽しい夜を過ごすことができました！
      ライブ定番曲は勿論、未リリース曲でもたくさん手上げてくれたり、一緒に歌ってくれてありがとうございました！
      皆さんの一緒に楽しもうという心持ちに救われました🥲🙏🏻
      
      ロイヤルギャルさんもチョーキューメイさんもデラックス×デラックスさんも、それぞれの個性を大爆発させながらも洗練された完璧な世界観でフロアを包んでいて、たくさん刺激をいただきました💥
      
      NEK!ももっとBIGなバンドになるぞーーー✊🏻🔥
      
      #neki #neki_band #drum #drummer
    translation: |-
      Recommends Junction has safely concluded!
      Thank you very much to everyone who came❤️‍🔥
      
      We were able to spend a fun night with everyone who gathered at the longed-for venue, EX THEATER ROPPONGI!
      Thank you for raising your hands a lot and singing along, not only for our standard live songs but also for the unreleased songs!
      I was saved by everyone's willingness to enjoy themselves together🥲🙏🏻
      
      ROYAL GIRL, ChoQMay, and DELUXE DELUXE all wrapped the floor in a refined, perfect world view while exploding their respective personalities, and I was very much inspired💥
      
      NEKI will become a BIGGER band tooーーー✊🏻🔥
