    - basicblock:
        id: report
        label: Cocoro's report
        sections:
        - basicsection:
            subsections:
            - textsubsection:
                lines:
                - line:
                  - text: After most concerts, Cocoro publishes her thoughts and impressions of the show.
                - line:
                  - text: "Here is the translation of Cocoro's "
                  - webitem:
                      postinstagram: DQyxtV_krcV
                      text: message
                  - text: ' for the "RECOMMEND JUNCTION" show.'
            - textsubsection:
                label: Translation
                multimedia:
                  postinstagramimage:
                    post: DQt-qyPkhEb
                    image: 02
                lines:
                - line:
                  - text: The "RECOMMEND JUNCTION" show has successfully concluded! Thank you so much to everyone who came ❤️‍🔥
                - line:
                  - text: We were able to spend a wonderful evening with all of you who gathered at EX THEATER ROPPONGI, a venue I’ve always dreamed of performing at! Thank you for raising your hands and singing along so much, not just to our standard live songs, but even to our two unreleased tracks! Your willingness to enjoy the moment together truly lifted our spirits 🥲🙏🏻
                - line:
                  - text: Royal Gal , Choqmay, and Deluxe x Deluxe all wrapped the floor in a sophisticated and complete world-view while simultaneously making their individual personalities absolutely explode. I received so much inspiration from them all 💥
                - line:
                  - text: NEK! is going to become an even BIGGER band!!! ✊🏻🔥
    - basicblock:
        id: tvshow
        label: tv show
        sections:
        - basicsection:
            subsections:
            - textsubsection:
                multimedia:
                  postximage:
                    post: 1971969583360999680
                    image: G13X3u8aUAAgOGP
                lines:
                - line:
                  - text: The production company behind the concert had a show on TV Asahi presenting its activity a couple of weeks before the concert. A segment of the show was about the RECOMMEND JUNCTION concert.
                - line:
                  - text: Kubuto-san, the organizer of the "Girl's Up!!!" shows at Shibuya eggman, spoke about his recommendation of NEK!.
