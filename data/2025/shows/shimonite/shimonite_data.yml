- postinstagram:
    id: DR8h2nMkt7s
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-12-07
    text: |-
      2025.12.06
      ⁡
      下北沢にて'25ありがとうございました💜
      初めましてのイベントに初めましての会場、初めてづくしでとても楽しかったです！
      Flowers Loftさんはフロアとの距離がとても近くて、みなさんの熱気を直に感じられました！私たちの空気感や気合いもみなさんに届いてたら嬉しいです🔥
      ⁡
      フェスやサーキットのいいところは、NEK!を気になってくれている方にNEK!の良さをライブでありのまま伝えられるところだと思っています😌
      今回NEK!と出会ってくれた方も、来年の2月からNEK!初の全国ツアーが始まるので(チケット先行受付今日の23:59まで…！)ぜひゲットしてワンマンも遊びに来てほしいです🔥
      
      最近本格的に寒くなってきたのでぜひみなさん温かくしてお過ごしください❄
      またお互い元気な状態で次のライブ会えますように！！
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2025.12.06
      ⁡
      Thank you for Shimokitazawa Nite '25 💜
      It was a first-time event and a first-time venue, and I really enjoyed all the firsts!
      The distance to the floor at Flowers Loft was very close, and I could directly feel everyone's enthusiasm! I hope our atmosphere and spirit reached everyone too 🔥
      ⁡
      I believe the great thing about festivals and circuit events is that we can convey the true appeal of NEK! through a live performance to those who are curious about us 😌
      For those who discovered NEK! this time, our first national tour starts in February next year (ticket pre-sale ends today at 23:59...!) so please grab tickets and come to a one-man show too 🔥
      
      It's gotten genuinely cold recently, so please keep warm, everyone ❄
      May we both be well and see each other at the next show!!
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
