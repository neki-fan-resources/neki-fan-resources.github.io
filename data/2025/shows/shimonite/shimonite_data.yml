    id: 1997265889742503940
    account: coco_102
    label: Thank you
    published-date: 2025-12-06
    text: |-
      下北沢にて'25ありがとうございました😈💜
      初めましてのイベントに初めましての会場と、初めてづくしで楽しかったです！
      やっぱりライブをしているときがいちばん生きてる実感がある。本当に感謝！！
      
      2月からの全国ツアーでもみなさんと一緒にアツい時間共有したいです！各地でお待ちしております🔥
    translation: |-
      Thank you for Shimokitazawa Nite '25 😈💜
      It was a lot of fun, with a first-time venue and a first-time event!
      I really feel the most alive when I'm performing a live show. Truly thankful!!
      
      I want to share that passionate time with everyone on the national tour starting in February! Looking forward to seeing you all in every city 🔥
