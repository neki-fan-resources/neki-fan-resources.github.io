      ~Shinjuku club SCIENCE 10th Anniversary ~
      
      Thank you for today as well!!
      The super-heated live show, which was an aggressive attack full of new songs, was a lot of fun🔥
      I was happy everyone was grooving along to the song we performed for the first time!
      
      After this, the new song GiMMiCK will start streaming from midnight, so please look forward to that too😎
