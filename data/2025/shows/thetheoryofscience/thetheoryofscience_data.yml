- postx:
    id: 1990790079674290383
    account: natsu08_guitar
    label: Thank you
    published-date: 2025-11-18
    text: |-
      本日もありがとうございました‼️
      皆さんとの距離が近くて熱気を感じられて熱々のライブでした🔥
      そして新曲披露いたしました〜！！
      どうでしたかー？？
      みなさんとまたこの曲をライブで作り上げて行けたらいいなと思っております！🫶🏻
    translation: |-
      Thank you for today as well‼️
      The distance with everyone was close, and I could feel the passion, making it a super-heated live show🔥
      And we performed a new song today!!
      How was it??
      I hope we can continue to build up this song together with all of you at future shows!🫶🏻
