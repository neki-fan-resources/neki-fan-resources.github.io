    id: 1897978402562621687
    account: natsu08_guitar
    label: Starts tomorrow
    published-date: 2025-03-07
    text: |-
      ついに！
      明日からNEK!初東名阪ツアー、スタートです！❤️‍🔥
      3公演全て120%全力で駆け抜けますので、さいっこうの思い出を作りましょう🔥🔥🔥
