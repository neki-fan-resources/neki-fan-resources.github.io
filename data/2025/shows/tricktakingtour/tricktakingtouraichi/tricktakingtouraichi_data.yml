- postx:
    id: 1901057755311731067
    account: coco_102
    label: zero-sum Cocoro cam, show today
    published-date: 2025-03-16
    text: |-
      本日は「TR!CK TAK!NG」ツアーファイナルです！！
      
      NEK!にとって初めての東名阪ワンマンツアー、毎回色々あったけど楽しかった！ほんと始まっちゃうとあっという間！
      今日も悔いのないように楽しみまくるぞ〜〜💪🏻🎶
      
      天気悪いからみんな気をつけてきてね！
      Spotify O-WESTで待ってます❤️‍🔥
    translation: |-
      Today is the "TR!CK TAK!NG" tour final!!
      
      NEK!'s first Tokyo-Nagoya-Osaka one-man tour—there was a lot happening every time, but it was fun! Once it starts, it really goes by in a flash!
      I'm going to enjoy myself to the fullest today so there are no regrets~~💪🏻🎶
      
      The weather is bad, so everyone please be careful on your way!
      Waiting for you at Spotify O-WEST❤️‍🔥
