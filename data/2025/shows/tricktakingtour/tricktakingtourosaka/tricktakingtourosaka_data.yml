    label: About the band progression
    published-date: 2025-03-08
    text: |-
      NEK! 1stワンマンツアー「TR!CK TAK!NG」@ アメリカ村DROP
      
      トリックテイキングは、小さな勝負を繰り返してポイントを獲得していくゲームだけど、着実に1歩ずつ階段を上がる4人の強さを見ました！
      
      MCで「今日は初めてのことをしました」って言ってくれたのは……また告知します🥹
      
      #NEKI  #RI802
    translation: |-
      NEK! 1st One-Man Tour 「TR!CK TAK!NG」 @ Amerikamura DROP
      
      Trick-taking is a game where you gain points by winning small rounds repeatedly, and I saw the strength of the four members as they steadily climb the stairs one step at a time!
      
      The thing they said in the MC, "We did something for the first time today"... I will announce that later🥹
      
      #NEKI #RI802
