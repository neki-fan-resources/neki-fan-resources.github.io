- postinstagram:
    id: DHS7gafPqYZ
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-03-17
    text: |-
      2025.03.16
      
      NEK!初の東名阪ワンマンツアー 「TR!CK TAK!NG」
      ツアーファイナルの東京公演が昨日無事終演いたしました〜！！🎉
      
      お足元の悪い中お越しくださった皆様本当にありがとうございました！寒かったけど、私たちの音で暖まれましたかね？
      
      大阪愛知と回ってきて(またそれぞれのレポも書くね)、どこも甲乙つけがたいほどの盛り上がりっぷりを見せてくれて、最高にアツいツアーとなりました🔥
      
      大阪も愛知も前回訪れたときよりもお客さんが増えたし、曲中の歓声とかコーラスも比べ物にならないくらい大きくなっていて、NEK!の輪が広がっているのをひしひしと実感しました。昨日はお子さんも来てくれてて嬉しかったな☺️
      
      そんな激アツなツアーを締めくくる昨日の東京公演。
      登場SEが流れて順番的に私がいちばん最初にステージに上がったのですが、ソールドアウトした満員のフロアが目に飛び込んできた瞬間、わー！！と驚きを隠せませんでした🫢💥
      お立ち台に立ったときになにかポーズ決めたりしようかな〜と直前までは思っていたけど、嬉しさで頭真っ白になっちゃって、結局なにもできなかった…！笑
      
      ここにいる全員に、今日来てよかったな。NEK!ってやっぱりかっこいいな。と思いながら帰ってもらえるような演奏をお届けしよう！！と意を決してドラムに向かいました。
      
      今作リード曲のzero-sumから始まり、今回のツアーから披露している新曲もいくつかやらせていただいて、そして途中のアコースティックコーナーではGt.のNatsuはアコギに持ち替え、私はカホンにチェンジして特別バージョンのLonerと令現少女をお届けしました。
      
      MCでも話したように、NEK!の楽曲は音数が多くてテンポも速くて激しい楽曲が多いので、なかなかアコースティックバージョンにアレンジするのが難しいこともあるのですが、どんどんレパートリー増やしていけたらなと思っているので、今後も楽しみにしててくださいね💫
      
      後半はもう休む暇もなくブチアゲソングの連発で、汗だくになりながら会場一帯となって楽しめてめちゃめちゃ嬉しかったです！
      
      Lonerの大合唱とかDreams!!!!のoh oh!とか挙げたらキリがないけど、本当に皆さんの声が大きくてやばかった！笑
      これは負けてられんぞ…！と思いながら私もハートを燃やして頑張りました😂❤️‍🔥
      ファンとプレイヤーの相乗効果で最高の空間が生まれ、そのまま本編は終了！
      
      zero-sumでアンコールが始まり、MCでは今年の8/30に行うZepp Shinjukuでのワンマンライブを解禁させていただき、興奮冷めやらぬままNEK!の始まりの曲Get Overで幕を閉じました⚡️
      
      Zepp Shinjuku、やばいでしょ？
      
      このバンドを始めるまでは、Zeppでワンマンライブをやりますとステージ上で発表する日が来るとは思ってもいなかったので、心の底から込み上げてくる嬉しさと、発表を聞いて喜んでくれている皆さんの姿を見て、感極まりながらGet Overを演奏しました🥲
      
      結成してまだ1年半も経たない私たちがZeppなんてまだ早いんじゃないか？と、本当に埋められるのか？と、皆さんに思われることは十分理解しています。
      
      でも、そういう人たちにそんな心配いらなかったねと笑ってもらえるくらいの景色を8月30日に必ず見せます。
      昨日、フロア一面に広がった無数の笑顔を見てNEK!ならできると確信しました。
      
      ですが、確実に易々と越えられるような壁ではないから、死ぬ気で努力しないといけないということもわかっています。
      個人としてもバンドとしても今のままではいけない。
      
      ライブの本数は去年よりも少ないですが、日々SNSなどを通して皆さんにいろんな形で"想い"をお届けするので、ぜひこれからも見守っていただけたら幸いです。
      
      NEK!という4人の少女達がまたひとつ大きな夢を叶える姿を目撃しに来てください。
      
      このタイミングでこんな素敵な挑戦をさせてくれる周りの環境に心から感謝しつつ、これからも精進して参ります🔥
      
      昨日は本当にありがとうございました！！！！
      
      Photo by @ryuji_kinmruj 
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #拡散中 #ネキ界隈
    translation: |-
      2025.03.16
      
      NEK!'s first East-Mei-Han one-man tour "TR!CK TAK!NG"
      The tour final Tokyo performance successfully concluded yesterday!! 🎉
      
      Thank you so much to everyone who came despite the bad weather! It was cold, but did our sound warm you up?
      
      Traveling through Osaka and Aichi (I'll write reports for each of those too), every location showed an excitement that was hard to rank, making it an incredibly hot tour🔥
      
      The number of audience members in both Osaka and Aichi increased compared to our last visits, and the cheers and choruses during the songs grew incomparably louder; I keenly felt that the NEK! circle is expanding. I was also happy to see children coming yesterday ☺️
      
      Yesterday's Tokyo performance concluded such a high-intensity tour.
      The entrance SE played and, following the order, I was the first to step onto the stage; the moment the sight of the sold-out, packed floor hit my eyes, I couldn't hide my surprise—Whoa!! 🫢💥
      Until right before, I thought about doing a pose when I stood on the platform, but my mind went blank with joy and I ended up doing nothing...! lol
      
      I sat at my drums with the determination to deliver a performance that would make everyone here think, "I'm glad I came today" and "NEK! really is cool," as they head home!!
      
      Starting with this work's lead track "zero-sum," we performed several new songs debuted during this tour, and during the acoustic corner in the middle, Gt. Natsu switched to acoustic guitar and I changed to cajon to deliver special versions of "Loner" and "Reigen Shoujo."
      
      As mentioned in the MC, many of NEK!'s songs have many notes, fast tempos, and are intense, so it can be difficult to arrange them into acoustic versions, but I hope to keep increasing our repertoire, so please look forward to it in the future💫
      
      The second half was a continuous barrage of hype songs with no time to rest, and I was so happy to enjoy it with the whole venue as one while getting drenched in sweat!
      
      The "Loner" sing-along, the "oh oh!" in "Dreams!!!!"—there's no end to the list, but your voices were truly loud and crazy! lol
      Thinking "I can't let them beat me...!", I worked hard with my heart burning too😂❤️‍🔥
      The synergy between fans and players created the best space, and the main set ended just like that!
      
      The encore began with "zero-sum," and during the MC, we announced our one-man live at Zepp Shinjuku on 8/30 of this year. With the excitement still lingering, we closed the curtain with NEK!'s starting song, "Get Over"⚡️
      
      Zepp Shinjuku, isn't that crazy?
      
      Until I started this band, I never thought the day would come when I'd announce on stage that we're doing a one-man live at Zepp. Feeling joy welling up from the bottom of my heart and seeing everyone happy to hear the announcement, I played "Get Over" while feeling overwhelmed with emotion🥲
      
      I fully understand that people might think, "Isn't it too early for Zepp when it hasn't even been a year and a half since they formed?" or "Can they really fill it?"
      
      However, I will definitely show everyone a view on August 30th that will make those people laugh and say there was no need to worry.
      Seeing the countless smiles spread across the floor yesterday, I am convinced that NEK! can do it.
      
      But I also know that it's certainly not a wall that can be easily overcome, so we must work to the death.
      As an individual and as a band, we cannot stay as we are now.
      
      While we have fewer live shows than last year, we will deliver our "feelings" to you in various forms through SNS every day, so I would be grateful if you would continue to watch over us.
      
      Please come and witness the moment these four girls called NEK! fulfill another big dream.
      
      While feeling heartfelt gratitude toward the environment around us that allows us to take on such a wonderful challenge at this timing, I will continue to devote myself🔥
      
      Thank you truly for yesterday!!!!
      
      Photo by @ryuji_kinmruj 
      
