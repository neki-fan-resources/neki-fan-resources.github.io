    published-date: 2025-03-17
    text: |-
      2025.03.16 TOKYO Spotify O-WEST
      
      3/8 OSAKA DROP
      3/9 AICHI R.A.D
      
      NEK!初の東名阪ワンマンツアー〝TR!CK TAK!NG〟
      
      ホント楽しい時間ってあっという間だ！
      この3日間ありがとうございました！
      
      NEK!と出会う前とは違う楽しさと景色があり
      一つ一つ夢が叶ってる気がしてます。
      いつもNEK!を応援して下さる皆様には
      本当に感謝でいっぱいです。
      
      ありがとう。
      
      そして最終日に皆様にお伝えした
      夢でもあり一つの通過点でもある場所
      Zepp新宿でのワンマンライブ。
      
      胸を張ってこれが私たちだと言える景色と
      いつも支えて下さってる皆様の背中を少しでも押せるような
      ライブに絶対にする。
      
      これからも進化し続けるNEK!をよろしくお願いします！
      Zepp新宿でお会いしましょう！
      
      Photo by @ryuji_kinmruj
      
