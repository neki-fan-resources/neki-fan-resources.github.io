      2025.03.16 TOKYO Spotify O-WEST
      
      3/8 OSAKA DROP
      3/9 AICHI R.A.D
      
      NEK!'s first Tokyo-Nagoya-Osaka one-man tour "TR!CK TAK!NG"
      
      Truly, fun times go by in the blink of an eye!
      Thank you so much for these 3 days!
      
      There's a fun and scenery different from before I met NEK!
      I feel like my dreams are coming true one by one.
      To everyone who always supports NEK!,
      I am truly full of gratitude.
      
      Thank you.
      
      And, what we told everyone on the final day—
      the place that is both a dream and a milestone,
      a one-man live at Zepp Shinjuku.
      
      A scene where we can hold our heads high and say this is who we are,
      and a live show that will definitely give a little push to the backs
      of everyone who always supports us.
      
      Please continue to support NEK! as we keep evolving!
      See you at Zepp Shinjuku!
      
