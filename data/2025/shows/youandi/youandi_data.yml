- postinstagram:
    id: DFSLXg4PRqH
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2025-01-26
    text: |-
      2025.01.26
      
      優利香Presents「You&I ～未来浮かべ浮かれSmile～」てんこ盛り編
      に出演いたしました❤️‍🔥
      お越しくださった皆様ありがとうございました！！
      
      主催の優利香さんとはNEK!の初ライブ以来の再会！
      こんな大切なツアーファイナルにお誘いいただいて本当にありがとうございました🥹✨️出演できて嬉しかったです！
      出番終わりにお写真も撮らせていただきました📸(5枚目)
      
      早めの時間のトッパーでしたがフロアも埋まってて、ファンの皆さんの声援もすごく大きくて、最高の2025年ライブ初めとなりました👊🏻🔥ありがとう！！
      
      今回のセトリはイベントのニュアンスに合わせて、激しめ楽曲を若干封印しつつ爽やか系のロックとかミディアムバラード曲を多めにお届けしてみました！
      
      楽しんでいただけましたか？？🌞
      
      次回のライブは、2/6(木) Wisteria×FOWS「Set All Free!!」
      初めての渋谷FOWS、楽しみだな〜〜
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
    translation: |-
      2025.01.26
      
      We performed at Yurika Presents "You&I ~Mirai Ukabe Ukare Smile~" Tenkomori Edition❤️‍🔥
      Thank you so much to everyone who came!!
      
      Reunited with the organizer, Yurika-san, for the first time since NEK!'s first live!
      Thank you so much for inviting us to such an important tour final🥹✨️ I was so happy we could perform!
      We even took a photo together after our set📸 (5th slide)
      
      Even though we were the early openers, the floor was packed and the fans' cheers were so loud, making it the best first live of 2025👊🏻🔥 Thank you!!
      
      To match the vibe of the event, we kept the heavy tracks tucked away a bit and delivered a set with more refreshing rock and medium ballads!
      
      Did you enjoy it??🌞
      
      Our next live is 2/6 (Thu) Wisteria×FOWS "Set All Free!!"
      My first time at Shibuya FOWS, I'm looking forward to it~~
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer
