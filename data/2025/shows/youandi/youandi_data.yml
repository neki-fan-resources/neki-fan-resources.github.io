- postx:
    id: 1884890104277459227
    account: coco_102
    label: MAZE on stage
    info: Cocoro
    published-date: 2025-01-30
    text: |-
      💥🌀MAZE🌀💥
      
      まじここの一連の流れ楽しすぎる〜〜！！
      終始各パート最高な動きしてるんだけど、特に"秒でスワイプブロック"の後ろでやってるベースラインのうねり具合が聴いてて最高に気持ちいい🤘❤️‍🔥
      フロアの掛け声もいい味出してる！！ほんと最高！
      
      続きも聴きたくなるけど、それはまた今度ね😈
    translation: |-
      💥🌀MAZE🌀💥
      
      This whole sequence here is just too much fun~~!!
      Every part is doing amazing things from start to finish, but that swelling bassline playing behind "Swipe block in a sec" feels especially good to listen to🤘❤️‍🔥
      The shouts from the floor add a great touch too!! Truly the best!
      
      I know it makes you want to hear the rest, but that's for next time😈
