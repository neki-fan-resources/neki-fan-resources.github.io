- postinstagram:
    id: DUkxRDAEtct
    account: natsu08_guitar
    label: 2nd anniversary
    published-date: 2026-02-10
    text: |-
      .
      2026.02.10
      NEK!は結成2周年を迎えました。
      
      いつも応援してくださっているファンの皆さんのおかげです。
      本当にありがとうございます！
      
      毎日が本当に濃すぎて、まだ2年しか経っていないのかと思う気持ちと
      もう2年経ったのかと思う気持ちの
      二つの感情に挟まれています。
      
      メンバーと出会い、そしてファンの皆さんと出会い、
      この2年間でたくさんの大切な宝物ができました。
      NEK!として、皆さんと出会えたことを心から幸せに思います。
      
      これからもNEK!をよろしくお願いします🙇🏻‍♀️
      
      #NEKI #girlsband
    translation: |-
      .
      2026.02.10
      NEK! celebrated its 2nd anniversary since formation.
      
      It is all thanks to the fans who always support us.
      Thank you so truly much!
      
      Every day is so incredibly intense that I'm caught
      between the feeling that only two years have passed
      and the feeling that two years have already gone by.
      
      Meeting the members, and meeting all of the fans,
      I have gained many precious treasures over these two years.
      As a member of NEK!, I am sincerely happy to have met you all.
      
      Please continue to look after NEK!🙇🏻‍♀️
      
      #NEKI #girlsband
