- postinstagram:
    id: DUkb34XEsG0
    account: 46_hikaa
    label: 2nd anniversary
    published-date: 2026-02-10
    text: |-
      2月10日はNEK!の結成記念日。
      
      今日でNEK!は2周年を迎えました。
      
      改めてこのメンバーに出会えてよかった。
      そして、NEK!と出会ってくれて
      いつも応援して下さる皆様が居たから
      2周年を迎えることができました！
      
      本当にありがとうございます。
      
      これからもNEK!らしくNEK!の音楽を届けていきます！
      よろしくお願いします！
    translation: |-
      February 10th is NEK!'s formation anniversary.
      
      Today, NEK! celebrates its 2nd anniversary.
      
      I'm so glad I met these members.
      And because all of you met NEK!
      and have always supported us,
      we were able to reach this 2nd anniversary!
      
      Thank you so very much.
      
      From here on, we will keep delivering NEK!'s music in our own way!
      We look forward to your continued support!
