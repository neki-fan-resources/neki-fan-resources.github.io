- postx:
    id: 2064705233583022409
    account: natsu08_guitar
    label: Major debut
    published-date: 2026-06-10
    text: |-
      改めましてついに本日6/10 、ポニーキャニオンさんより、メジャーデビューしました。
      
      これからもNEK!らしさは忘れずに、皆さんと一緒に一歩ずつ上へ上へ駆け上がっていきたいです。
      一緒にいろんな景色を見に行こうね！
      これからもNEK!をそしてGt.Natsuをよろしくお願いします！
    translation: |-
      Once again, today on 6/10, we finally made our major debut with Pony Canyon.
      
      We will keep moving forward without forgetting what makes NEK! who we are, and we want to run up higher and higher together with everyone, step by step.
      Let's go see all kinds of beautiful sights together!
      Please continue to support NEK! and Gt.Natsu!
