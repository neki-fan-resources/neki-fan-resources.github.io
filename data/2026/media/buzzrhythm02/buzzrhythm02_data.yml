- postx:
    id: 2032456248143302710
    account: coco_102
    label: Tonight
    published-date: 2026-03-13
    text: |-
      今夜25:09~「バズリズム02」出演します！！
      実は私昔からバカリズムさんの大大大ファン(もちろんドラマ過去作全部観てます)なので、今回お話できて本当に嬉しかったです🥲🌼
      
      そして対バンライブではGet Overを披露しました🔥
      NEK!のライブの雰囲気を感じてもらえたら嬉しいです！お見逃しなく！！
    translation: |-
      I'll be appearing on "Buzz Rhythm 02" tonight at 25:09~!!
      Actually, I've been a huge, huge, huge fan of Bakarhythm for a long time (of course, I've seen all his past dramas), so I was truly happy to get to talk with him this time🥲🌼
      
      And we performed "Get Over" during the split-bill live performance🔥
      I'd be happy if you could get a feel for the atmosphere of a NEK! live show! Don't miss it!!
    image:
    - HDS8LpAbYAAqruK
    part-of:
      postx: 2032385940434612429

