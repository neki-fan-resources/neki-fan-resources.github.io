      The 3rd one! Thank you so much!!
      Once again, it was so much fun to appear on the radio in Sendai and Fukushima!!
      
      Please come and hang out at the live shows
      Tomorrow is Sendai! The day after is Fukushima!!
      We'll be waiting for you❤️‍🔥❤️‍🔥
