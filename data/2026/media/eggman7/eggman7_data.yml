                - line:
                  - text: In the interview, NEK! reflect on their major debut, discuss which member has changed the most since the band formed, share the details behind their major debut single "FLiCK", and reveal their individual goals for the future.
                - line:
                  - text: 'The previous interview on "eggman":'
                  - newline: ''
                  - media:
                      year: 2025
                      id: eggman11
