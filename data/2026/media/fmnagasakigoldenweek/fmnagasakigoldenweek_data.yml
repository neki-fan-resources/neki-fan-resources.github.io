                - line:
                  - text: NEK! was invited by FM Nagasaki for the Golden Week special built around artists with roots in the Nagasaki area.
                - line:
                  - text: They spoke about Sasebo, Hika's hometown, and their experiences in Kyushu during their first national tour.
                - line:
                  - text: They also shared fun anecdotes of each member showing their 'aneki' (big sister) side to each other.
