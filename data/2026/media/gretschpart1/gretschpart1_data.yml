    text: |-
      結成からわずか2年で、今年すでにメジャーデビューすることが決まっている人気上昇中のガールズロックバンド、NEK!からHikaとNatsuがグレッチのスペシャルインタビューに登場🎸
      
      本日インタビュー前編が公開！
      
      詳しく読む⏩https://gretschguitars.jp/blog/2026/3/nek-special-interview/1212/
      
      @nekiband_jp
       
      @46_hikaa
       
      @natsu08_guitar
    translation: |-
      Hika and Natsu from the rising girls rock band NEK!, who have already decided to make their major debut this year just two years after forming, appear in a Gretsch special interview🎸
      
      The first part of the interview is released today!
      
      Read more⏩https://gretschguitars.jp/blog/2026/3/nek-special-interview/1212/
      
      @nekiband_jp
       
      @46_hikaa
       
