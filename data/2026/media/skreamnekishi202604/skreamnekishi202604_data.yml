                - line:
                  - text: In the second installment of the column, Natsu introduces herself as 'NEK!'s guitarist, Natsu.'
                - line:
                  - text: She reflects on her journey as a musician, what it means to her to be part of NEK!, and how much she loves sharing the atmosphere of live shows with the fans.
    - basicblock:
        id: translation
        label: translation
        sections:
        - basicsection:
            subsections:
            - textsubsection:
                lines:
                - line:
                  - text: The translation was done using Google Gemini, with continuous additional inputs for accuracy.
                - line:
                  - text: '&nbsp;'
            - interviewsubsection:
                lines:
                - text: '皆さんこんにちは！<br>NEK!のGt.Natsuです！<br>初のコラム連載「NEK!の #ネキ史」第2回は私が担当します！<br>やったーー！'
                  translation: "Hello everyone!<br>I'm Natsu, the guitarist of NEK!!<br>I'm in charge of the 2nd installment of our first column series, \"NEK!の #ネキ史\"!<br>Yay!!"
                  participant: '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'
                - text: ということで何を書こうか迷ったのですが、せっかくなのでNEK!のGt."Natsu"に焦点を置いて、自己紹介がてら書いていきます！
                  translation: So I wasn't sure what to write about, but since I have the chance, I'll focus on NEK!'s guitarist "Natsu" and write this as a self-introduction!
                - text: では最初に音楽ルーツやNEK!のNatsuになるまでのお話を少しだけ！
                  translation: So first, a little bit about my musical roots and how I became NEK!'s Natsu!
                - text: '&nbsp;'
                - text: 私は父に勧められて小学生の時にギターを始めました。父が持っていたフェンダーのストラトを譲ってもらったのがきっかけです。最初は弦の押さえ方も分からず、<br>YouTubeを見ながら見よう見まねで練習していました。Fコードにはかなり苦戦して、「本当にこれで鳴るの？」って思いながら弾いてました笑<br>でも少しずつできることが増えていって、手に豆ができるのが嬉しくてよく母に見せてたなー。
                  translation: I started playing guitar in elementary school because my dad suggested it. It all started when he handed down his Fender Strat to me. At first, I didn't even know how to press the strings down,<br>so I practiced just by watching YouTube and mimicking what I saw. I really struggled with the F chord, playing it while thinking, "Is this really going to make a sound?" lol<br>But little by little, I could do more things, and I was so happy getting calluses on my hands that I used to show them to my mom a lot.
                - text: そんな中で父から教えてもらって出会ったのがEric Claptonさん。そこから「Layla」を練習し始めました。<br>コードも単音もあって難しかったけどすごくいい練習になって、特に後半のメロディアスなパートが大好きで、ギターの音の美しさに衝撃を受けたのを覚えています。
                  translation: Around that time, my dad introduced me to Eric Clapton. From there, I started practicing "Layla."<br>It had both chords and single notes so it was hard, but it was really good practice. I especially loved the melodious part in the second half, and I remember being blown away by the beauty of the guitar's sound.
                - text: その後はThe Rolling StonesやDeep Purpleもよく弾いていて、「Paint It, Black」や「Smoke on the Water」は大好きでめちゃくちゃ練習してました！
                  translation: After that, I also played a lot of The Rolling Stones and Deep Purple. I loved "Paint It, Black" and "Smoke on the Water" and practiced them like crazy!
                - text: そしてギター人生で大きな出会いがありました。ギターを始めて2年目くらいの時にBABYMETALに出会い、神バンドの存在を知りました。当時見た動画で演奏をしていた大村孝佳さん、藤岡幹大さんに衝撃を受けて、ギターの世界が一気に広がりました。BABYMETALの曲を弾けるようになりたいと思うようになって、新しいジャンルにも挑戦するようになりました。この出会いは本当に大きくて、今の自分にも繋がっていると思います。
                  translation: And then, I had a huge encounter in my guitar life. About two years into playing guitar, I discovered BABYMETAL and learned about the Kami Band. I was absolutely blown away by Takayoshi Ohmura and Mikio Fujioka playing in the videos I saw back then, and my world of guitar suddenly expanded. I started wanting to play BABYMETAL's songs, which led me to challenge myself with new genres. This discovery was truly huge for me, and I think it connects directly to who I am today.
                - text: ただ、一度離れた時期もありました。尊敬していた方の訃報や脱退が重なって、モチベーションを保てなくなってしまって......。
                  translation: However, there was a time when I took a step back from it. The passing and departure of people I deeply respected happened one after another, and I just couldn't keep my motivation up......
                - text: そんな時に大学で軽音サークルに入りました。そこでバンドで演奏する楽しさを思い出して、誰かを追いかけることも大切だけれど、「自分が楽しいと思えることが一番大事なんだ」と気づきました。その時の仲間には今でも感謝しています。
                  translation: While I was still going through that, I joined a light music club at my university. There, I remembered how fun it is to play in a band. I realized that while it's important to look up to someone, "doing what I genuinely enjoy is the most important thing of all." I’m still incredibly grateful to my friends from back then.
                - text: そしてそのタイミングでHikaからバンドのお誘いがSNSのDMを通じて来たのです！！<br>今思うと本当に奇跡みたいな出来事です。
                  translation: And right at that perfect timing, I got a DM on social media from Hika inviting me to join a band!!<br>Looking back on it now, it really feels like a miracle.
                - text: '&nbsp;'
                - text: こうしてNEK!に出会いました。<br>私にとっては人生を変える出会いでした。
                  translation: That is how I met NEK!.<br>For me, it was a life-changing encounter.
                - text: SNSからバンドが始まるなんて、ギターを始めた頃は想像もしてなかったです笑<br>改めて誘ってくれたHikaには感謝しかないです。
                  translation: I never imagined when I first started playing guitar that a band could start from social media lol<br>Once again, I have nothing but gratitude for Hika for inviting me.
                - text: メンバー3人とも尊敬することばかりで、<br>そんなメンバーと一緒にバンドができていること、夢を追いかけられていることが本当に幸せです。
                  translation: There is so much I respect about all three of the other members,<br>and I am truly happy that I get to be in a band and chase my dreams with bandmates like them.
                - text: これまでの人生を振り返ると、本当に周りの人に恵まれてきたなと思います。
                  translation: Looking back on my life so far, I really feel that I've been blessed with the people around me.
                - text: 友達や先生、サークルの仲間、バイト先の方々、そしてNEK!に関わってくださるすべての方。
                  translation: My friends, teachers, club mates, people from my part-time jobs, and everyone involved with NEK!.
                - text: この場を借りて感謝を伝えたいです。
                  translation: I want to take this opportunity to say thank you.
                - text: '&nbsp;'
                - text: そしてなにより応援してくださるファンの皆さんにも感謝の気持ちでいっぱいです。<br>いつも本当にありがとうございます！<br>みんながいてくれて今のNEK!があります。<br>これからも一緒にもっと上へ駆け上がっていけたら嬉しいです！
                  translation: And most of all, I am full of gratitude for all the fans who support us.<br>Thank you so much, always!<br>NEK! is what it is today because of all of you.<br>I'd be so happy if we could keep climbing higher together from here on out!
                - text: 結成から約2年。<br>SNSのDMから始まったガールズバンドNEK!は、現在初の全国ツアー開催中です！<br>夢の1つでもあった全国ツアー！
                  translation: It's been about 2 years since we formed.<br>The all-girl band NEK!, which started from a social media DM, is currently on our first national tour!<br>A national tour was one of our dreams!
                - text: すでに数カ所ツアーを回っていますが、自分にとって忘れることのないツアーになると感じています。<br>ファンの皆さんと同じ場所で同じ時間を過ごせるこの瞬間が、どれだけ尊いものか......<br>改めてこの空間が大好きだなと実感しています。<br>そしてツアーだからこそ、全国にNEK!の音楽が届いていることを肌で感じられて、本当に嬉しいです。
                  translation: We've already played a few stops on the tour, but I feel like this is going to be an unforgettable tour for me.<br>Being able to spend the same time in the same place with all of you fans, just how precious these moments are......<br>It makes me realize all over again how much I love this atmosphere.<br>And precisely because it's a tour, I can feel firsthand that NEK!'s music is reaching across the country, which makes me really happy.
                - text: ライブでしか見られないNEK!を、ぜひ観に来てください！
                  translation: Please come see the NEK! that you can only experience at a live show!
                - text: '&nbsp;'
                - text: これまでたくさんの選択をしてきて、後悔して涙したこともあったけど、<br>今こうしてNEK!に出会えていることを考えると、全部意味のある選択だったなと思います。
                  translation: I've made a lot of choices up to now, and there were times I cried in regret, but<br>when I think about how I am here with NEK! right now, I feel like every single choice had a meaning.
                - text: 長くなりましたが、これがNEK!のGt.Natsuです！！<br>少しでも伝わっていたら嬉しいです！<br>ライブでお会いましょう！！
                  translation: This got a bit long, but this is NEK!'s guitarist Natsu!!<br>I'd be happy if my feelings got across to you even just a little bit!<br>See you at a live show!!
                - text: ばいばいっ！
                  translation: Bye-bye!
