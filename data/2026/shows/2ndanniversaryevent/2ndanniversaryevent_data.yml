- postx:
    id: 2021568213436498320
    account: nekiband_jp
    label: Meeting BAND-MAID
    published-date: 2026-02-11
    text: |-
      BAND-MAID 番外編お給仕
      “Sessions Selection”
      
      本日ライブを拝見し、
      終演後にご挨拶のお時間もいただきました。
      
      私たちが大きなリスペクトを抱く皆さまの圧巻のパフォーマンスに、終始感激と刺激をいただきました。
      
      一つひとつのライブを大切にこれからも歩んでまいります。
      
      #bandmaid さん
      #NEKI
    translation: |-
      BAND-MAID Extra Edition Service
      “Sessions Selection”
      
      I watched the live performance today,
      and was given time to say hello after the show.
      
      We were deeply moved and inspired throughout by the stunning performance of everyone, for whom we hold immense respect.
      
      We will continue to move forward, treasuring each and every live performance.
      
      #bandmaid
      #NEKI
