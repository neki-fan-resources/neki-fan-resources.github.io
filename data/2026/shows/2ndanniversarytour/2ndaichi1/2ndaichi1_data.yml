- postinstagram:
    id: DWjSqYmmtzr
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-31
    text: |-
      2026.03.28
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      NAGOYA JAMMIN'ありがとうございました🙂‍↕️💫
      ⁡
      約1年ぶりの愛知でしたが、皆さんが待ってくれていたのがスタートから伝わってきてこっちもフロアの熱量にバチバチ応えてお互い汗だくの最高の夜になりました！！
      ⁡
      ライブ前には名古屋ならではの味噌カツ弁当を食べて、お腹いっぱいで挑んだのにライブが終わったらお腹すきまくってて楽屋戻って秒で焼肉弁当を掻き込みました笑
      ⁡
      気づかないようにしていたけど、今回の全国ツアーが始まってから完全に私の胃は調子に乗っています。
      各地で美味しいご当地グルメ食べられるからってさ、、🫩
      このままじゃ太るから自制しなくてはという気持ちと、全国ツアーの醍醐味ってこれだしワンマンやったらプラマイゼロだろうという思考がせめぎ合う日々です。
      
      きっとこのままファイナルまで美味しいものを食べ続けることでしょう。それで良いのだ。きっと😌
      
      愛知公演2日目についてはまた次回の投稿で👋🏻
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.03.28
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Thank you NAGOYA JAMMIN'🙂‍↕️💫
      ⁡
      It’s been about a year since we were in Aichi, and I could tell from the very start that everyone had been waiting for us. We responded to the floor’s energy with everything we had, making it the best night where we were both drenched in sweat!!
      ⁡
      Before the show, I ate a Nagoya-style miso katsu bento and faced the stage feeling full, but by the time the live was over, I was starving and shoveled down a yakiniku bento the second I got back to the dressing room lol
      ⁡
      I've been trying to ignore it, but since this national tour started, my stomach has completely lost its mind.
      Just because I can eat delicious local gourmet food in every city...🫩
      Every day is a struggle between the feeling that I'll get fat and need to exercise self-restraint, and the thought that this is the best part of a national tour and doing a one-man show should cancel out the calories anyway.
      
      I'll probably just keep eating delicious food until the final. That's fine. Surely 😌
      
      I'll post about the second day of the Aichi performance in the next update👋🏻
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
