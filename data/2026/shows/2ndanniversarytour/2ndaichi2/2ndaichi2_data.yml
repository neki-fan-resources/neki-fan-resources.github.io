- postinstagram:
    id: DWjXxulkhSc
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-03-31
    text: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      ツアー7本目ー！！@ 豊橋clubKNOT
      
      ありがとうございました！！
      豊橋、なんか、すごく、すごーく、フロアの雰囲気が温かかったなー…
      大好きな場所になりました
      みんなの歌声もサイコーでした❤️‍🔥❤️‍🔥
      
      フロアと私たちの一体感が、ツアーの回を増すごとにレベルアップしている気がしてとっても嬉しいです
      
      残り5本。
      もう5本かー…すでに寂しさを少し感じます
      全力で駆け抜けるぞ💪🏻❤️‍🔥
      
      #neki #girlsband #guitarist
    translation: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      7th stop of the tour!! @ Toyohashi clubKNOT
      
      Thank you very much!!
      Toyohashi, somehow, really, reaally had such a warm atmosphere on the floor...
      It has become a place I love
      Everyone's singing voices were the best too❤️‍🔥❤️‍🔥
      
      I'm so happy because I feel like the sense of unity between the floor and us is leveling up with every show on the tour
      
      5 shows left.
      Only 5 left... I'm already feeling a bit lonely
      I'm going to run through them with all my might💪🏻❤️‍🔥
      
      #neki #girlsband #guitarist
