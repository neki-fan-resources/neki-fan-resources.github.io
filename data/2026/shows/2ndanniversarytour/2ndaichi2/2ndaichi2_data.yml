- postx:
    id: 2038206760041979991
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-03-29
    text: |-
      本日ツアー7本目！豊橋！！
      ありがとうございましたー！
      
      昨日の名古屋に続き豊橋も最高に盛り上がったね🌟
      めちゃめちゃ楽しかったです！！
      思い出エピソードも話せてよかった🍖笑
      
      なんとついに折り返し地点まで来てしまいました😭😭早すぎるぅぅ🥲
      でもまだまだこれから！
      着いてきてくださいね！！
    translation: |-
      Today was the 7th stop of the tour! Toyohashi!!
      Thank you very much!
      
      Following yesterday's Nagoya, Toyohashi was also hyped to the max🌟
      It was so much fun!!
      I'm glad we got to talk about some memory episodes too🍖 lol
      
      Can't believe we've finally reached the halfway point😭😭 It's going by way too fast🥲
      But there's still more to come!
      Please keep following us!!
    image:
    - HEkqPfGaIAESSyI
    - HEkqPfHa4AAUjhU
    part-of:
      show:
        year: 2026
        id: 2ndaichi2

- postx:
    id: 2038213603120263212
    account: coco_102
    label: Thank you
    published-date: 2026-03-29
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      豊橋clubKNOTありがとうございました🌞
      
      フロアの構造上みなさんのお顔がよーく見えて最高に幸せな時間でした！ひとりひとりと目を合わせてシンガロングできて嬉しかったです🎶
      本当にありがとう！！
      
      次は熊本！人生初の九州！！楽しみです🫶🏻
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Toyohashi clubKNOT Thank you very much🌞
      
      Because of the floor's layout, I could see everyone's faces so clearly, and it was a superlatively happy time! I was glad to be able to make eye contact and sing along with each and every one of you🎶
      Thank you so truly!!
      
      Next is Kumamoto! My first time ever in Kyushu!! I'm looking forward to it🫶🏻
