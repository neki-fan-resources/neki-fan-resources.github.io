- postinstagram:
    id: DWnluOpGhoo
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-04-02
    text: |-
      2026.03.29
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      豊橋clubKNOTありがとうございました🌞
      ⁡
      初めましての会場でしたが、フロアが段々になっていてみんなの表情がいちばん後ろまで見えたのでとても楽しかったです！
      みんなと顔合わせてシンガロングしたり飛んだり手拍子したり、その場にいる人だけが体験できる唯一無二のライブは何にも代えがたいし、大事にしたい瞬間だなっていつもライブ中みんなの笑顔を見ていて思います！
      ⁡
      この全国ツアーが始まってからは各地のNEK!を応援してくれているファンの皆さんとライブの楽しさを共有できている実感があって、すごく幸せな日々を送っています！
      本当にいつも応援してくれている皆さんのおかげです☺️
      NEK!をいろんな所に連れて行ってくれて本当にありがとう！
      ⁡
      おかげさまで全国各地にまた訪れたいと思う土地や好きなライブハウスが増えていっていて、このclubKNOTもそのひとつ！代表の尾藤さん含めスタッフのみなさんとても素敵な方ばかりで、またいつかここでできたらいいなと思いました🙇🏻‍♀️
      ⁡
      ツアーも残すところあと5公演となりました！！早すぎる！
      ひとつひとつしっかりと噛み締めてツアーファイナルまで駆け抜けていきたいと思います！！
      ⁡
      次は初の九州！熊本も福岡も人生初なので楽しみです🧸💫
      ⁡どんな想い出ができるかなぁ、、
      
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.03.28
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Thank you Toyohashi clubKNOT🌞
      ⁡
      It was our first time at this venue, but the floor was tiered so I could see everyone's expressions all the way to the back, which was so much fun!
      Singing along, jumping, and clapping while making eye contact with everyone—the one-of-a-kind live experience that only those present can feel is irreplaceable, and looking at everyone's smiles during the show always makes me feel like these are moments I want to cherish!
      ⁡
      Since this national tour started, I've truly felt like I'm sharing the joy of live performance with NEK! fans in every region, and I'm spending such happy days!
      It's really all thanks to everyone who always supports us☺️
      Thank you so much for taking NEK! to so many different places!
      ⁡
      Thanks to you, the number of places I want to visit again and live houses I love across the country is increasing, and clubKNOT is one of them! All the staff, including the representative Mr. Bito, were such wonderful people, and I hope we can play here again someday🙇🏻‍♀️
      ⁡
      Only 5 performances left in the tour!! It's going by too fast!
      I want to savor every single one and run through until the tour final!!
      ⁡
      Next is our first time in Kyushu! It's my first time in my life visiting both Kumamoto and Fukuoka, so I'm looking forward to it🧸💫
      I wonder what kind of memories we'll make...
      
      #neki #neki_band #girlsband #drum #femaledrummer
