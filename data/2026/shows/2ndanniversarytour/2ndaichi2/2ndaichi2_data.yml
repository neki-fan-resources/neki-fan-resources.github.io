- postinstagram:
    id: DWgMS3mj-mT
    account: cure_bass_baka
    label: Kanade's report
    published-date: 2026-03-30
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      @ 愛知・NAGOYA JAMMIN’
      @ 豊橋clubKNOT⁡
      ⁡
      愛知2daysありがと！
      1年前の話です、、危ないのでもうしないですよ。。
      ⁡
      追記
      MC聞いて骨チャレンジした人とこれからしようとしてる人！
      私と同じことしようとしてくれてるのは嬉しいし、めちゃ面白くて愛なんだけど！
      鶏の骨食べるのはしっかり危ないみたいみたいなので
      やめてくれた方が私は安心します😌
      ⁡
      カルシウムは牛乳とか、小魚で取ろうね🦴
      
      ⁡
       #NEKI
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      @ Aichi・NAGOYA JAMMIN’
      @ Toyohashi clubKNOT
      ⁡
      Thanks for the 2 days in Aichi!
      That story was from a year ago... it's dangerous, so I won't do it anymore.
      ⁡
      Postscript
      To those who did the bone challenge after hearing the MC, and those who are about to try it!
      I'm happy and find it hilarious and full of love that you're trying to do the same thing as me!
      But apparently eating chicken bones is legitimately dangerous,
      so I’ll feel more relieved if you stop 😌
      ⁡
      Let's get our calcium from milk or small fish 🦴
      
      ⁡
       #NEKI
