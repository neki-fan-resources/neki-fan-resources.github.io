- postx:
    id: 2035318290755854468
    account: coco_102
    label: Thank you
    published-date: 2026-03-21
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      お越しくださりありがとうございました！！🩵
      
      ライブ始まるまでは凍えるくらい寒かったけど始まったらフロアの熱気で一気に汗だくになりました😂
      福島かなりアツい！！本当に最高でした！！
      
      更にビッグになってまた遊びに来ます👊🏻🔥
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Thank you so much for coming!! 🩵
      
      It was freezing cold until the live started, but once it began, I was instantly drenched in sweat from the heat on the floor 😂
      Fukushima is pretty hot!! It was truly the best!!
      
      We'll become even bigger and come back to visit again 👊🏻🔥
    image:
    - HD7nMHraYAAVY1r
    - HD7nMHya0AAww9v
    part-of:
      show:
        year: 2026
        id: 2ndfukushima

