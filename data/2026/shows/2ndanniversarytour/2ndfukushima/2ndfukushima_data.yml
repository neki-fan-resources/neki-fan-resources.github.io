- postx:
    id: 2035309301619884411
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-03-21
    text: |-
      全国ツアー5本目！！福島！！！
      ありがとうございましたー！！！
      あっつあっつすぎてやばかったねーーー！🔥🔥
      初福島だったのにこんなに盛り上がってくれて、ほんと嬉しかったよぉ🌟
      感謝しかないです😭‼️
      
      また絶対戻ってきます！❤️‍🔥
      福島最高！！！
    translation: |-
      5th stop of the national tour!! Fukushima!!!
      Thank you so much!!!
      It was so insanely hot, it was crazy!!! 🔥🔥
      Even though it was our first time in Fukushima, I'm so happy you guys got so hyped up 🌟
      I'm nothing but grateful 😭‼️
      
      We will definitely be back! ❤️‍🔥
      Fukushima is the best!!!
    image:
    - HD7fBSWb0AAVxsp
    - HD7fBTvacAAsWc1
