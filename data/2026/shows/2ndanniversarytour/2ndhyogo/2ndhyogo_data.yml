- postinstagram:
    id: DXb_a2WmoK8
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-04-22
    text: |-
      2026.04.18
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      兵庫公演終わりました🚢
      お越しくださった皆さまありがとうございました！！
      ⁡
      父の地元である兵庫県で今回初めてライブすることができてとても嬉しかったです！
      おじいちゃんおばあちゃん、そして生前は音楽好きでベースをやっていた叔父さんにずっと見守られている感じがして、安心感に包まれながらライブができました🌷♡
      
      ⁡最高な仲間たちに囲まれながらニコニコ叩いてる孫の姿を見て喜んでくれてたらいいなあ😌
      
      ホテルで寝落ちしたときに閉めてたはずのトイレの扉が勝手に開いていたのもきっと様子を見に来てくれた身内の仕業だと思っています、、(突然のホラー展開すみません笑)
      てかそう思い込むことにします！！じゃないと怖いので🥹
      ⁡
      ライブ前日はベースオントップ神戸三宮店でリハして、帰り際店員さんに声をかけてもらいサインを書かせていただきました！お近くにお住まいの方はぜひスタジオ利用した際に私たちのサイン探してみてください☺️
      
      リハ後は、長田本庄軒でぼっかけ焼きオムそばをいただきました！甘辛い味付けのぼっかけとふわっふわのオムレツが相性バツグンでとても美味しかったです🤤❤️‍🔥
      ⁡
      ライブの話に戻ると、神戸はフロアの熱量が本当に半端なくて途中から熱気と楽しさで頭がぶっ飛び、笑いが止まらなくなってしまいました😂
      皆さんのおかげでライブの楽しさをギュギュッと凝縮したような時間を過ごすことができました🔥
      ⁡
      本当にありがとうございました！！
      ⁡
      そして今回、ずっと出たいと思っていたタイトラさんでやれたこともとても嬉しかったです！フロアや楽屋のあちこちに動物がいて本当に動物園みたいで楽しかったです🦍
      
      また神戸に戻って来れるようにこれからも頑張ります🐯💛
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.04.18
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Hyogo performance is over🚢
      Thank you to everyone who came!!
      ⁡
      I was so happy to be able to perform a live show for the first time in Hyogo Prefecture, which is my father's hometown!
      I felt like I was being watched over the whole time by my grandparents and my uncle, who loved music and played bass when he was alive, and I was able to perform while wrapped in a sense of security🌷♡
      ⁡
      I hope they were happy to see their grandchild smiling and playing drums surrounded by the best companions😌
      ⁡
      When I fell asleep at the hotel, the bathroom door that I thought I had closed opened on its own, and I'm sure it was the work of my relatives coming to check on me... (sorry for the sudden horror story lol)
      Or rather, I've decided to believe that!! Otherwise, it's scary🥹
      ⁡
      The day before the live, we rehearsed at the Base On Top Kobe Sannomiya store, and on the way out, the staff called out to us and let us sign it! If you live nearby, please try to find our signature when you use the studio☺️
      ⁡
      After the rehearsal, I had the Bokkake Yaki-Ome-Soba at Nagata Honjoken! The sweet and salty seasoning of the bokkake and the fluffy omelet were a perfect match and it was so delicious🤤❤️‍🔥
      ⁡
      Getting back to the live show, the energy of the floor in Kobe was truly off the charts, and halfway through, my head just went wild with the heat and fun, and I couldn't stop laughing😂
      Thanks to you all, I was able to spend time that felt like a concentrated dose of the fun of live shows🔥
      ⁡
      Thank you so much!!
      ⁡
      And this time, I was also very happy to be able to play at Tai-Tora, which I had always wanted to appear at! There were animals all over the floor and dressing rooms, it was really like a zoo and it was fun🦍
      ⁡
      I'll keep doing my best so that I can come back to Kobe again🐯💛
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
