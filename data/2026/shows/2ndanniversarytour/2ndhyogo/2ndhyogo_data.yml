    label: Thank you
    published-date: 2026-04-18
    text: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      @ 兵庫・music zoo KOBE 太陽と虎
      
      前から後ろまで沢山ありがとねん！
      暑すぎたよー！！
      ライブで神戸来たのは初めてでした🌟
      明日ついにセミファイナル…いやだ、信じたくない。。
      寂しいけど楽しく明日もライブする！！
    translation: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      @ Hyogo / music zoo KOBE Taiyo to Tora
      
      Thank you all so much, from the front to the back!
      It was too hot!!
      This was my first time coming to Kobe for a live show🌟
      Tomorrow is finally the semi-final... no, I don't want to believe it..
      I'm sad but I'll have fun performing tomorrow too!!
