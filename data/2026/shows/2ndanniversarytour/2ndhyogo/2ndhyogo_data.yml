- postx:
    id: 2045460500507689183
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-04-18
    text: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      
      ツアー10本目！兵庫ー！神戸ー！！
      1曲目の「MAZE」から熱気がすごくて、めちゃめちゃ最高だったよー！ずっと楽しかった！
      本当ありがとう〜！！！
      前から後ろまで拳を上げてくれて、声を出してくれて、もうほんと神戸最高だぜー！！
      
      また必ず戻ってきます！
    translation: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      
      10th show of the tour! Hyogo! Kobe!!
      From the first song "MAZE," the energy was amazing, it was absolutely the best! I had fun the whole time!
      Thank you so much!!!
      Raising your fists from the front to the back, shouting out, Kobe is really just the best!!
      
      We'll definitely come back again!
    image:
    - HGLvejHakAA8_tY
    part-of:
      show:
        year: 2026
        id: 2ndhyogo

