    label: Thank you
    published-date: 2026-04-18
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      太陽と虎ありがとうございましたッ！🐯💥
      初神戸笑っちゃうくらいめっちゃ楽しかったです！
      みんなのおかげでライブの楽しさを凝縮したような時間が過ごせました！本当にありがとう🔥
      
      明日はついにセミファイナル大阪…！！楽しみだ🥹
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Thank you so much at Taiyo to Tora! 🐯💥
      My first time in Kobe was so much fun it was hilarious!
      Thanks to everyone, I was able to spend time that felt like a pure distillation of how fun live shows are! Thank you so much🔥
      
      Tomorrow is finally the semi-final in Osaka...!! So excited🥹
