- postx:
    id: 2045460500507689183
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-04-18
    text: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      
      гғ„гӮўгғј10жң¬зӣ®пјҒе…өеә«гғјпјҒзҘһжҲёгғјпјҒпјҒ
      1жӣІзӣ®гҒ®гҖҢMAZEгҖҚгҒӢгӮүзҶұж°—гҒҢгҒҷгҒ”гҒҸгҒҰгҖҒгӮҒгҒЎгӮғгӮҒгҒЎгӮғжңҖй«ҳгҒ гҒЈгҒҹгӮҲгғјпјҒгҒҡгҒЈгҒЁжҘҪгҒ—гҒӢгҒЈгҒҹпјҒ
      жң¬еҪ“гҒӮгӮҠгҒҢгҒЁгҒҶгҖңпјҒпјҒпјҒ
      еүҚгҒӢгӮүеҫҢгӮҚгҒҫгҒ§жӢігӮ’дёҠгҒ’гҒҰгҒҸгӮҢгҒҰгҖҒеЈ°гӮ’еҮәгҒ—гҒҰгҒҸгӮҢгҒҰгҖҒгӮӮгҒҶгҒ»гӮ“гҒЁзҘһжҲёжңҖй«ҳгҒ гҒңгғјпјҒпјҒ
      
      гҒҫгҒҹеҝ…гҒҡжҲ»гҒЈгҒҰгҒҚгҒҫгҒҷпјҒ
    translation: |-
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      
      10th show of the tour! Hyogo! Kobe!!
      From the first song "MAZE," the energy was amazing, it was absolutely the best! I had fun the whole time!
      Thank you so much!!!
      Raising your fists from the front to the back, shouting out, Kobe is really just the best!!
      
      We'll definitely come back again!
