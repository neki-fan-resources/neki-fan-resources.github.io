- postx:
    id: 2045454428334153990
    account: coco_102
    label: Thank you
    published-date: 2026-04-18
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      еӨӘйҷҪгҒЁиҷҺгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹгғғпјҒрҹҗҜрҹ’Ҙ
      еҲқзҘһжҲёз¬‘гҒЈгҒЎгӮғгҒҶгҒҸгӮүгҒ„гӮҒгҒЈгҒЎгӮғжҘҪгҒ—гҒӢгҒЈгҒҹгҒ§гҒҷпјҒ
      гҒҝгӮ“гҒӘгҒ®гҒҠгҒӢгҒ’гҒ§гғ©гӮӨгғ–гҒ®жҘҪгҒ—гҒ•гӮ’еҮқзё®гҒ—гҒҹгӮҲгҒҶгҒӘжҷӮй–“гҒҢйҒҺгҒ”гҒӣгҒҫгҒ—гҒҹпјҒжң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶрҹ”Ҙ
      
      жҳҺж—ҘгҒҜгҒӨгҒ„гҒ«гӮ»гғҹгғ•гӮЎгӮӨгғҠгғ«еӨ§йҳӘвҖҰпјҒпјҒжҘҪгҒ—гҒҝгҒ рҹҘ№
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Thank you so much at Taiyo to Tora! рҹҗҜрҹ’Ҙ
      My first time in Kobe was so much fun it was hilarious!
      Thanks to everyone, I was able to spend time that felt like a pure distillation of how fun live shows are! Thank you so muchрҹ”Ҙ
      
      Tomorrow is finally the semi-final in Osaka...!! So excitedрҹҘ№
    image:
    - HGLp9HiboAAFScf
    - HGLp9Hka8AAw8nL
