      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      ツアー2本目！@ 横浜BAYSIS
      
      さいっこうの盛り上がりをありがとうございました！！
      SOLD OUTも本当にありがとう!
      
      ずっとずっっと楽しくて幸せで、
      皆さんからパワーをたくさんいただきました！💪🏻💛
      写真を見返して、自分こんなに幸せそうな笑顔をしていたんだなぁと…😌😌
      
