    translation: |-
      2026.02.28
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      2nd stop of the tour! @ Yokohama BAYSIS
      
      Thank you for the best energy!!
      And thank you so much for the SOLD OUT!
      
      It was fun and happy the whole, whole time,
      and I received so much power from everyone! 💪🏻💛
      Looking back at the photos, I realized I had such a happy smile on my face... 😌😌
      
      To repay the favor, I want to cherish every single stop on the rest of this tour,
      so I'd be happy if you come visit us again ❤️‍🔥❤️‍🔥
      We'll be waiting for you!!!
      
      #neki #guitarist
