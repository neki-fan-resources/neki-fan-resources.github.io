- postinstagram:
    id: DVXmdsIEvgS
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-02
    text: |-
      2026.02.28
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026" Day2
      ⁡横浜BAYSISにお越しくださりありがとうございました🚢
      
      いやー！アツかったーーーー！！笑
      初日がかなりの盛り上がりだったのであれを越えられるかな…と少し不安に思っていたのですが、始まった瞬間何の心配もいらなかったなと思いました😂
      完全ソールドのぎゅーぎゅーに詰まったフロアと共に作り上げたライブならではの一体感が終始気持ちよかったです🔥
      ずっと一緒に歌ってくれて、MCでみんなの近くに行ったときもたくさんリアクションしてくれて、みなさんの素敵な笑顔と歓声からたくさんのパワーをいただきました！！
      
      純粋にライブっていいな〜と改めて実感するライブができたと思う！みんなのおかげです！本当にありがとう！！
      
      最近はちょくちょく横浜でもライブすることが増えてきて、神奈川県出身としてはとても嬉しいですヽ(^^)ﾉ
      これからも全国各地でいろんな思い出を作っていきたいな〜
      
      次は3/15(日)埼玉HEAVEN'S ROCKさいたま新都心VJ-3！
      初埼玉ライブ！めちゃんこ楽しみです🫶🏻
      ⁡
      #NEKI #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.02.28
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026" Day2
      ⁡Thank you so much for coming to Yokohama BAYSIS🚢
      
      Man! It was so hot!! lol
      Since the first day was such a huge blast, I was a little worried if we could top it... but the moment it started, I realized there was absolutely nothing to worry about😂
      The sense of unity created throughout the show with the packed, completely sold-out floor felt amazing🔥
      You sang along the whole time, gave so many reactions when I got close to you during the MC, and I received so much power from everyone's wonderful smiles and cheers!!
      
      I think we had a show where I truly felt once again how great live performances are! It's all thanks to everyone! Thank you so much!!
      
      Recently we've been playing in Yokohama more often, and as a Kanagawa native, it makes me very happyヽ(^^)ﾉ
      I want to keep making many memories all across the country~
      
      Next is 3/15 (Sun) Saitama HEAVEN'S ROCK Saitama Shintoshin VJ-3!
      Our first Saitama live! I'm super looking forward to it🫶🏻
      ⁡
      #NEKI #neki_band #girlsband #drum #femaledrummer
