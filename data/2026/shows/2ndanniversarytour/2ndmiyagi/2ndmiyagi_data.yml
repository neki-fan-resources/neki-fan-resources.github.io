- postx:
    id: 2034968629490720935
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-03-20
    text: |-
      ツアー4本目！！
      宮城！ありがとうございました！
      久しぶりの仙台💚💚
      みんな盛り上がってくれて熱気もやばかったねー！！
      みんなの笑顔が最高に輝いてました！！
      一緒にライブを作り上げてくれてありがとう🌟🌟
      また成長して帰って来れるよう頑張ります!
      明日は福島ー！！
      こりゃまた楽しみすぎるなっ
    translation: |-
      4th stop on the tour!!
      Miyagi! Thank you so much!
      Sendai after such a long time💚💚
      Everyone got so hyped, the heat was insane!!
      Everyone's smiles were shining the brightest!!
      Thank you for creating this live show together with us🌟🌟
      I'll do my best to grow more and come back again!
      Tomorrow is Fukushima!!
      I'm looking forward to this way too much
    image:
    - HD2pLmKbIAAI-uD
    - HD2pLmMboAUI4ox
