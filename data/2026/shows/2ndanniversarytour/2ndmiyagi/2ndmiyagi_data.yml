- postx:
    id: 2034974714901537067
    account: coco_102
    label: Thank you
    published-date: 2026-03-20
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      4日目宮城公演ありがとうございました！🤍
      久々の東北ライブみんなアツくて最高でした！！
      仙台名物もたくさん食べれて元気モリモリで挑めました👍🏻
      
      明日は福島公演！人生初上陸なので楽しみです🌞
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Miyagi performance day 4, thank you so much!🤍
      It's been a while since we played in Tohoku, and everyone was so hot and awesome!!
      I ate lots of Sendai specialties, so I could tackle it with full energy👍🏻
      
      Tomorrow is the Fukushima performance! It’s my first time there ever, so I'm looking forward to it🌞
