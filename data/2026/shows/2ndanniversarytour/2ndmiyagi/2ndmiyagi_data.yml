      show:
        year: 2026
        id: 2ndmiyagi

- postx:
    id: 2034970009316073505
    account: cure_bass_baka
    label: Thank you
    published-date: 2026-03-20
    text: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”@ 宮城・仙台ROCKATERIA
      
      4日目仙台ありがとー！！
      ツアー遠征公演一発目でした🌟
      今日は楽しすぎてステージでたくさん回ってました。
      三半規管が弱いので無事目が回りかけました🥹
      それくらい楽しかった、ありがとねー！！
    translation: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”@ Miyagi・Sendai ROCKATERIA
      
      Thank you Sendai for day 4!!
      It was the first stop of the tour away from home🌟
      I had so much fun today that I was spinning around a lot on stage.
      My inner ear is weak, so I almost got dizzy for real🥹
      That’s how much fun it was, thanks everyone!!
