- postinstagram:
    id: DWOOEpVGstU
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-23
    text: |-
      2026.03.20
      
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      4ж—Ҙзӣ®е®®еҹҺе…¬жј”гҒҢзөӮгӮҸгӮҠгҒҫгҒ—гҒҹпјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶгҒ•гҒҫгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹрҹҢһ
      
      жҳЁе№ҙ6жңҲгҒ«еҮәжј”гҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҹSENDAI MUSIC FUSEд»ҘжқҘгҒ®д»ҷеҸ°пјҒгғҜгғігғһгғігҒ§иЁӘгӮҢгӮӢгҒ®гҒҜд»ҠеӣһгҒҢеҲқгӮҒгҒҰгҒ гҒЈгҒҹгҒ®гҒ§гҖҒгҒҹгҒ гҒ„гҒҫгҖңгҒЁжҖқгҒ„гҒӨгҒӨгӮӮе°‘гҒ—ж–°й®®гҒӘж°—жҢҒгҒЎгҒ§жҘҪгҒ—гӮҖгҒ“гҒЁгҒҢгҒ§гҒҚгҒҫгҒ—гҒҹрҹҺ¶
      
      д»ҠеӣһгҒҜеүҚд№—гӮҠгҒ гҒЈгҒҹгҒ®гҒ§гҖҒз§ҒгҒҢд»ҘеүҚгҒӢгӮүгӮ„гҒЈгҒҰгҒҝгҒҹгҒ„гҒӘгҖңгҒЁжҖқгҒЈгҒҰгҒ„гҒҹйҒ еҫҒе…ҲгҒ®гӮ№гӮҝгӮёгӮӘгҒ«е…ҘгӮӢгҒЁгҒ„гҒҶгғҹгғғгӮ·гғ§гғігӮ’гҒ№гғјгғүгғ©гҒ§йҒ”жҲҗгҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒҚгҒҫгҒ—гҒҹрҹҳӮ
      
      з·ҙзҝ’еүҚгҒ«з«ӢгҒЎеҜ„гҒЈгҒҹгӮ№гӮҝгӮёгӮӘгҒ®иҝ‘гҒҸгҒ«гҒӮгӮӢгҒ”йЈҜеұӢгҒ•гӮ“гҒ§еЈҒгҒ«гӮөгӮӨгғігӮ’жӣёгҒӢгҒӣгҒҰгҒ„гҒҹгҒ гҒ„гҒҹгӮҠгҖҒз·ҙзҝ’еҫҢгҒ«гҒҜиҝ‘гҒҸгҒ®е•Ҷеә—иЎ—гҒ§гҒҡгӮ“гҒ гӮ“гҒ”гӮ·гӮ§гӮӨгӮҜгӮ’йЈІгҒҝгҖҒеӨңгҒ«гҒҜгғ©гӮёгӮӘзө„гҒЁеҗҲжөҒгҒ—гҒҰзүӣгӮҝгғігӮ„жҸҡгҒ’гҒӢгҒҫгҒјгҒ“гҒӘгҒ©гӮ’йЈҹгҒ№гҒ«иЎҢгҒЈгҒҹгӮҠгҒ—гҒҰгҖҒгҒӢгҒӘгӮҠд»ҷеҸ°гӮ’жәҖе–«гҒ•гҒӣгҒҰгҒ„гҒҹгҒ гҒҚгҒҫгҒ—гҒҹгғҪ(^^)пҫү
      гғ©гӮӨгғ–еҫҢгҒ«гҒҜгҒӣгӮҠйҚӢгӮӮйЈҹгҒ№гҒ«иЎҢгҒЈгҒҹгӮҲрҹҚІ
      
      гҒҫгҒ гҒҫгҒ йЈҹгҒ№гҒҹгҒ„гӮӮгҒ®гӮ„иЎҢгҒҚгҒҹгҒ„гҒЁгҒ“гӮҚгҒҢгҒӮгҒЈгҒҹгҒ®гҒ§гҖҒгҒҫгҒҹж¬ЎеӣһжҘҪгҒ—гӮӮгҒҶгҒЁжҖқгҒ„гҒҫгҒҷпјҒ
      
      гғ„гӮўгғјгҒҢе§ӢгҒҫгҒЈгҒҰд»ҠеӣһгҒ§4ж—Ҙзӣ®гҒ«гҒӘгӮҠгҒҫгҒ—гҒҹгҒҢгҖҒең°еҹҹгҒҢеӨүгӮҸгӮӢгҒЁе®ўеұӨгӮӮгӮ¬гғ©гғғгҒЁеӨүгӮҸгӮӢгҒ“гҒЁгӮ’еҶҚиӘҚиӯҳгҒ—гҒҫгҒ—гҒҹпјҒ
      д»ҠеӣһеҲқгӮҒгҒҰNEK!гҒ®гғ©гӮӨгғ–гҒ«жқҘгҒҰгҒҸгӮҢгҒҹгҒЁгҒ„гҒҶж–№гӮӮеӨҡгҒӢгҒЈгҒҹгҒҝгҒҹгҒ„гҒ§гҖҒгғ•гғӯгӮўгҒ®йӣ°еӣІж°—гӮ„гғҺгғӘж–№гӮӮгҒ„гҒӨгӮӮгҒЁгҒЎгӮҮгҒЈгҒЁйҒ•гҒҶж„ҹгҒҳгҒҢгҒ—гҒҰгҒЁгҒҰгӮӮжҘҪгҒ—гҒӢгҒЈгҒҹгҒ§гҒҷпјҒ
      
      д»ҠеӣһеҲқгӮҒгҒҰиҰігҒ«жқҘгҒҰгҒҸгӮҢгҒҹж–№гӮӮгҖҒгҒ„гҒӨгӮӮдёҖз·’гҒ«гғ©гӮӨгғ–гӮ’жҘҪгҒ—гӮ“гҒ§гҒҸгӮҢгӮӢж–№гӮӮжң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒҷвқӨпёҸвҖҚрҹ”Ҙ
      гҒҫгҒҹиҰігҒ«иЎҢгҒҚгҒҹгҒ„гҒӘгҒЈгҒҰжҖқгҒЈгҒҰгӮӮгӮүгҒҲгӮӢгӮҲгҒҶгҒӘгғ©гӮӨгғ–гӮ’гҒ“гӮҢгҒӢгӮүгӮӮгӮ„гҒЈгҒҰгҒ„гҒҚгҒҫгҒҷгҒ®гҒ§жң«ж°ёгҒҸгӮҲгӮҚгҒ—гҒҸгҒҠйЎҳгҒ„гҒ—гҒҫгҒҷпјҒпјҒ
      
      гҒҫгҒҹд»ҷеҸ°гҒ«жҲ»гҒЈгҒҰжқҘгҒҹгҒЁгҒҚгҒ«гҒҜжӣҙгҒ«жҲҗй•·гҒ—гҒҹе§ҝгӮ’гҒҠеұҠгҒ‘гҒ§гҒҚгӮӢгӮҲгҒҶгҒ«й ‘ејөгӮӢгҒһгғјпјҒпјҒ
      вҒЎ
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.03.20
      
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      Day 4 in Miyagi is over!
      Thank you to everyone who cameрҹҢһ
      
      Sendai for the first time since SENDAI MUSIC FUSE last June! Since it was our first time visiting for a solo show, I felt like saying "I'm home~" while also enjoying it with a fresh perspectiveрҹҺ¶
      
      Since we arrived a day early this time, the bass and drums duo managed to complete a mission I've always wanted to try: hitting up a local studio while on tourрҹҳӮ
      
      We got to sign the wall at a restaurant near the studio before practice, grabbed zunda dango shakes at a nearby shopping district after practice, and then met up with the radio team at night to eat ox tongue and fried kamabokoвҖ”we really made the most of SendaiгғҪ(^^)пҫү
      We even went to eat seri nabe after the liveрҹҚІ
      
      There are still things I want to eat and places I want to go, so IвҖҷll look forward to them next time!
      
      This was the 4th day since the tour started, and it reminded me again how much the crowd changes depending on the region!
      It seemed like there were many people seeing NEK! for the first time, so the atmosphere on the floor and the way people moved felt a bit different than usual, which was so much fun!
      
      To those who came to see us for the first time and those who always enjoy the shows with us, thank you so muchвқӨпёҸвҖҚрҹ”Ҙ
      WeвҖҷll keep putting on shows that make you want to come back again, so please stick with us for a long time!!
      
      I'll work hard so that when we return to Sendai, we can show you how much we've grown!!
      вҒЎ
      #neki #neki_band #girlsband #drum #femaledrummer
