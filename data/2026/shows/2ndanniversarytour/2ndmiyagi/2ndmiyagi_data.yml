      リハして美味しいもの食べて、仙台前乗り楽しいー！！
      そして美味しいもの食べてる時間が本当に大好き。
      今日は気にしないで食べて大丈夫な日！！
      明日ライブだから実質カロリー0だよねセーフ！！
    translation: |-
      Did rehearsal, ate some delicious food, pre-arrival in Sendai is so fun!!
      And I really love the time spent eating delicious things.
      Today is a day where it's okay to eat without worrying!!
      Since there's a live tomorrow, it's effectively 0 calories, so I'm safe!!
