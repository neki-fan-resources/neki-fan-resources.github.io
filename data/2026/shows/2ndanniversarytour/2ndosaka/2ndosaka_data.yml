- postinstagram:
    id: DXgfN29mleE
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-04-24
    text: |-
      2026.04.19
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      セミファイナル大阪公演無事終了しましたー！
      お越しくださった皆さま本当にありがとうございました🐙
      
      大阪は先週ジャイガのスピンオフ企画に出演させていただいたので、また来たよ〜( ¨)ﾉという感覚でしたが、ワンマン単位で考えると昨年3月の東名阪ツアー以来だったので、そのときより会場をひと回り大きくして、より多くのファンの皆さんに遊びに来ていただけたのがとても嬉しかったです！
      
      SNSで皆さんが載せてくれた感想を読んでいると、梅田シャングリラに集まってくれた皆さんの中には今回初めてNEK!のライブを観に来てくれたという方も多くいたみたいで、NEK!の輪がだんだん広まっていっているのを改めて実感しています！本当にNEK!と出会ってくれてありがとうございます🙂‍↕️
      
      できることならひとりひとりNEK!と出会ってくれた経緯やNEK!のどこが好きなのかとか、たくさん質問したいところなのですがそれは難しいので、みんなたくさん自由に呟いていってほしいなと思います笑
      
      開演前に551の豚まんでエネルギーチャージして挑んだ今回のライブは、ファンの皆さんと一緒にたくさん歌ってたくさん飛び跳ねて、お互いにパワーを送り合うエネルギッシュなライブとなりました！
      遠征最終日だった今回の大阪公演はファンの皆さんの表情や歓声にパワーをもらって最後まで走り切れたという感覚がいつも以上に強かったです🔥
      本当にいつも皆さんの存在に支えられています、、
      
      今回のツアーはNEK!にとって過去最長の旅で、始まるまではこんな10何公演も全て完走し切れるだろうかと少し不安に思っていたのに、始まったら本当にあっという間で、置いていかれないよう必死にしがみついている感覚で全公演駆け抜けてきました。
      たくさん話したい思い出がありますが、それはまたツアーファイナルが終わってからゆっくり語ろうかなと思います☺️
      
      とうとう明後日に迫ったツアーファイナル、クアトロで一体どんな景色が見られるのか。この旅の締めくくりに相応しいライブをお届けしたいと思います👊🏻🔥
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.04.19
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      The semi-final Osaka performance has safely concluded!
      Thank you so much to everyone who came🐙
      
      Since we performed at the GIGA spin-off event in Osaka last week, I had the feeling of "we're back~ ( ¨)ﾉ", but in terms of headlining shows, it had been since last March's Tokyo-Nagoya-Osaka tour, so I was very happy that we could upgrade the venue size and have even more fans come to hang out with us than back then!
      
      Reading the impressions that everyone posted on social media, it seems that among the people who gathered at Umeda Shangri-La, there were many who were coming to see a NEK! live show for the first time, and I am realizing once again that the circle of NEK! is gradually expanding! Thank you so much for meeting NEK!🙂‍↕️
      
      If I could, I would want to ask each and every one of you how you found out about NEK! or what you like about NEK!, but since that's difficult, I hope you'll all post freely about it lol
      
      For this live show, which I took on after recharging my energy with 551 pork buns before the start, we sang a lot and jumped around a lot together with all the fans, and it became an energetic live show where we sent power to each other!
      For this Osaka performance, which was the final day of our tour away from home, I had an even stronger feeling than usual that I was able to run through to the end by getting power from the expressions and cheers of the fans🔥
      I am truly always supported by your presence...
      
      This tour was the longest journey in NEK!'s history, and before it started, I was a little anxious about whether we could finish all 10+ performances, but once it started, it went by in the blink of an eye, and I ran through all the performances with the feeling of holding on for dear life so as not to be left behind.
      There are many memories I want to talk about, but I think I'll talk about them slowly after the tour final is over☺️
      
      The tour final is finally coming up in two days; I wonder what kind of scenery we will see at Quattro. I want to deliver a live performance worthy of the conclusion of this journey👊🏻🔥
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
