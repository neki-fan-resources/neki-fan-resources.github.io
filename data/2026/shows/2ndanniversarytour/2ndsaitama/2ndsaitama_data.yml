- postinstagram:
    id: DV--P-HkgMG
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-03-17
    text: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      ツアー3本目！ @ 埼玉・HEAVEN’S ROCK さいたま新都心 VJ-3
      
      かき回しから始まった3本目！
      
      最初の歓声から本当にすごくて、
      めちゃくちゃ嬉しかったよー😭❤️‍🔥
      
      回を重ねるごとに、ファンのみんなの熱もどんどん増してる気がしてて、
      その熱にめちゃめちゃパワーもらってます💪🏻🔥
      本当にありがとう！！！
      
      次は仙台！！！
      この熱のまま、東北へぶちかましていこうぜ！！🔥
      
      #neki #girlsband #guitarist
    translation: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      3rd tour stop! @ Saitama・HEAVEN’S ROCK Saitama Shintoshin VJ-3
      
      The 3rd show started right off with a kakimashi!
      
      The initial cheers were truly incredible,
      and it made me so incredibly happy—😭❤️‍🔥
      
      With every show, I feel like the heat from all the fans is just increasing,
      and I'm getting so much power from that heat💪🏻🔥
      Thank you so much!!!
      
      Next is Sendai!!!
      With this same heat, let's go kill it in Tohoku!! 🔥
      
      #neki #girlsband #guitarist
