- postinstagram:
    id: DV8cFM-Gm_X
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-16
    text: |-
      2026.03.15
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      ⁡
      3日目HEAVEN'S ROCK さいたま新都心 VJ-3！
      お越しくださった皆さま本当にありがとうございました🖤
      ⁡
      埼玉でライブをするのは今回が初めてでしたが、皆さんのおかげで安定の激アツライブができました！！ツアーが始まってまだ3日目ですが、回を増すごとにフロアと私達の一体感が高まってきているなと感じます！
      ⁡
      一緒に歌うところは全力で歌ってくれて、しっとりしたバラードは真剣に聴いてくれて、曲によってジャンプしたり拳あげたり手拍子したり、本当にNEK!とファンの皆さんは一心同体だなってライブやりながら感じています🤝🏻🔥
      
      いつも私たちを支えてくれている皆さんに最高のパフォーマンスと音で恩返しできるように、そして、今よりもっと成長した姿で埼玉に戻って来れるようにこれからも精進していきます！！
      ⁡
      次回は3/20(金)宮城ROCKATERIA🤟🏻⚡️
      久々の東北ライブです！楽しんでいきましょ〜〜〜！！
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.03.15
      
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      Day 3 at HEAVEN'S ROCK Saitama Shintoshin VJ-3!
      Thank you so much to everyone who came out🖤
      
      This was our first time playing a show in Saitama, but thanks to all of you, we had a consistently fire live set!! It’s only the third day since the tour started, but I feel like the unity between the floor and us is growing stronger with every show!
      
      I really feel like NEK! and the fans are one when I'm performing—seeing you sing your hearts out during the sing-alongs, listening intently to the mellow ballads, and jumping, raising fists, or clapping depending on the song🤝🏻🔥
      
      We’ll keep working hard so we can give back to everyone who always supports us with the best performances and sound, and so we can return to Saitama having grown even more than we are now!!
      
      Next up is 3/20 (Fri) Miyagi ROCKATERIA🤟🏻⚡️
      It's been a while since our last Tohoku show! Let's have a blast~~~!!
      
      #neki #neki_band #girlsband #drum #femaledrummer
