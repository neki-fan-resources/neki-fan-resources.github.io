- postinstagram:
    id: DV--P-HkgMG
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-03-17
    text: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      гғ„гӮўгғј3жң¬зӣ®пјҒ @ еҹјзҺүгғ»HEAVENвҖҷS ROCK гҒ•гҒ„гҒҹгҒҫж–°йғҪеҝғ VJ-3
      
      гҒӢгҒҚеӣһгҒ—гҒӢгӮүе§ӢгҒҫгҒЈгҒҹ3жң¬зӣ®пјҒ
      
      жңҖеҲқгҒ®жӯ“еЈ°гҒӢгӮүжң¬еҪ“гҒ«гҒҷгҒ”гҒҸгҒҰгҖҒ
      гӮҒгҒЎгӮғгҒҸгҒЎгӮғе¬үгҒ—гҒӢгҒЈгҒҹгӮҲгғјрҹҳӯвқӨпёҸвҖҚрҹ”Ҙ
      
      еӣһгӮ’йҮҚгҒӯгӮӢгҒ”гҒЁгҒ«гҖҒгғ•гӮЎгғігҒ®гҒҝгӮ“гҒӘгҒ®зҶұгӮӮгҒ©гӮ“гҒ©гӮ“еў—гҒ—гҒҰгӮӢж°—гҒҢгҒ—гҒҰгҒҰгҖҒ
      гҒқгҒ®зҶұгҒ«гӮҒгҒЎгӮғгӮҒгҒЎгӮғгғ‘гғҜгғјгӮӮгӮүгҒЈгҒҰгҒҫгҒҷрҹ’ӘрҹҸ»рҹ”Ҙ
      жң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶпјҒпјҒпјҒ
      
      ж¬ЎгҒҜд»ҷеҸ°пјҒпјҒпјҒ
      гҒ“гҒ®зҶұгҒ®гҒҫгҒҫгҖҒжқұеҢ—гҒёгҒ¶гҒЎгҒӢгҒҫгҒ—гҒҰгҒ„гҒ“гҒҶгҒңпјҒпјҒрҹ”Ҙ
      
      #neki #girlsband #guitarist
    translation: |-
      .
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026
      3rd tour stop! @ Saitamaгғ»HEAVENвҖҷS ROCK Saitama Shintoshin VJ-3
      
      The 3rd show started right off with a kakimashi!
      
      The initial cheers were truly incredible,
      and it made me so incredibly happyвҖ”рҹҳӯвқӨпёҸвҖҚрҹ”Ҙ
      
      With every show, I feel like the heat from all the fans is just increasing,
      and I'm getting so much power from that heatрҹ’ӘрҹҸ»рҹ”Ҙ
      Thank you so much!!!
      
      Next is Sendai!!!
      With this same heat, let's go kill it in Tohoku!! рҹ”Ҙ
      
      #neki #girlsband #guitarist
