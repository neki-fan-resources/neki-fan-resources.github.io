- postinstagram:
    id: DV8cFM-Gm_X
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-16
    text: |-
      2026.03.15
      вҒЎ
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      вҒЎ
      3ж—Ҙзӣ®HEAVEN'S ROCK гҒ•гҒ„гҒҹгҒҫж–°йғҪеҝғ VJ-3пјҒ
      гҒҠи¶ҠгҒ—гҒҸгҒ гҒ•гҒЈгҒҹзҡҶгҒ•гҒҫжң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹрҹ–Ө
      вҒЎ
      еҹјзҺүгҒ§гғ©гӮӨгғ–гӮ’гҒҷгӮӢгҒ®гҒҜд»ҠеӣһгҒҢеҲқгӮҒгҒҰгҒ§гҒ—гҒҹгҒҢгҖҒзҡҶгҒ•гӮ“гҒ®гҒҠгҒӢгҒ’гҒ§е®үе®ҡгҒ®жҝҖгӮўгғ„гғ©гӮӨгғ–гҒҢгҒ§гҒҚгҒҫгҒ—гҒҹпјҒпјҒгғ„гӮўгғјгҒҢе§ӢгҒҫгҒЈгҒҰгҒҫгҒ 3ж—Ҙзӣ®гҒ§гҒҷгҒҢгҖҒеӣһгӮ’еў—гҒҷгҒ”гҒЁгҒ«гғ•гғӯгӮўгҒЁз§ҒйҒ”гҒ®дёҖдҪ“ж„ҹгҒҢй«ҳгҒҫгҒЈгҒҰгҒҚгҒҰгҒ„гӮӢгҒӘгҒЁж„ҹгҒҳгҒҫгҒҷпјҒ
      вҒЎ
      дёҖз·’гҒ«жӯҢгҒҶгҒЁгҒ“гӮҚгҒҜе…ЁеҠӣгҒ§жӯҢгҒЈгҒҰгҒҸгӮҢгҒҰгҖҒгҒ—гҒЈгҒЁгӮҠгҒ—гҒҹгғҗгғ©гғјгғүгҒҜзңҹеүЈгҒ«иҒҙгҒ„гҒҰгҒҸгӮҢгҒҰгҖҒжӣІгҒ«гӮҲгҒЈгҒҰгӮёгғЈгғігғ—гҒ—гҒҹгӮҠжӢігҒӮгҒ’гҒҹгӮҠжүӢжӢҚеӯҗгҒ—гҒҹгӮҠгҖҒжң¬еҪ“гҒ«NEK!гҒЁгғ•гӮЎгғігҒ®зҡҶгҒ•гӮ“гҒҜдёҖеҝғеҗҢдҪ“гҒ гҒӘгҒЈгҒҰгғ©гӮӨгғ–гӮ„гӮҠгҒӘгҒҢгӮүж„ҹгҒҳгҒҰгҒ„гҒҫгҒҷрҹӨқрҹҸ»рҹ”Ҙ
      
      гҒ„гҒӨгӮӮз§ҒгҒҹгҒЎгӮ’ж”ҜгҒҲгҒҰгҒҸгӮҢгҒҰгҒ„гӮӢзҡҶгҒ•гӮ“гҒ«жңҖй«ҳгҒ®гғ‘гғ•гӮ©гғјгғһгғігӮ№гҒЁйҹігҒ§жҒ©иҝ”гҒ—гҒ§гҒҚгӮӢгӮҲгҒҶгҒ«гҖҒгҒқгҒ—гҒҰгҖҒд»ҠгӮҲгӮҠгӮӮгҒЈгҒЁжҲҗй•·гҒ—гҒҹе§ҝгҒ§еҹјзҺүгҒ«жҲ»гҒЈгҒҰжқҘгӮҢгӮӢгӮҲгҒҶгҒ«гҒ“гӮҢгҒӢгӮүгӮӮзІҫйҖІгҒ—гҒҰгҒ„гҒҚгҒҫгҒҷпјҒпјҒ
      вҒЎ
      ж¬ЎеӣһгҒҜ3/20(йҮ‘)е®®еҹҺROCKATERIAрҹӨҹрҹҸ»вҡЎпёҸ
      д№…гҖ…гҒ®жқұеҢ—гғ©гӮӨгғ–гҒ§гҒҷпјҒжҘҪгҒ—гӮ“гҒ§гҒ„гҒҚгҒҫгҒ—гӮҮгҖңгҖңгҖңпјҒпјҒ
      вҒЎ
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.03.15
      
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      Day 3 at HEAVEN'S ROCK Saitama Shintoshin VJ-3!
      Thank you so much to everyone who came outрҹ–Ө
      
      This was our first time playing a show in Saitama, but thanks to all of you, we had a consistently fire live set!! ItвҖҷs only the third day since the tour started, but I feel like the unity between the floor and us is growing stronger with every show!
      
      I really feel like NEK! and the fans are one when I'm performingвҖ”seeing you sing your hearts out during the sing-alongs, listening intently to the mellow ballads, and jumping, raising fists, or clapping depending on the songрҹӨқрҹҸ»рҹ”Ҙ
      
      WeвҖҷll keep working hard so we can give back to everyone who always supports us with the best performances and sound, and so we can return to Saitama having grown even more than we are now!!
      
      Next up is 3/20 (Fri) Miyagi ROCKATERIAрҹӨҹрҹҸ»вҡЎпёҸ
      It's been a while since our last Tohoku show! Let's have a blast~~~!!
      
      #neki #neki_band #girlsband #drum #femaledrummer
