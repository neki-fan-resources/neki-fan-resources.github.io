      All of your fists and voices reached us❤️‍🔥
      
      From the front all the way to the back
      Honestly, thank you so much🙇🏻‍♀️🤍
      
      Next, we finally head out of Kanto to Tohoku❤️‍🔥
      Let's take this heat straight to Sendai!
