- postx:
    id: 2033177815030673478
    account: coco_102
    label: Thank you
    published-date: 2026-03-15
    text: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      3日目埼玉公演！ありがとうございました！！💜
      NEK!初の埼玉でしたが皆さんのおかげで最高のライブになりました！大感謝です！！
      もっともっとBIGになって埼玉に戻って来れるようにこれからも頑張ります🔥
      
      次は3/20宮城公演！久々の東北楽しみです☺️
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      Day 3 Saitama performance! Thank you very much!!💜
      It was NEK!'s first time in Saitama, but thanks to everyone, it was the best live show! Huge thanks!!
      I'll keep doing my best so that we can become even BIGGER and come back to Saitama🔥
      
      Next is the Miyagi performance on 3/20! I'm looking forward to Tohoku after such a long time☺️
