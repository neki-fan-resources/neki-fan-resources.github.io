- postinstagram:
    id: DUimwdmGmOe
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-02-09
    text: |-
      2026.02.08
      
      🇯🇵NEK! 2nd ANNIVERSARY LIVE TOUR 2026🇯🇵
      
      初日Shibuya eggmanありがとうございましたー！！
      まさかの雪景色に包まれながらの初日となりました⛄️
      
      凍えそうな寒さの中、私たちのライブを観に頑張ってeggmanまで来てくれて、開場するまで寒い中外で待っていてくれたり、本当に心から感謝の気持ちでいっぱいです！
      お越しくださり本当にありがとうございました！！
      皆さんのおかげで最高のスタートを切ることができました！
      
      初の全国ツアー、各地でどんな景色が見られるのか、日々どんな感情と出会えるのか、今からとても楽しみです🚗🎶
      
      ツアーファイナルでまた渋谷に戻ってきたときに、ひとまわりもふたまわりも成長したNEK!を皆さんにお届けできるよう残り11公演、ひとつひとつを大切にしながら乗り越えていきます！！
      ⁡
      次回は横浜BAYSISで遊びましょう🚢🤍
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.02.08
      
      🇯🇵NEK! 2nd ANNIVERSARY LIVE TOUR 2026🇯🇵
      
      Thank you so much for the first day at Shibuya eggman!!
      It turned into an opening day wrapped in an unexpected snowy landscape⛄️
      
      In this freezing cold, I am truly filled with gratitude from the bottom of my heart for everyone who did their best to come to eggman to see our live show and waited outside in the cold until the doors opened!
      Thank you so very much for coming!!
      Thanks to all of you, we were able to get off to the best start!
      
      I'm really looking forward to seeing what kind of views we'll see in each region and what kind of emotions we'll encounter every day on our first nationwide tour🚗🎶
      
      By the time we return to Shibuya for the tour final, we'll get through the remaining 11 performances while cherishing each and every one, so that we can show everyone a NEK! that has grown much, much stronger!!
      ⁡
      Let's hang out at Yokohama BAYSIS next time🚢🤍
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
