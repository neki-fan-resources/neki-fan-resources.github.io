- postinstagram:
    id: DUiY3uUj_G0
    account: cure_bass_baka
    label: Kanade's report
    published-date: 2026-02-09
    text: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      @ 東京・shibuya eggman⁡
      ⁡
      全国ツアー初日、ソールドアウトありがとうございました！
      雪降ってて電車とか止まっちゃったり、車とかも大変だった中来てくれて嬉しかった！
      しかも外は冷凍庫みたいな寒さしてたのに、フロア南国かと思うくらい熱かったし
      みんなとの距離も近くて、やっぱりライブハウス大好き。
      4/26クアトロでのファイナルは更にパワーアップして東京に帰ってきたい！
      残り11公演、みんなからもらったパワーで頑張る！
      ありがとー！！
      
      次は2/28横浜BAYSIS🌟
      ⁡
       #NEKI
    translation: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      @ Tokyo・shibuya eggman⁡
      ⁡
      Thank you for the sold out first day of the national tour!
      Even though the snow was falling and trains were stopped and cars were having a hard time, I was so happy you came!
      Plus, while it was freezing like a walk-in freezer outside, the floor was so hot I thought I was in the tropics
      We were so close to everyone, I really love live houses after all.
      I want to come back to Tokyo even more powered up for the final at Quattro on 4/26!
      For the remaining 11 performances, I’ll do my best with the power I got from everyone!
      Thank you!!
      
      Next is 2/28 Yokohama BAYSIS
