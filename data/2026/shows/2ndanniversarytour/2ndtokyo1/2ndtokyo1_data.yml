- postinstagram:
    id: DUivDI-khXr
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-02-09
    text: |-
      .
      2026.02.08
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026 
      @ shibuya eggman
      
      ツアー初日！！！！eggman！！！
      
      まずは、足元の悪い中お越しくださり、本当にありがとうございました。
      大変な思いをしながら来てくださった方もたくさんいたと思います。
      そんなみなさんのおかげで、無事にツアー初日を迎えることができました！
      
      みんなの熱気、すごかった！！
      eggman周辺の雪が溶けるんじゃないかって思うくらいの勢いで、
      ステージから見たみなさんの姿に、たくさんのパワーをもらいました🔥
      
      そしてシンガロング、みんな練習してきた？！と思うぐらいすごくて
      本当に感動したなぁ
      たくさん声を出して、手をあげてくれて、
      改めてライブっていいなぁと感じました。
      
      もうすでに、この先のツアーが楽しみで仕方がない！！！
      NEK!にとって、きっと忘れられない思い出になると思います。
      
      残り11箇所
      たくさん成長して、また東京に戻ってこられるよう全力で頑張ります！！
      
      そして今回、来られなかった方もいると思います。
      残りのツアーで、もしご都合が合えばぜひ会いに来てくれたら嬉しいです！
      
      残りのツアーも、全力で駆け抜けるぞ！！🔥
      
      #NEKI #guitarist
    translation: |-
      .
      2026.02.08
      NEK! 2nd ANNIVERSARY LIVE TOUR 2026 
      @ shibuya eggman
      
      Tour opening day!!!! eggman!!!
      
      First of all, thank you so much for coming despite the terrible weather.
      I think many of you went through a lot of trouble just to get here.
      Thanks to all of you, we were able to successfully kick off the tour!
      
      Everyone's energy was incredible!!
      It felt powerful enough to melt the snow around eggman,
      and I received so much power from seeing all of you from the stage🔥
      
      And the sing-alongs—I wondered if everyone had been practicing?! It was so amazing
      I was truly moved.
      Hearing all your voices and seeing your hands up,
      it reminded me once again how great live shows are.
      
      I'm already so excited for the rest of the tour, I can't help it!!!
      I'm sure this will become an unforgettable memory for NEK!.
      
      11 locations left
      I'll do my absolute best to grow a lot and return to Tokyo even stronger!!
      
      Also, I know there are some people who couldn't make it this time.
      If you can make it to any of the remaining tour dates, I'd be so happy if you came to see us!
      
      We’re going to run through the rest of this tour with everything we've got!!🔥
      
      #NEKI #guitarist
