- postinstagram:
    id: DXiZRzxmRq9
    account: 46_hikaa
    label: Hika pre-show thoughts
    published-date: 2026-04-25
    text: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      
      セミファイナルから少し時間が経ったけど、
      あの日の余韻がまだ抜けてない。
      
      セミファイナルも終わり、
      明日はいよいよツアーファイナル。
      
      11箇所まわって、本当に楽しかった。
      楽しかった分だけ、終わりが近いと思うとちょっと寂しい。
      
      NEK!と出会って、ここまでみんなで積み上げてきたもの、
      明日、全部出し切って
      
      まだ見たことない景色、みんなで見にいこ！
      
      ラスト東京。
      全力で、私たちの全部を音楽で伝えます。楽しもう！
    translation: |-
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      A little time has passed since the semi-final, but
      the afterglow of that day still hasn't faded.
      
      The semi-final is over, and
      tomorrow is finally the tour final.
      
      Going around to 11 places, it was really fun.
      Because it was so fun, it's a little sad to think that the end is near.
      
      What we've built up together since meeting NEK!,
      tomorrow, we'll pour it all out.
      
      Let's go see the scenery we've never seen before, all of us together!
      
      Last stop, Tokyo.
      With all our might, we will convey everything we are through our music. Let's enjoy it!
    image:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    todo: context for the images
