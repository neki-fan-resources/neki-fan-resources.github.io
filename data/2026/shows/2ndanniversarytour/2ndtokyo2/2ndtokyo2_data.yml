    - 1
    part-of:
      show:
        year: 2026
        id: 2ndtokyo2

- postinstagram:
    id: DXqgV34GhTr
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-04-28
    text: |-
      2026.04.26
      ⁡
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      ⁡
      ツアーファイナル無事終了いたしましたーーーー！！！
      渋谷クラブクアトロにお越しくださった皆さま本当に本当にありがとうございました🙏🏻💙
      ⁡
      そしてソールドアウトもありがとうございました！
      ギューギューのクアトロでファイナルを迎えられて本当に嬉しかったです！ツアーの締めくくりに最高のプレゼントをありがとう！！
      ⁡
      2月8日渋谷eggmanから始まったNEK!初の全国ツアー。
      初日は今年関東でいちばん雪が降った日で、ファンのみんなも私達も会場まで無事辿り着けるのだろうかという不安な気持ちの中、朝を迎えたのを覚えています。
      ですが、ライブが始まりフロアを見渡すと、隙間が見当たらないほどパンパンに埋まっていて、心から安堵したのが昨日の事のように思い返せます😌❄️𓈒𓏸
      
      ⁡私たちの歴史を語る上で欠かせない故郷のようなライブハウスである渋谷eggmanで初日を迎えられたことはとても感慨深かったし、始動のときからずっとNEK!を傍で見守ってくれている父のような存在の窪田さんに行ってらっしゃいと送り出していただけたことがとても嬉しかったです🥲
      
      そこから神奈川→埼玉と関東3箇所を立て続けに巡り、毎回ファンの皆さんの反応を見てセットリストの構成を変えてみたり、ツアーならではの初めて訪れた場所では機材トラブルが発生した日もあったりして、その度にチームで相談して乗り越えていき、バンドとしてひとまわりもふたまわりも成長することができたなと思います。
      ⁡
      そして3月20日から遠征が始まり、初めは宮城と福島に訪れました。
      宮城は昨年出演させていただいたサーキット以来だったので、久々に仙台でライブができて嬉しかったですし、今回人生で初めて福島県に訪れて、自然豊かな風景に心が癒されました🌞
      ⁡
      3月下旬には愛知2Daysがあり、ファンの皆さんから熱狂的なエールを直接もらってツアー後半戦へのエネルギーチャージができました！豊橋は特に会場の構造上、ファンの皆さんの顔が後ろまでしっかり見えていたので熱量をより強く感じることができました🔥
      ⁡
      そして4月に入りまたもや人生で初めての熊本と福岡に訪れました！Hikaの地元である九州でライブができたことが自分の事のように嬉しかったです☺️
      NEK!の音楽がこんな遠くにまで届いているんだとライブを通して実感できて、NEK!と出会ってくれて、そしてライブに足を運んでくれて本当にありがとう！！という感謝の気持ちでいっぱいになりました。
      ⁡
      そして遠征編の締めくくりには兵庫と大阪に訪れ、ずっと出たいなと思っていたタイトラと梅田シャングリラの2会場でやらせていただき、昨年の東名阪ツアーより規模を拡大して関西に戻ってくることができたので、NEK!の輪が広まっているのを感じられて嬉しかったです！
      セミファイナルの梅田シャングリラは遠征先の中では最も大きな会場だったので、ライブ中の一体感を見てツアーファイナルがより楽しみになりました。
      ⁡
      そして迎えた4月26日、ツアーファイナル。
      
      渋谷から始まり渋谷に戻ってきて、初日は想像もできなかったフロアが作り出す圧巻の光景にライブ中はずっと感動していました。熱気に包まれたギューギューのフロアで、ライブが始まってから終わるまでずっと一緒に歌ってくれて、ノってくれて、手拍子やジャンプも一生懸命してくれたファンの皆さんには本当に感謝の気持ちでいっぱいです！
      いつも一緒にライブを作り上げてくれて本当にありがとう🔥
      ⁡
      NEK!の代名詞でもあるスラングロックを軸とした楽曲を立て続けに披露させていただく中で、バラードコーナーではDear meを初披露させていただきました。
      音源とは異なるアコギを用いたアレンジもあり、楽曲のもつ暖かさと私たちから皆さんへの感謝の気持ちがダイレクトに届いていたら嬉しいなと思います。
      ⁡
      本当にファンの皆さんの支えがあったから今回の全国ツアーも完走することができました。感謝してもしきれないです。本当にありがとうございます！！
      
      皆さんの存在は私たちの存在意義そのものです。
      これから先もファンの皆さんに喜んでもらえるような私たちでいたいと思うし、常に期待を上回る活躍ができるようにバンドとしても個人としても頑張っていきたいなと思います。
      ⁡
      初の全国ツアーは幕を閉じましたが、NEK!の旅はまだまだ終わりません！無数の叶えたい夢を抱えこれからもNEK!らしく突っ走っていきますので、引き続き熱い応援をよろしくお願いします🔥
      ⁡
      Photo by @ryuji_kinmruj 
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.04.26
      
      "NEK! 2nd ANNIVERSARY LIVE TOUR 2026"
      
      The tour final has officially concludedーーーー！！！
      Thank you so, so much to everyone who came to Shibuya Club Quattro🙏🏻💙
      
      And thank you for the sold out too!
      I was so happy to welcome the final at a packed-out Quattro! Thank you for the best gift to wrap up the tour!!
      
      NEK!'s first nationwide tour started at Shibuya eggman on February 8th.
      The first day was the snowiest day of the year in Kanto, and I remember waking up that morning feeling anxious about whether the fans and we would be able to make it to the venue safely.
      But, when the live started and I looked out at the floor, it was packed so tight there wasn't even a gap to be found, and I can still recall the feeling of heartfelt relief like it was yesterday😌❄️𓈒𓏸
      
      It was very deeply moving to start the first day at Shibuya eggman, a live house that's like our hometown and indispensable when talking about our history, and I was so happy to be seen off by Kubota-san, who is like a father figure who has been watching over NEK! from the very beginning, saying "go get 'em" 🥲
      
      From there we visited three locations in Kanto in succession: Kanagawa → Saitama, and we tried changing the setlist composition based on the fans' reactions each time, and on days we visited new places, which is unique to touring, we even had equipment trouble, but each time we discussed it as a team and overcame it, and I think we were able to grow one or two sizes bigger as a band.
      
      Then, the tour began in earnest on March 20th, and we first visited Miyagi and Fukushima.
      It had been since the circuit event we performed at last year in Miyagi, so I was happy to perform a live in Sendai again after a long time, and I visited Fukushima Prefecture for the first time in my life, and my heart was healed by the nature-rich scenery🌞
      
      In late March we had 2Days in Aichi, and getting passionate encouragement directly from the fans helped us recharge our energy for the second half of the tour! In Toyohashi specifically, due to the structure of the venue, I could clearly see the faces of the fans all the way to the back, so I was able to feel the intensity even more strongly🔥
      
      And entering April, we visited Kumamoto and Fukuoka, again for the first time in my life! Being able to do a live in Kyushu, which is Hika's hometown, made me as happy as if it were my own joy☺️
      I was able to realize through the live that NEK!'s music reaches this far, and I was filled with feelings of gratitude: "Thank you so much for meeting NEK!, and for coming to the live!!"
      
      And to wrap up the touring portion of our journey, we visited Hyogo and Osaka, and were allowed to perform at two venues I had always wanted to play at, Tai-Tra and Umeda Shangri-La, and since we were able to return to Kansai with a larger scale than last year's Tokyo-Nagoya-Osaka tour, I was happy to feel that the circle of NEK! is expanding!
      The semi-final at Umeda Shangri-La was the largest venue on the road, so seeing the sense of unity during the live made me look forward to the tour final even more.
      
      And then came April 26th, the tour final.
      
      Starting in Shibuya and returning to Shibuya, I was moved the entire time during the live by the overwhelming sight created by the floor, which I couldn't have even imagined on the first day. I am truly full of gratitude to the fans who, on the packed-out floor wrapped in heat, sang along, grooved, and gave it their all with clapping and jumping from the start of the live until the end!
      Thank you so much for always creating the live together with us🔥
      
      While we performed songs centered around "Slang Rock," which is synonymous with NEK!, one after another, we performed "Dear me" for the first time during the ballad segment.
      There was an arrangement using acoustic guitar that was different from the recorded version, and I hope the warmth of the song and our feelings of gratitude to you all reached you directly.
      
      It really was because of the fans' support that we were able to complete this nationwide tour. I can't thank you enough. Thank you so very much!!
      
      Your existence is the very meaning of our existence.
      I want to continue to be a band that makes the fans happy from here on out, and I want to work hard both as a band and as individuals so that we can always exceed expectations in our activities.
      
      The first nationwide tour has come to a close, but the NEK! journey is far from over! We will continue to race forward like NEK!, carrying countless dreams we want to fulfill, so please continue to support us with passion🔥
      
      Photo by @ryuji_kinmruj 
      #neki #neki_band #girlsband #drum #femaledrummer
