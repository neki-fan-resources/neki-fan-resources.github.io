- postinstagram:
    id: DXoSy5GCUPo
    account: 46_hikaa
    label: Hika's report
    published-date: 2026-04-27
    text: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      
      @渋谷CLUB QUATTRO
      
      改めてツアーファイナル東京、ソールドアウト。
      たくさんの方がNEK!のライブに足を運んでくれたこと、本当に嬉しく思います。
      ありがとうございました。
      
      12箇所まわってこの日を迎えるまで、
      どんな気持ちになるのか、どんな景色が見えるのか
      正直想像もつかなかったけど、
      
      この12公演、本当に楽しかったし
      幸せすぎるツアーでした。
      
      初めての場所もあれば、
      また帰ってこれた場所もあって、
      新しい出会いもあれば、
      久しぶりに会えた人もいて。
      
      音楽って“音を楽しむ”だけじゃなくて
      人と人を繋げてくれるものなんだって
      このツアーで改めて感じました。
      
      このツアーが出来たのは、
      メンバー、ネキスタッフ、家族や友達、
      そしてずっと応援してくれて、NEK!の音楽を愛してくれてるみんなのおかげです。
      
      本当にありがとう。
      
      そしてNEK!はここからが始まりだ！
      もっとすごい景色、みんなで見たい！
      一緒にでっかい夢掴みにいこ！
      
      これからもよろしくです！
    translation: |-
      “NEK! 2nd ANNIVERSARY LIVE TOUR 2026”
      
      @Shibuya CLUB QUATTRO
      
      Once again, the tour final in Tokyo, sold out.
      I am truly happy that so many people came out to the NEK! live show.
      Thank you very much.
      
      Until I went around to all 12 venues and reached this day,
      what I would feel, what kind of scenery I would see,
      honestly, I couldn't even imagine, but,
      
      these 12 performances were truly fun and
      it was an incredibly happy tour.
      
      There were places I visited for the first time,
      and places I was able to return to again,
      there were new encounters,
      and people I was able to see for the first time in a while.
      
      Music isn't just about "enjoying sound,"
      it's something that connects people to people,
      I felt that anew during this tour.
      
      The reason this tour was possible is
      because of the members, the NEK! staff, my family and friends,
      and everyone who has been supporting us, and everyone who loves NEK!'s music.
      
      Thank you so much.
      
      And for NEK!, this is where it begins!
      I want to see even more amazing scenery with everyone!
      Let's go grab a huge dream together!
      
      Please continue to support us!
