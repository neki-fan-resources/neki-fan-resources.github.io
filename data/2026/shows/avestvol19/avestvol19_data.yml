- postx:
    id: 2028056429354217608
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-03-01
    text: |-
      初！！AVEST！！
      
      トッパーだったのにたくさんの人が集まってくれて、本当に嬉しかった！！！😭❤️‍🔥
      お昼からアチアチの空間だったねー！！！！！🔥🔥
      前から後ろまで皆さんの声届いてました！！本当にありがとうございました！！
      
      次はツアー３日目埼玉でお会いしましょう！！
    translation: |-
      First time!! AVEST!!
      
      Even though we were the opener, so many people gathered, and I was really happy!!!😭❤️‍🔥
      It was such a scorching hot space from noon!! 🔥🔥
      I could hear everyone's voices from the front all the way to the back!! Thank you so much!!
      
      Next, let's meet on the 3rd day of the tour in Saitama!!
    image:
    - HCUakVeaMAAKhw1
    - HCUakVoa8AAmFy8
