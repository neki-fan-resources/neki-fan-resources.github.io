- postx:
    id: 2012881700187963512
    account: cure_bass_baka
    label: Thank you
    published-date: 2026-01-18
    text: |-
      でらロックフェスティバル TOKYO 2026
      @ 下北沢MOSAiC
      
      ありがとうございました！！
      ツアー前最後ということで、セトリも少し攻めてみたんだけど、どうだったかな💭
      新しいエフェクターも良い感じで、ベース弾いてて楽しかった🌟
      次はまたツアーで会いましょっ(｡•̀ᴗ-)☆
    translation: |-
      Dera Rock Festival TOKYO 2026
      @ Shimokitazawa MOSAiC
      
      Thank you so much!!
      Since it was our last show before the tour, I tried to be a bit aggressive with the setlist—how was it? 💭
      The new effects pedal felt great, and I had so much fun playing bass 🌟
      Let's meet again on the tour (｡•̀ᴗ-)☆
    image:
    - G-8xOo-WkAAqted
    - G-8xOo4WkAAqJbY
    part-of:
      show:
        year: 2026
        id: derarock

