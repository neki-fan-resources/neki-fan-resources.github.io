    translation: |-
      Dera Rock Festival TOKYO 2026
      @ Shimokitazawa MOSAiC
      
      It's midwinter outside, but NEK!'s floor was so hot I thought it was midsummer! 🔥🔥
      That was the most fun ever!!
      Thank you!!!!
      
      Next up is finally! The first day of the tour❤️‍🔥
      My heart is racing!!
      Please, please come join us! 🫶🏻
