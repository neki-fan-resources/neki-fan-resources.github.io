- postx:
    id: 2012893509011783718
    account: coco_102
    label: Thank you
    published-date: 2026-01-18
    text: |-
      #でらロック ありがとうございました❤️‍🔥
      MOSAiCに集まってくれたみなさんとアツく楽しい時間を過ごせました！ありがとう！
      今日の思い出としてrip-offのお気に入りフィル貼っときます🥁
      
      そして次回はとうとうNEK!初の全国ツアー初日！
      我々の思い出が沢山詰まったeggmanで最高の幕開けを！楽しみじゃ🔥
      
      alt:
      今日ライブ前に買ったリムレスメガネ`⎚⩊⎚´ -✧
    translation: |-
      #DeraRock Thank you so much❤️‍🔥
      I had such a hot and fun time with everyone who gathered at MOSAiC! Thank you!
      I'm posting my favorite fill from rip-off as a memory of today🥁
      
      And next time is finally the first day of NEK!'s first nationwide tour!
      Let's have the best opening at eggman, a place filled with so many of our memories! I can't wait🔥
      
      alt:
      Rimless glasses I bought before the show today`⎚⩊⎚´ -✧
