- postx:
    id: 2036443026218950837
    account: cure_bass_baka
    label: Thank you
    published-date: 2026-03-24
    text: |-
      "FOMARE OVER TOUR 25-26"
      @ 秋田・Club SWINDLE
      
      NEK!初秋田🌟
      ツアーご一緒させて頂きました！
      初めての土地でドキドキでしたが…！
      FOMAREさんが優しく接してくださり、とても楽しい1日になりました🥹🙏🏻
      明日の山形もご一緒させて頂きます！
      よろしくお願いします！！
    translation: |-
      "FOMARE OVER TOUR 25-26"
      @ Akita Club SWINDLE
      
      NEK!'s first time in Akita🌟
      We got to join the tour!
      It was nerve-wracking being in a new place for the first time...!
      But FOMARE were so kind to us, it turned into a really fun day🥹🙏🏻
      We'll be joining them in Yamagata tomorrow too!
      Looking forward to it!!
