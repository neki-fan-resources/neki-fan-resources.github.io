- postx:
    id: 2036443920847224944
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-03-24
    text: |-
      "FOMARE OVER TOUR 25-26"
      
      秋田！ありがとうございました！！
      すごすぎる方とツーマンさせていただいたのだとライブを見て改めて実感しました
      
      本当に本当に最高でした。
      かっこよかったー！！！
      
      明日は山形です！
      明日もよろしくお願いします！！
    translation: |-
      "FOMARE OVER TOUR 25-26"
      
      Akita! Thank you very much!!
      Watching the show made me realize all over again that we just did a two-man live with someone truly incredible.
      
      It was really, really the best.
      So cool!!!
      
      Tomorrow is Yamagata!
      Looking forward to tomorrow as well!!
    image:
    - HELm6sqawAAPw_3
    - HELm6sqbYAAhNyY
