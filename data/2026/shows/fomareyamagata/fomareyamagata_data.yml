- postinstagram:
    id: DWYmdeTEvSd
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-03-27
    text: |-
      .
      "FOMARE OVER TOUR 25-26"
      @ 秋田・Club SWINDLE
      @ 酒田 MUSIC FACTORY
      
      2日間、ありがとうございました！！
      
      こんなにも大切なツアーにNEK!を呼んでくださったこと、
      本当に感謝の気持ちでいっぱいです。
      
      FOMAREさんのかき鳴らす音が
      最高にかっこよかった！！！
      
      これが音楽か、
      これがライブか
      
      と強く心を動かされました。
      
      いつか私たちの音楽がもっとたくさんの方に届いて、今より大きくなれたとき
      また、同じステージに立てたら嬉しいです
      
      その日まで、全力でNEK!の音楽を届け続けていきます
      
      バンドって最高！！！！
      
      改めてありがとうございました
      
      Photo by @tomakamimura @ruihashimoto
      
      #fomare
    translation: |-
      "FOMARE OVER TOUR 25-26"
      @ Akita Club SWINDLE
      @ Sakata MUSIC FACTORY
      
      Thank you so much for these two days!!
      
      I am truly filled with gratitude
      that NEK! was invited to such an important tour.
      
      The sound FOMARE played
      was so incredibly cool!!!
      
      I was deeply moved, thinking:
      This is what music is,
      This is what a live show is.
      
      When our music reaches even more people and we become bigger than we are now,
      I would be happy if we could stand on the same stage again.
      
      Until that day comes, I will continue to deliver NEK!'s music with all my might.
      
      Bands are the best!!!!
      
      Thank you once again.
      
      Photo by @tomakamimura @ruihashimoto
      
      #fomare
