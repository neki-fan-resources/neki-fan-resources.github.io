- postinstagram:
    id: DWV9f_3koS2
    account: 46_hikaa
    label: Thank you
    published-date: 2026-03-26
    text: |-
      “FOMARE OVER TOUR 25-26”
      
      この2日間、本当にありがとうございました。
      
      FOMAREさんの大切なツアーに呼んでもらえたこと、心から感謝してます。
      
      音楽を通じて一緒に楽しんで新しい出会いもあり
      みんなで作るライブハウスの空気に改めて音楽は最高だなと強く感じた2日間でした。
      
      ありがとうございました。
      
      最後に撮ったこの写真は宝物！！
      
      @fomare_official
    translation: |-
      “FOMARE OVER TOUR 25-26”
      
      Thank you so much for these last two days.
      
      I'm truly grateful to have been invited to FOMARE's important tour.
      
      Enjoying ourselves together through music and having new encounters,
      it was a two-day period where the atmosphere of the live house we all created together made me strongly feel once again that music is the best.
      
      Thank you very much.
      
      This photo we took at the end is a treasure!!
      
      @fomare_official
