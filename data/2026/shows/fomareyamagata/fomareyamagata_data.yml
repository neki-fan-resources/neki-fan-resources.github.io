- postinstagram:
    id: DWYdMRRmpnM
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-03-27
    text: |-
      2026.03.24~25
      ⁡
      "FOMARE OVER TOUR 25-26"
      ⁡
      秋田公演と山形公演をご一緒させていただきました❤️‍🔥
      ロック界の大先輩であるFOMAREさんのツアーに今回参加させていただき、たくさんの貴重な体験をさせていただきました！！
      
      未熟な私たちにこんな素敵な機会をくださったFOMAREさんに本当に頭が上がりません！
      
      超若手の私たちにも気さくに話しかけてくれるお二人の素敵な人柄と、ステージに立ったときの内から溢れ出る熱量にとても感銘を受け、私たちもいつかこんな先輩になれたらいいなと強く思いました。
      
      この世界で生きていくために忘れてはいけない考え方や姿勢をたくさん学ばさせていただいた2日間でした！
      ⁡
      そして私たちのことを温かく迎え入れてくださったFOMAREのファンの皆さんにも心から感謝の気持ちでいっぱいです！
      NEK!の音楽が貴方の心にまっすぐ届いていたら嬉しいな。
      今後ともNEK!をよろしくお願いします🙂‍↕️🔥
      ⁡
      2日間本当に本当にお世話になりました！！楽しかったー！
      ⁡
      Photo by @ruihashimoto @tomakamimura
    translation: |-
      2026.03.24~25
      ⁡
      "FOMARE OVER TOUR 25-26"
      ⁡
      We joined the Akita and Yamagata performances❤️‍🔥
      By participating in the tour of our rock scene seniors, FOMARE, we were able to have so many precious experiences!!
      
      We can't thank FOMARE enough for giving us such a wonderful opportunity despite us being so inexperienced!
      
      We were so impressed by the wonderful personalities of the two who spoke so kindly to us youngsters, and by the passion overflowing from within when they stood on stage; it made us strongly hope to become seniors like them someday.
      
      These were two days where we learned so much about the mindset and attitude that must never be forgotten to survive in this world!
      ⁡
      And we are filled with heartfelt gratitude to all the FOMARE fans who welcomed us so warmly!
      I would be happy if NEK!'s music reached your hearts directly.
      Please continue to support NEK! going forward🙂‍↕️🔥
      ⁡
      Thank you so, so much for everything over these two days!! It was so much fun!
      ⁡
      Photo by @ruihashimoto @tomakamimura
