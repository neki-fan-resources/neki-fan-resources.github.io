      街のライブシーンをつなぐ、毎年恒例のライブイベント🎶
      注目のニューカマーから、シーンを支える実力派バンドまでが集結し、ライブを通して、夏の祭典 #ジャイガ への流れを一緒に作っていきます。
      10年分の熱い思いを伝える今年のジャイガを、みんなで一緒にお祝いしましょう！🎉
      
      📅4/12(SUN)
      🏟梅田BANGBOO/Banana Hall/梅田Zeela
      
      詳細はHPをチェック！👉https://the-bonds-osaka.com
