- postx:
    id: 2052776981826306524
    account: coco_102
    label: Thank you
    published-date: 2026-05-08
    text: |-
      GrAViTyありがとうございました！
      機材トラブル本当に申し訳ありませんでした。
      完全体をお届けできなくて正直めちゃくちゃ悔しい。でもフロアのみんながライブそのものを楽しんでくれたおかげで最後までやり切ることができました。本当にありがとう。
      またお2組と再会できる日を夢見て頑張ります🔥
    translation: |-
      Thank you for GrAViTy!
      I am truly sorry for the equipment trouble.
      To be honest, I'm incredibly frustrated that we couldn't deliver a perfect performance. But thanks to everyone on the floor enjoying the live show itself, we were able to see it through to the end. Thank you so much.
      I'll do my best while dreaming of the day we can meet both groups again🔥
    image:
    - HHztxtEbgAAaPGf
    part-of:
      show:
        year: 2026
        id: gravityvol6
    reference:
    - postximage:
        post: 2052757787722276902
        image: HHzcUIGa4AAVJbo

- postx:
    id: 2052788941586301263
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-05-08
    text: |-
      『GrAViTy』@ SHIBUYA THE GAME
      ありがとうございました！！！
      
      とっても刺激的な1日になりました
      “ガールズバンドは死なない”
      いちガールズバンドとして、盛り上げていけるよう頑張ります
      
      お集まりいただいた皆様！本当にありがとうございました！
      
      alt:
      ギターお友だちができました🤝🏻
      たくさんお話しできて素敵な夜でした🌙
      まおちゃんらぶ♡
    translation: |-
      『GrAViTy』@ SHIBUYA THE GAME
      Thank you very much!!!
      
      It was an incredibly stimulating day
      "Girls' bands will never die"
      As a girls' band ourselves, we will do our best to keep the scene exciting
      
      To everyone who gathered! Thank you so truly much!
      
      alt:
      I made a guitar friend
      It was a wonderful night getting to talk so much
      Love you Mao-chan♡
