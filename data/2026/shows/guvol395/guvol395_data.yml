    published-date: 2026-01-16
    text: |-
      2026.01.04
      вҒЎ
      Girl's UP!!! vol.395 
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      
      еҝөйЎҳгҒ®TRiDENTгҒ•гӮ“гҒЁгҒ®гғ„гғјгғһгғігғ©гӮӨгғ–пјҒпјҒ
      гҒ“гӮ“гҒӘгҒәгғјгҒәгғјгҒӘз§ҒгҒҹгҒЎгҒЁеҜҫгғҗгғігҒ—гҒҰгҒҸгҒ гҒ•гҒЈгҒҹгҒ“гҒЁгҒ«жң¬еҪ“гҒ«еҝғгҒӢгӮүж„ҹи¬қгҒ„гҒҹгҒ—гҒҫгҒҷгҖҒгҖҒпјҒпјҒ
      жң¬еҪ“гҒ«гҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹрҹҘІрҹҷҸрҹҸ»вңЁпёҸ
      гҒқгҒ—гҒҰдјҒз”»гҒ—гҒҰгҒҸгҒ гҒ•гҒЈгҒҹзӘӘз”°гҒ•гӮ“гҒ«гӮӮеӨ§ж„ҹи¬қгҒ§гҒҷпјҒпјҒ
      
      иЈҸгҒ§гӮӮгҒҹгҒҸгҒ•гӮ“гҒҠи©ұгҒ§гҒҚгҒҰе¬үгҒ—гҒӢгҒЈгҒҹпјҒе„ӘгҒ—гҒҷгҒҺгҒҹгҖңгҖңпјҒпјҒ
      
      е§үгҒ•гӮ“гҒҹгҒЎгҒ®гҒӢгҒЈгҒ“гҒ„гҒ„иғҢдёӯиҝҪгҒЈгҒӢгҒ‘гҒҰе°‘гҒ—гҒ§гӮӮиҝ‘гҒҘгҒ‘гӮӢгӮҲгҒҶгҒ«й ‘ејөгӮҠгҒҫгҒҷрҹ”Ҙ
      вҒЎ
      #NEKI #TRiDENT #girlsband #drum #femaledrummer
    translation: |-
      2026.01.04
      вҒЎ
      Girl's UP!!! vol.395 
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      
      The long-awaited two-man live with TRiDENT!!
      I am truly grateful from the bottom of my heart that they did a joint gig with rookies like us...!!
      Thank you so muchрҹҘІрҹҷҸрҹҸ»вңЁпёҸ
      And a huge thank you to Kubota-san for planning this!!
      
      I was so happy we got to talk a lot backstage too! They were way too kind~~!!
      
      IвҖҷll do my best to chase after our seniors' cool examples and get even a little bit closer to themрҹ”Ҙ
      вҒЎ
      #NEKI #TRiDENT #girlsband #drum #femaledrummer
