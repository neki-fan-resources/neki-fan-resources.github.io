- postinstagram:
    id: DTGFSKhkhiq
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-01-04
    text: |-
      2026.01.04
      ⁡
      Girl's UP!!! vol.395 
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      
      念願のTRiDENTさんとのツーマンライブ！！
      こんなぺーぺーな私たちと対バンしてくださったことに本当に心から感謝いたします、、！！
      本当にありがとうございました🥲🙏🏻✨️
      そして企画してくださった窪田さんにも大感謝です！！
      
      裏でもたくさんお話できて嬉しかった！優しすぎた〜〜！！
      
      姉さんたちのかっこいい背中追っかけて少しでも近づけるように頑張ります🔥
      ⁡
      #NEKI #TRiDENT #girlsband #drum #femaledrummer
    translation: |-
      2026.01.04
      ⁡
      Girl's UP!!! vol.395 
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      
      The long-awaited two-man live with TRiDENT!!
      I am truly grateful from the bottom of my heart that they did a joint gig with rookies like us...!!
      Thank you so much🥲🙏🏻✨️
      And a huge thank you to Kubota-san for planning this!!
      
      I was so happy we got to talk a lot backstage too! They were way too kind~~!!
      
      I’ll do my best to chase after our seniors' cool examples and get even a little bit closer to them🔥
      ⁡
      #NEKI #TRiDENT #girlsband #drum #femaledrummer
