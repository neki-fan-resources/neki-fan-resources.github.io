- postinstagram:
    id: DTVJ0xvEqX5
    account: natsu08_guitar
    label: Natsu's report
    published-date: 2026-01-10
    text: |-
      .
      2026.01.04
      新年一発目のライブ
      Girl's UP!!! vol.395
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      @ Shibuya eggman
      
      夢のような夢のようなTRiDENTさんとのツーマン！！✌🏻❤️‍🔥
      このツーマンを実現できて、本当に幸せでした！！
      TRiDENT姉様、みなさんとっても優しくて、、、
      たくさんお話しもできて、嬉しかったです！！
      
      また対バンできるよう背中を追いかけ続けます🔱🔱
      来てくださった皆さん！ありがとうございました！！
    translation: |-
      .
      2026.01.04
      The first live of the new year
      Girl's UP!!! vol.395
      -NEW YEAR SPECIAL TWO MAN SHOW!!-
      @ Shibuya eggman
      
      A dream-like, dream-like two-man show with TRiDENT!!✌🏻❤️‍🔥
      I was truly happy that we could make this two-man show happen!!
      The TRiDENT ladies were all so kind...
      I was so happy we got to talk a lot too!!
      
      I’ll keep chasing their lead so we can play together again🔱🔱
      To everyone who came! Thank you so much!!
