- postx:
    id: 2052066179536322620
    account: 46_hikaa
    label: Thank you
    published-date: 2026-05-06
    text: |-
      本日Viewtradeさんとのツーマンライブ
      
      今日もみんなの歓声と拳、最高すぎだよ！
      ほんと、楽しすぎました。
      
      ライブ後は、音楽やバンドのこと、お互いにたくさん語り合えて、すごく濃い一日になりました。
      
      また、一緒に対バンしたいっ！
      今日は皆さんありがとうございました！
    translation: |-
      Today's two-man live with Viewtrade
      
      Your cheers and fists today were just the best!
      Honestly, it was too much fun.
      
      After the live, we talked a lot about music and the band together, making it a very intense day.
      
      I want to do another show together!
      Thank you to everyone today!
