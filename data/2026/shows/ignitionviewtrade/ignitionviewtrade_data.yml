- postx:
    id: 2052050724473958484
    account: coco_102
    label: Thank you
    published-date: 2026-05-06
    text: |-
      Viewtrade×NEK!ツーマンありがとうございました！
      地域とジャンルの壁を超える激アツな夜でした🔥
      Viewtradeさんみんなテクニシャンすぎてめっちゃ刺激もらいました！
      打ち上げでもいろんな話して楽しかったよ〜〜
      みんなまじで優しくて素敵！！出会えてよかった🥹
      また一緒になれたらいいな🙂‍↕️🤝🏻
      
      alt:
      ふみふみ考案の謎ポーズ🤔笑
    translation: |-
      Thank you for the Viewtrade × NEK! two-man show!
      It was a super hype night that broke through barriers of region and genre🔥
      Everyone in Viewtrade is such a technician, it was so inspiring!
      We had a great time talking about all sorts of things at the after-party~~
      Everyone is seriously kind and wonderful!! I'm so glad we met🥹
      I hope we can play together again🙂‍↕️🤝🏻
      
      alt:
      A mysterious pose thought up by Fumi-fumi🤔lol
    image:
    - HHpZQHcagAA_wGz
