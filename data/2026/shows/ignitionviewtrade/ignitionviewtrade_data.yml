      Viewtradeさんとのツーマン! @ 下北沢CLUB251
      
      ありがとうございました！
      めちゃめちゃ刺激になって最高の夜でした…！！
      全パートえぐかったぁぁ！！🔥テクニカルが詰め込まれてて楽しかったなぁ
      
      そしてついに、わたくし、ワイヤレス導入いたしました^_^
      これからいっぱい遊びにいっちゃおーっとっ♡
    translation: |-
      Two-man show with Viewtrade! @ Shimokitazawa CLUB251
      
      Thank you so much!
      It was an amazing night and so inspiring...!!
      Every part was insane!!🔥 It was so much fun and packed with technical skill
      
      And finally, I have introduced a wireless system ^_^
      I'm gonna go out and have lots of fun with it now♡
