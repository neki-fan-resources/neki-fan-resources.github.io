- postx:
    id: 2055579760995229857
    account: coco_102
    label: Thank you
    published-date: 2026-05-16
    text: |-
      武蔵野音楽祭！初出場ありがとうございました🐘
      初の吉祥寺、ワンマンかと錯覚するくらいフロア一丸となっててアツかったです🔥Theライブハウスの距離感！って感じで最高に楽しかった！！
      2階も盛り上がってくれてるのしっかり見えてたよ！
      そして全頭黒髪になりました！就活じゃないからね！
    translation: |-
      Musashino Music Festival! Thank you for our first appearance🐘
      Our first time in Kichijoji, the floor was so united it felt like a solo show, it was so hot🔥It felt like "This is that live house distance!" and it was the best, so much fun!!
      I could clearly see the 2nd floor pumping too!
      And now my whole head is black hair! It's not for job hunting, okay!
    image:
    - HIbi5R4aIAEucFB
    - HIbi5R_bsAAz7_U
    part-of:
      show:
        year: 2026
        id: musafes

