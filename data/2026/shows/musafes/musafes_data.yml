- postx:
    id: 2055577992416657614
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-05-16
    text: |-
      武蔵野音楽祭 蓮の音カーニバル2026
      
      初の吉祥寺！新鮮で楽しかった〜🤍🤍
      
      たくさんのアーティストさんが出演する中で、私たちを選んで集まってくださり本当にありがとうございます！！
      アチチな30分でした❤️‍🔥❤️‍🔥
      
      9月から東名阪ツアーが始まるのでぜひ気になった方は遊びに来てくださると嬉しいです!
    translation: |-
      Musashino Music Festival Hasu no Ne Carnival 2026
      
      First time in Kichijoji! It was so fresh and fun~🤍🤍
      
      With so many artists performing, thank you so much for choosing us and gathering here!!
      It was a super hot 30 minutes❤️‍🔥❤️‍🔥
      
      Our Tokyo-Nagoya-Osaka tour starts in September, so if you're interested, we'd love for you to come check it out!
