- postinstagram:
    id: DX3pRrbHXw1
    account: cure_bass_baka
    label: Kanade's report
    published-date: 2026-05-03
    text: |-
      SHOW-YA PRODUCE「NAONのBUNTAI 2026」
      @ 横浜BUNTAI
      ⁡
       姐さん方、全員に大感謝でした、、、🥲
      
      私の憧れの方や大好きアーティストさんが毎回参加されていて、そして大好きなSHOW-YAさんが主催のイベントで
      中学生の時からずーーーっと憧れていました！
      NAONに出たいから、バンド組むなら絶対ガールズバンド‼️って決めてたくらいには。
      
      まさか本当に出演できるなんて夢にも思ってなくて、
      本当にSHOW-YAの姐さん方ありがとうございます。。🥲
      当時の私がこの日の事を知ったら絶対に大号泣します。
      
      打ち上げでも大好きな姐さん方に優しくお話していただけて、スタッフのみなさんも優しくて。
      お話してく中で、
      私はまだまだ後輩中の後輩ですが、将来音楽続けてく上で、もし後輩ができた時には、こんな先輩でいたいなって。
      とにかく暖かすぎる空間でした🥹
      
      本当にこの日まで音楽続けてて良かった、
      まだまだ音楽人生続けていく為のパワーもたくさんもらった！
      
      姐さん方を見習って、長く生きられるように頑張ります🌟
      
      もっと書きたいことあるし、ここに残したい気持ちあるけど
      自分の感情書くの下手っぴなので！
      頭の中の辞書のページ数が少なすぎて、薄っぺらい言葉しか出てこないのが悔しいので、これ以上は辞めときます、、
      心強く、本当に素敵な1日でした！
      
      最後に、
      寺田姐さんとのハグだけは絶対に……忘れないで。。
      立ち止まりそうになっても、姐さんとのハグを思い出すんだ。。。
      そうすれば……すぐ元気になる。。。⁡
      ⁡
       #NAONのBUNTAI  #NEKI
    translation: |-
      SHOW-YA PRODUCE "NAON no BUNTAI 2026"
      @ Yokohama BUNTAI
      ⁡
      Deepest gratitude to all the big sisters...🥲
      
      My idols and favorite artists participate every time, and this event is hosted by the SHOW-YA I love—
      I've been longing for this ever since middle school!
      To the point where I decided if I was starting a band, it definitely had to be a girls' band because I wanted to perform at NAON‼️
      
      I never even dreamed I'd actually be able to perform,
      Truly, thank you so much to the big sisters of SHOW-YA..🥲
      If the me back then knew about today, she would definitely be bawling her eyes out.
      
      At the after-party, my favorite big sisters spoke to me so kindly, and the staff were all so nice too.
      As we talked,
      I realized that even though I'm still a junior among juniors, when I have juniors of my own as I continue my music career, I want to be a senior like them.
      Anyway, it was just such a warm atmosphere🥹
      
      I'm so glad I kept doing music until this day,
      I received so much power to keep going with my music life!
      
      I'll follow the example of the big sisters and do my best so that I can last a long time🌟
      
      There's more I want to write, and feelings I want to leave here,
      but I'm bad at writing my own emotions!
      It's frustrating that the dictionary in my head has so few pages and only thin words come out, so I'll stop here..
      It was an empowering, truly wonderful day!
      
      Lastly,
      Never... ever forget... the hug with Sister Terada..
      Even if I feel like stopping, I'll remember the hug with Sister..
      If I do... I'll feel better right away...⁡
      ⁡
      #NAONnoBUNTAI #NEKI
