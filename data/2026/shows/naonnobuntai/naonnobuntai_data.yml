- postinstagram:
    id: DXzPUrKGj5O
    account: cocoro_drum
    label: Cocoro's report
    published-date: 2026-05-01
    text: |-
      2026.04.29
      ⁡
      "NAONのBUNTAI 2026"ありがとうございました！🩷
      憧れの先輩方とご一緒させていただき、本当に夢のような一日でした！！
      
      中学生の頃からずっと客席で見ていたあの憧れのステージにまさか自分が立てるようになるなんて、、
      過去の自分にこの写真たちを見せてあげたいです🥲
      ⁡
      BUNTAIは今までに私たちが立ったステージの中でずば抜けて大きな会場だったので本番前は少しソワソワしていましたが、寺田姉さんに「続いては初登場！！ネキ〜！！」と呼ばれ、袖からドラムセット向かって駆け出すと、全方向に広がるフロアの絶景に一瞬で心掴まれ、感動とワクワクが緊張を秒で吹き飛ばしました🔥
      
      今回はNEK!を知っている方にも、知らない方にも楽しんでいただけるように名刺代わりのような楽曲を3曲披露させていただきました！
      時間の都合で披露できなかったかっこいい楽曲が他にもまだまだたくさんあるので、初めましての方はこれを機にNEK!に少しでも興味を持ってくれたら嬉しいなと思います！！
      ⁡
      まだまだ未熟な私たちに、こんな大きなアリーナで音を奏でる貴重な機会をくださった主催のSHOW-YAさんと、当日イベントに関わってくださった全てのスタッフさんに感謝の気持ちでいっぱいです！本当にありがとうございました！！
      ⁡
      かっこいい背中を見せてくださった憧れの先輩方に少しでも近づけるよう、そしてまたNAONに出演できる日を夢見て、これからも全力で邁進してまいります🔥
      
      夢は必ず叶う！私たちがこれからも証明します！！
      ⁡
      
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      2026.04.29
      ⁡
      Thank you so much for "NAON no BUNTAI 2026"!🩷
      Getting to perform with the seniors I've always admired made it truly feel like a dream-like day!!
      
      To think that I’d be able to stand on that stage I’ve looked up to from the audience since I was in middle school...
      I want to show these photos to my past self🥲
      ⁡
      Since BUNTAI was by far the largest venue we've ever performed at, I was a bit restless before the show, but once Terada-neesan called out "Next is their first appearance!! NEKI~~!!", and I ran from the wings toward my drum set, my heart was instantly captured by the breathtaking view of the floor spreading out in all directions, and the excitement and thrill blew away my nerves in a split second🔥
      
      This time, we performed 3 songs that served as our "business card" so that both people who know NEK! and those who don't could enjoy it!
      There are still so many other cool songs we couldn't play due to time constraints, so for those meeting us for the first time, I'd be happy if this sparks even a little interest in NEK!!
      ⁡
      I am filled with gratitude toward SHOW-YA, the organizers, for giving us—who are still inexperienced—such a precious opportunity to play music in such a large arena, and to all the staff members involved in the event on the day! Thank you so very much!!
      ⁡
      We will continue to push forward with all our might, dreaming of the day we can perform at NAON again and to get even a little bit closer to the admired seniors who showed us their cool examples🔥
      
      Dreams definitely come true! We will continue to prove that!!
      ⁡
      
      #neki #neki_band #girlsband #drum #femaledrummer
