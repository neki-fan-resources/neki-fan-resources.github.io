- postx:
    id: 2063201209977278548
    account: coco_102
    label: Thank you
    published-date: 2026-06-06
    text: |-
      サカスプありがとうございました！！
      今回初出場でしたが多くの方に観に来ていただけて嬉しかったです🫶🏻
      後ろの方まで盛り上がってくれてて最高でした！
      更にレベルアップした状態でまた愛知に戻って来れるように頑張ります🔥今年の夏は東名阪ツアーもあります！ぜひまた一緒に遊びましょう！
    translation: |-
      Thank you so much for SakaSpu!!
      It was our first time appearing, but I was so happy so many people came to watch us 🫶🏻
      You all hyped it up all the way to the back, it was the best!
      We'll do our best to come back to Aichi again having leveled up even more 🔥 We also have our Tokyo-Nagoya-Osaka tour this summer! Let's definitely hang out together again!
