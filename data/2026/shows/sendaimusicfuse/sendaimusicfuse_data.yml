- postinstagram:
    id: DY_sTJXGk2S
    account: cocoro_drum
    label: Cocoro's report
    info: Ignition, GrAViTy, musafes and sendaimusicfuse
    published-date: 2026-05-31
    text: |-
      5月が終わる🫨💥
      
      ゴールデンウィーク最終日のViewtradeとのツーマンも、初めましてのちゃくらとSTRAWDAYとの対バンも、吉祥寺でライブがやりたいという夢を叶えられた武蔵野音楽祭蓮の音カーニバル2026も、そして2年連続で出演させていただいたSENDAI MUSIC FUSE 2026も、どれも濃い思い出でいっぱいです！
      同世代のプレイヤーがステージで輝いてる姿を見てたくさんの刺激を受けました🔥
      ⁡
      今月は水面下の活動も多くて、いいものばっかりだからみんなに早く共有したくて毎日うずうずしています笑
      みんなの反応を想像しながら頑張るよーーーー
      ⁡
      来月は特大イベントのメジャーデビューが待っている！！
      楽しい１ヶ月になりそうな予感です🌞
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
    translation: |-
      May is ending🫨💥
      
      The two-man show with Viewtrade on the final day of Golden Week, the co-starring event with Chakra and STRAWDAY whom we met for the first time, Musashino Ongakusai Hasu no Ne Carnival 2026 where I fulfilled my dream of playing a live show in Kichijoji, and SENDAI MUSIC FUSE 2026 where we were able to perform for the second consecutive year—every single one of them is filled with intense memories!
      Seeing players of the same generation shining on stage gave me so much inspiration🔥
      ⁡
      We had a lot of behind-the-scenes activities this month too, and everything is so good that I'm itching every day to share it with everyone soon lol
      I'll do my best while imagining all of your reactionsーーーー
      ⁡
      Next month, the massive event of our major debut is waiting for us!!
      I have a feeling it's going to be a fun month🌞
      ⁡
      #neki #neki_band #girlsband #drum #femaledrummer
