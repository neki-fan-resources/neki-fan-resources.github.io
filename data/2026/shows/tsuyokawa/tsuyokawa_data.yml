- postx:
    id: 2062936991235551359
    account: coco_102
    label: Thank you
    published-date: 2026-06-05
    text: |-
      セブンスネキツーマンありがとうございました🤝🏻💥
      それぞれの魅力を楽しんでいただけましたか？？
      セブンスとの対バンは約2年ぶりだったので、お互いに今日まで頑張ってきた成果をぶつけ合えて嬉しかったです！同世代ガールズバンドとしてこれからもよろしくお願いします❤️‍🔥
      
      Photo by 
      @shohnophoto
    translation: |-
      Thank you so much for the Seventh-NEK! two-man live 🤝🏻💥
      Did you all enjoy each of our unique styles??
      It's been about 2 years since our last joint gig with Seventh, so I was happy we could clash with the results of all the hard work we've both put in up until today! We look forward to more from here on out as fellow girls bands of the same generation ❤️‍🔥
      
      Photo by 
      @shohnophoto
