- postx:
    id: 2062916920106734040
    account: natsu08_guitar
    label: Thank you
    published-date: 2026-06-05
    text: |-
      "TSUYOKAWA"
      
      最強に楽しかった!セブンス・ベガとのツーマン✌🏻✌🏻
      初京都ライブ、たくさん盛り上がってくれて嬉しかった！！
      また京都でライブできるよう、そしてセブンス・ベガともまた対バンできるよう頑張るぞー！
      私たちもベガも明日のサカスプ出るのでまたよろしくお願いします！！
      
      alt:
      フォールドっ🤍
    translation: |-
      "TSUYOKAWA"
      
      It was the absolute most fun! Two-man live with Seventh Vega ✌🏻✌🏻
      Our first-ever Kyoto live, I was so happy everyone hyped it up so much!!
      We'll do our best so we can perform in Kyoto again, and also do another joint gig with Seventh Vega!
      Both we and Vega are performing at Sakae Spree tomorrow, so we look forward to seeing you there too!!
      
      alt:
      Fold-eddd 🤍
