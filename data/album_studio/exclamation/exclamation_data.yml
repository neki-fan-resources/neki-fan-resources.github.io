- postx:
    id: 1816361609968992605
    account: vvshibuyaudgw
    label: Visiting the store
    published-date: 2024-07-25
    text: |-
      昨日『EXCLAMAT!ON』をリリースされたばかりのNEK!の皆様が御来店下さいました💥
      
      直筆POPを書いて頂いたのでご購入の方には先着でお渡しさせて頂きます🤲
      
      無くなり次第終了ですのでお早めにどうぞ💨
    translation: |-
      The members of NEK!, who just released "EXCLAMAT!ON" yesterday, visited our store💥
      
      They wrote handwritten POPs for us, which we will give to those who purchase on a first-come, first-served basis🤲
      
      It will end once they run out, so please hurry💨
