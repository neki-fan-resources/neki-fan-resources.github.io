- postx:
    id: 1915596660648141313
    account: natsu08_guitar
    label: 1 year since MV release
    published-date: 2025-04-25
    text: |-
      改めまして！
      Get Over リリースから1年経ちました！
      この曲で多くの人がNEK!を知ってくださった気がします❤️‍🔥
      
      そして再生回数40万回ありがとうございます！
      リリース当初は10万回達成がまず夢の話だと思っていました…感謝でいっぱいです🙇🏻‍♀️
      これからもよろしくね🫶🏻
      
      MV撮影時のかなでんでてきたかわい
    translation: |-
      Once again!
      It’s been one year since the release of "Get Over"!
      I feel like this is the song that helped so many people discover NEK!❤️‍🔥
      
      Also, thank you for 400,000 views!
      When it was first released, reaching 100,000 felt like a distant dream... I’m filled with gratitude🙇🏻‍♀️
      Please keep supporting us 🫶🏻
      
      Found a clip of Kanaden during the MV shoot—so cute
