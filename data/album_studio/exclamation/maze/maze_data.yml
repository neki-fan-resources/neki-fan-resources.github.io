- postinstagram:
    id: C-Pr8M_xX_H
    account: cocoro_drum
    label: Behind the scenes report
    published-date: 2024-08-04
    text: |-
      "MAZE" MusicVideo 5万回再生ありがとうっ！
      ということで、、ゆるっとお約束していたオフショット公開✨
      
      ここのお家めちゃめちゃ可愛かった〜！！まさかキッチンでバスケのユニフォームを着ながらドラムを叩く日が来るとは思ってなかったけど笑、衣装の青と白にキッチンの壁の色がマッチしててとても素敵でした🍴🩵
      
      4~6枚目と最後の動画はGt.のなっちゃんが撮ってくれた📷💛
      いつもより高めにしてるポニテと、触覚を顔に貼り付けて動かないようにしてるのをなっちゃんに説明してます笑
      
      それぞれの特性がギュッと詰まったMAZE、これからもたくさんの人に愛されてほしいです！！
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #maze
    translation: |-
      "MAZE" Music Video reached 50,000 views, thank you!
      So,, here are the behind-the-scenes shots I promised✨
      
      This house was so incredibly cute~!! I never thought the day would come when I'd be playing drums in a kitchen while wearing a basketball uniform lol, but the blue and white of the outfit matched the color of the kitchen walls perfectly and looked so lovely🍴🩵
      
      Photos 4-6 and the last video were taken by our Gt. Nacchan📷💛
      I'm explaining to Nacchan how my ponytail is higher than usual and how I have my side bangs taped to my face so they don't move lol
      
      MAZE is packed with each of our personalities, so I hope it continues to be loved by many people!!
      
      #neki #neki_band #girlsband #drum #drummer #girldrummer #femaledrummer #maze
      W
