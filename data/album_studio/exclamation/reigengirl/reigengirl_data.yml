    text: |-
      ついに私もGoProデビューしたよー🌟
      
      Washburnのヘッドが小さすぎてつけられるかなぁと思ったけどさすがのグリップ力でつけられた🎸📹
      ライブで付けたら躍動感すごそう❤️‍🔥
      
      #ネキ界隈 #拡散中 #NEKI
