      I've finally made my GoPro debut! 🌟
      
      I wondered if it would fit since the Washburn head is so small, but it worked thanks to that amazing grip strength 🎸📹
      The sense of dynamism is going to be incredible if I wear it during a live show ❤️‍🔥
      
      #NEKI_Community #SpreadingTheWord #NEK!
