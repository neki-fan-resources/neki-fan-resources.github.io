- lyrics:
    id: main
    song: flick
    part-of:
      song: flick
    status:
      code: warning
      description: Data copied from the sources. Not fully reviewed.
    languages:
    - id: ol
      name: original lyrics
      details: (from the YouTube Official Music Video subtitles)
      active: true
      fixed: true
      no-translation: true
      source:
        description: from the YouTube Official Music Video subtitles
        url: 'https://www.youtube.com/watch?v=yP7PhWiGtb0'
    - id: en
      name: english translation
      details: (from the YouTube Official Music Video subtitles)
      active: true
      source:
        description: from the YouTube Official Music Video subtitles
        url: 'https://www.youtube.com/watch?v=yP7PhWiGtb0'
    sections:
    - lines:
      - ol:
        - 曖昧 インプレばっかじゃん
        en:
        - Nothing but vague impressions everywhere
      - ol:
        - 全然 満たされないんじゃない？
        en:
        - Are you really feeling satisfied at all?
      - ol:
        - SOS 必要ないことばっかり シャットダウン
        en:
        - SOS, too much useless noise around us Shut it down
    - lines:
      - ol:
        - 顔も知らない匿名アイコン
        en:
        - Anonymous icons, faces never shown
      - ol:
        - そのいいねが宝物なんです
        en:
        - Those little likes have become our treasure
      - ol:
        - ブラックアウト 万バズった
        en:
        - Blackout, went viral overnight
      - ol:
        - 切り取ったシーン
        en:
        - Just a snapshot of a scene
    - lines:
      - ol:
        - 誰かの言葉 真似るだけ？
        en:
        - Are you only copying someone else's words?
      - ol:
        - そがんあんたいっちょん好かん！
        en:
        - I can't stand people like that!
    - lines:
      - ol:
        - ねぇねぇ、ちょっと待って！映えてんじゃん？
        en:
        - Hey, hey, wait a second! Doesn't this look amazing?
      - ol:
        - スワイプなんてやだ！聴いてってよ！
        en:
        - Don't just swipe away, stay and hear us out!
      - ol:
        - 歪んだまんまの世界で
        en:
        - In this distorted world we're living in
      - ol:
        - 面食らっちゃいれないね
        en:
        - There's no time to stand around stunned
      - ol:
        - 文字数制限のない
        en:
        - We're more than words with a character limit
      - ol:
        - プレミアムな私たちで
        en:
        - We're the premium version of ourselves
      - ol:
        - You Raise Me Up!
      - ol:
        - Break Me Out!!!!
    - lines:
      - ol:
        - 大体 正解なんてない
        en:
        - Most of the time, there's no such thing as a right answer
      - ol:
        - AI だって無敵じゃない
        en:
        - Even AI isn't invincible
      - ol:
        - 窒息しちゃう 白い世界
        en:
        - I'm suffocating in this colorless world
      - ol:
        - 数字 羅列 デジタライズ
        en:
        - Numbers, data, digitized lives
    - lines:
      - ol:
        - 画面越しじゃわかんないミッドナイト
        en:
        - You can't understand through a screen at midnight
      - ol:
        - かき鳴らしてくオーバードライブ
        en:
        - So crank it up into overdrive
      - ol:
        - シャットアウト ノイズ消して
        en:
        - Shut out the noise
      - ol:
        - 目が合った合図
        en:
        - That's the signal when our eyes meet
    - lines:
      - ol:
        - ねぇねぇ、こっちみて！映えてんじゃん？
        en:
        - Hey, hey, look over here! Doesn't this look amazing?
      - ol:
        - こっち向いてほい！あいこでいこう！
        en:
        - Come on, turn around—let's do this together!
      - ol:
        - 弾んでくような初動で
        en:
        - With a spark that's ready to take off
      - ol:
        - ぶっ飛んでかなきゃいけないね
        en:
        - We've gotta blast beyond the limits
      - ol:
        - 文字数制限のない
        en:
        - We're more than words with a character limit
      - ol:
        - プレミアムな私たちで
        en:
        - We're the premium version of ourselves
      - ol:
        - You Raise Me Up!
      - ol:
        - Break Me Out!!!!
    - lines:
      - ol:
        - 陰キャ陽キャ タグ付け アクション
        en:
        - Introvert, extrovert, labels and actions
      - ol:
        - タイムライン ウザか...
        en:
        - This timeline's getting so annoying...
      - ol:
        - ゾンビ bot 詐欺 ノーリアクション
        en:
        - Zombies, bots, scams, no reaction
      - ol:
        - FLiCK! FLiCK! FLiCK! FLiCK! NO MORE FLiCK?
    - lines:
      - ol:
        - 混沌 リーチ 無理 顔ないっしょ
        en:
        - Chaos, reach, impossible—who even knows your face?
      - ol:
        - 絶体絶命ばい！
        en:
        - We're at the breaking point!
      - ol:
        - 通知 連打 いいね リアクション
        en:
        - Notifications, tapping, likes, reactions
      - ol:
        - FLiCK! FLiCK! FLiCK! FLiCK! NO MORE FLiCK?
    - lines:
      - ol:
        - この鼓動 かき鳴らして
        en:
        - I'll strum this heartbeat loud and clear
      - ol:
        - あなたに届けてくから
        en:
        - And send it straight to you
    - lines:
      - ol:
        - ねぇ……ちょっと待って！映えてんじゃん！
        en:
        - Hey... wait a second! Doesn't this look amazing?
      - ol:
        - こんなんじゃまだまだ足んないよ
        en:
        - This is nowhere near enough for us yet
      - ol:
        - 歪んだまんまの世界で
        en:
        - In this distorted world we're living in
      - ol:
        - 面食らっちゃいれないね
        en:
        - There's no time to stand around stunned
      - ol:
        - 文字数制限のない
        en:
        - We're more than words with a character limit
      - ol:
        - プレミアムな私たちで
        en:
        - We're the premium version of ourselves
      - ol:
        - You Raise Me Up!
      - ol:
        - Break Me Out!!!!

