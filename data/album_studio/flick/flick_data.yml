    text: |-
      FLiCK Official Music Video 公開しましたー！！
      新しいNEK!が観れたんじゃないでしょうか？！
      ホームパーティー感のあるおしゃれかわいいセットで新衣装に身を包んだ私たちが生き生きとロックを奏でる、最高にハッピーな映像になってます！手振りも楽しかった🕺🏻🎶
      
      ぜひ何度でもお楽しみください！！
      
      alt:
      サングラスお気に入り😎
      
      alt:
      ドラムセットの色も、
      後ろのクッションも全部可愛くてだーいすき🫶🏻
    translation: |-
      The Official Music Video for FLiCK is now out!!
      I bet you got to see a brand new side of NEK!, right?!
      We're dressed in our new outfits on a stylish and cute home party-vibe set, vibrantly playing rock music—making it a super happy video! Doing the hand gestures was so much fun too🕺🏻🎶
      
      Please enjoy it over and over again!!
      
      alt:
      my favorite sunglasses😎
      
      alt:
      The color of the drum kit,
      and the cushions behind me—everything is so cute, I absolutely love it🫶🏻
