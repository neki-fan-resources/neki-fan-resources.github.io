- lyrics:
    id: main
    song: gimmick
    part-of:
      song: gimmick
    status:
      code: warning
      description: Data copied from the sources. Not fully reviewed.
    languages:
    - id: ol
      name: original lyrics
      details: (from the YouTube Official Music Video subtitles)
      active: true
      fixed: true
      no-translation: true
      source:
        description: from the YouTube Official Music Video subtitles
        url: 'https://www.youtube.com/watch?v=js9WXQHa5J0'
    - id: en
      name: english translation
      details: (from the YouTube Official Music Video subtitles)
      active: true
      source:
        description: from the YouTube Official Music Video subtitles
        url: 'https://www.youtube.com/watch?v=js9WXQHa5J0'
    sections:
    - lines:
      - ol:
        - 世界はお芝居だ
      - en:
        - The world is just a stage
      - ol:
        - 皆真剣ごっこ
        en:
        - Everyone's pretending to be serious
      - ol:
        - 始まりはあのシーンからね
        en:
        - It all began with that one scene
      - ol:
        - 何者でもないことを知ったから
        en:
        - I found freedom in knowing I was no one
    - lines:
      - ol:
        - 自由を得られる
        en:
        - That's when I became free
      - ol:
        - それではここまでサヨナラバイバイ
        en:
        - And so, this is goodbye for now
      - ol:
        - スポットライトが眩しい
        en:
        - The spotlight burns bright
      - ol:
        - 絶対的キッカケ
        en:
        - A trigger beyond reason
    - lines:
      - ol:
        - クライマックスへ
        en:
        - Leading to the climax
      - ol:
        - 辻褄合わせ
        en:
        - Trying to make sense of it all
      - ol:
        - 孤独を超え
        en:
        - Beyond loneliness
      - ol:
        - 視聴率は不要
        en:
        - I don't need your ratings
      - ol:
        - 眩し現 見据え
        en:
        - I face the dazzling reality
      - ol:
        - 得られないものがそこにあるんだ
        en:
        - What I can't grasp is right there before me
    - lines:
      - ol:
        - 私の声を聴いて
        en:
        - Listen to my voice
      - ol:
        - まだまだまだ解っちゃいないね
        en:
        - You still don't understand, do you?
      - ol:
        - 普通なんてシナリオ通り
        en:
        - “Normal” is just following the script
      - ol:
        - 全てはまがいもの
        en:
        - Everything's an imitation
    - lines:
      - ol:
        - 世界は残酷だ
        en:
        - The world can be cruel
      - ol:
        - ずっと主役なんて
        en:
        - No one stays the lead forever
      - ol:
        - 即興劇が連なるまま
        en:
        - One improvised act after another
      - ol:
        - ラストシーンはきちんとあるのかな
        en:
        - I wonder if there's a proper final scene
    - lines:
      - ol:
        - めでたしめでたし
        en:
        - Happily ever after, they say
      - ol:
        - ほらもういいかな？バイバイバイバイ
        en:
        - I guess that's enough now—bye, bye, bye, bye
      - ol:
        - ハッピーエンドは確定でヒロイン降臨
        en:
        - Happy end sealed - heroine arrives
      - ol:
        - 全てが明転
        en:
        - The lights fade to black
    - lines:
      - ol:
        - クライマックスへ
        en:
        - Heading toward the climax
      - ol:
        - 辻褄合わせ
        en:
        - Piecing the story together
      - ol:
        - 孤独を超え
        en:
        - Rising beyond solitude
      - ol:
        - 視聴率は不要
        en:
        - I don't need an audience
      - ol:
        - 眩し現 見据え
        en:
        - Eyes fixed on the blinding truth
      - ol:
        - 得られないものがそこにあるんだ
        en:
        - What I can't reach still shines ahead
    - lines:
      - ol:
        - 私の声を聴いて
        en:
        - Hear my voice
      - ol:
        - まだまだまだ解っちゃいないね
        en:
        - You still don't get it
      - ol:
        - 普通なんてシナリオ通り
        en:
        - “Ordinary” is just what's been written
      - ol:
        - 全てはまがいもの
        en:
        - Everything's an imitation
    - lines:
      - ol:
        - クライマックスへ
        en:
        - Leading to the climax
      - ol:
        - 辻褄合わせ
        en:
        - Piecing the story together
      - ol:
        - 孤独を超え
        en:
        - Rising beyond solitude
      - ol:
        - 視聴率は不要
        en:
        - I don't need an audience
      - ol:
        - 眩し現 見据え
        en:
        - Eyes fixed on the blinding truth
      - ol:
        - 得られないものがそこにあるんだ
        en:
        - What I can't reach still shines ahead
    - lines:
      - ol:
        - 私の声を聴いて
        en:
        - Hear my voice
      - ol:
        - まだまだまだ解っちゃいないね
        en:
        - You still don't get it
      - ol:
        - 普通なんてシナリオ通り
        en:
        - “Ordinary” is just what's been written
      - ol:
        - 全部自分がジャッジを下すのよ
        en:
        - I'm the one who makes the final call
    - lines:
      - ol:
        - 何がまがいもの
        en:
        - What's real, and what's a lie?

