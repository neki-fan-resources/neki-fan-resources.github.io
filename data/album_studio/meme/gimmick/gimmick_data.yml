- postinstagram:
    id: DRUpxsqEjn6
    account: natsu08_guitar
    label: Behind the scenes
    published-date: 2025-11-21
    text: |-
      .
      “GiMMiCK”
      MV公開しましたーー！
      いかがでしたでしょうか、、、！！！ﾄﾞｷﾄﾞｷ
      儚さとエモーショナルを感じられる
      どこか切ないけれど力強さも共存した
      最高にかっこいいMVに仕上がっております！🎥
      NEK!の世界観にどっぷり浸かってくださると嬉しいです♡
      
      本当に見どころ満載なのでスマホに穴が空くぐらい観てください！👀
      
      感想もたくさんお待ちしておりますヨォ〜！！
      
      #neki #guitarist #GiMMiCK
    translation: |-
      .
      The “GiMMiCK”
      MV has been releasedーー!
      What did you think of it...!!! *Pitter-patter*
      It feels fleeting and emotional
      It's an incredibly cool MV that is somehow sad yet coexists with strength! 🎥
      I hope you'll fully immerse yourselves in the world of NEK! ♡
      
      It's truly packed with highlights, so watch it until you burn a hole in your phone screen! 👀
      
      We are waiting for lots of your feedback too!!
      
      #neki #guitarist #GiMMiCK
