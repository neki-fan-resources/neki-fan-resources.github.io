- postx:
    id: 1995417595290210659
    account: TOWER_Jrock
    label: Final message from the members
    published-date: 2025-12-01
    text: |-
      【#NEKI× タワレコ】
      
      NEK! SNSコラボ本日最終日💧
      メンバーより締めくくりのメッセージをいただきました✨
      
      コラボポスター掲出や特別レシートのお渡し期間、ポスタープレゼント応募期間は12/8(月)まで！
      https://tower.jp/article/feature_item/2025/10/03/0706
      
      引き続きNEK!をタワーレコードは応援し続けます🔥
      
      (
      @nekiband_jp
      )
    translation: |-
      【#NEKI×TOWERRECORDS】
      
      The NEK! SNS collaboration ends today💧
      We received a final message from the members✨
      
      The period for displaying the collaboration poster, receiving the special receipt, and applying for the poster giveaway is until 12/8 (Mon)!
      https://tower.jp/article/feature_item/2025/10/03/0706
      
      Tower Records will continue to support NEK! 🔥
      
      (
      @nekiband_jp
      )
    video:
    - 01
    part-of:
      event: iwanttostartaband

