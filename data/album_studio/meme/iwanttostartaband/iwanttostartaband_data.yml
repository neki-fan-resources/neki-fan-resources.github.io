- postx:
    id: 1991071615577149847
    account: TOWER_Jrock
    label: Video comment
    published-date: 2025-11-19
    text: |-
      【#NEK! × タワレコ】 
      
      \ 『MEME』リリースまであと1週間 /
      
      SNSコラボ開催中の「ああバンドやりたい！」第13弾アンバサダー #NEK! の皆様からコメント動画をいただきました✨
      
      🔽1stフルアルバム『MEME』ご予約受付中🔽
      https://tower.jp/article/news/2025/11/12/n101
      (
      @nekiband_jp
      )
    translation: |-
      [#NEK! × Tower Records] 
      
      \ 1 Week until the release of 『MEME』 /
      
      We received a comment video from #NEK!, the 13th ambassador of "Ah, I Want to Be in a Band!" whose SNS collaboration is currently running✨
      
      🔽1st Full Album 『MEME』 currently accepting pre-orders🔽
      https://tower.jp/article/news/2025/11/12/n101
      (@nekiband_jp)
    video:
    - 01
    part-of:
      event: iwanttostartaband

- postx:
    id: 1991431325463769517
    account: TOWER_Jrock
    label: Stickers and posters
    published-date: 2025-11-20
    text: |-
      【#NEK! × タワレコ】
      
      11/25(火)～開始のタワーレコード独自企画「ああバンドやりたい!」
      
      ①タワーレコード全店で掲示するコラボポスター
      ②11/26リリース『MEME』購入特典「NEK! コラボ絵柄ステッカー」
      
      NEK!メンバーからご紹介✨
      
      🔽企画詳細はこちら🔽
      https://tower.jp/article/news/2025/11/12/n101
      
      (
      @nekiband_jp
      )
    translation: |-
      【#NEK! × TOWER RECORDS】
      
      Tower Records' original campaign "Ah, I want to be in a band!" starting from 11/25 (Tue)
      
      ① Collaboration poster displayed at all Tower Records stores
      ② Purchase bonus for 'MEME' releasing on 11/26: "NEK! Collaboration design sticker"
      
      Introduced by NEK! members ✨
      
      🔽Details about the campaign here🔽
      https://tower.jp/article/news/2025/11/12/n101
      
      (
      @nekiband_jp
      )
    video:
    - 01
    part-of:
      event: iwanttostartaband

- postx:
    id: 1991816358368330178
    account: TOWER_Jrock
    label: Cocoro's video
    published-date: 2025-11-21
    text: |-
      【#NEK! × タワレコ】
      
         \ 『MEME』フラゲ日まであと4⃣日  /
      
      本日より4日間、NEK!メンバーが1stフルアルバム『MEME』の魅力を語っていきます🔥
      
      本日の担当はDr.Cocoro🥁
      (
      @coco_102
      )
      
      ドラム担当ならではの注目ポイントとは💿
      
      (
      @nekiband_jp
      )
    translation: |-
      [#NEK! x Tower Records]
      
         \ 4 more days until the early release day for "MEME" /
      
      For the next 4 days starting today, NEK! members will be talking about the appeal of their 1st full album "MEME"🔥
      
      Today's person in charge is Dr. Cocoro🥁
      (@coco_102)
      
      What are the points of interest unique to a drummer? 💿
      (@nekiband_jp)
    video:
    - 01
    part-of:
      event: iwanttostartaband

