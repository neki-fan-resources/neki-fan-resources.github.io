- postinstagram:
    id: DS7rDBeEuyK
    account: cocoro_drum
    label: MV released
    published-date: 2025-12-31
    text: |-
      🌞🧡
      ⁡
      "Jumping"Official Music Video公開となりました！！
      ⁡楽曲の雰囲気に合った両足で飛び上がりたくなるくらいカラフルでハッピーな映像になっています！
      
      個人的には、白ホリとカラフルな衣装を身にまとって演奏する私たちのコントラストが印象的でとても好きです🫶🏻
      ⁡
      夜の公園で自由に遊ぶ姿や夜景を見ながら佇んでいるシーンなど今回も見所たくさんなので、ぜひ何回でもお楽しみください🛝🤍
      ⁡
      #NEKI #ネキミーム #drum #femaledrummer
    translation: |-
      🌞🧡
      ⁡
      The "Jumping" Official Music Video has been released!!
      It’s a colorful and happy video that makes you want to jump up with both feet, perfectly matching the mood of the song!
      
      Personally, I really love the contrast of us performing in colorful outfits against the white studio background🫶🏻
      ⁡
      With scenes of us playing freely in a park at night and standing still while looking at the night view, there are plenty of highlights this time too, so please enjoy it over and over again🛝🤍
      ⁡
      #NEKI #NekiMeme #drum #femaledrummer
