    id: 1992921351557202148
    account: natsu08_guitar
    label: 1 day left
    published-date: 2025-11-24
    text: |-
      NEK! 1st Album『MEME』
      フラゲ日まであと1日だよぉぉ！
      明日には私たちのアルバムが届いている人がいるのかと思ったらドキドキワクワクで仕方がないです🫶🏻🫶🏻
