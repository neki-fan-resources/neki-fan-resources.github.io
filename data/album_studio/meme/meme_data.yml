- postinstagram:
    id: DRgxaEHCaWZ
    account: tower_machida
    label: Visiting the store
    published-date: 2025-11-26
    text: |-
      гҖҗNEK!гҖ‘
      
      1stгғ•гғ«гӮўгғ«гғҗгғ гҖҺ#MEMEгҖҸзҷәеЈІж—ҘгҒ®жң¬ж—ҘгҖҒ
      гғЎгғігғҗгғјгҒ®гҒҠдәҢдәәгҒҢгҒ”жқҘеә—вқЈпёҸвңЁ
      
      еұ•й–Ӣе ҙжүҖгҒ«гӮөгӮӨгғігӮ„гӮігғЎгғігғҲгӮ«гғјгғүгҖҒ
      гғқгӮ№гӮҝгғјгӮ’гҒ„гҒҹгҒ гҒҚгҒҫгҒ—гҒҹрҹҷҢрҹҸ»
      
      гҒҠеҝҷгҒ—гҒ„дёӯгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒ—гҒҹвҳәпёҸрҹ’“
      
      з”әз”°еә—е…¬ејҸпјёгҒ§гҒҜгҒҠеҶҷзңҹгӮ’ијүгҒӣгҒҰгҒ„гӮӢгҒ®гҒ§гҖҒ
      гҒ“гҒЎгӮүгӮӮгҒңгҒІгғҒгӮ§гғғгӮҜгҒ—гҒҰгҒҝгҒҰгҒҸгҒ гҒ•гҒ„рҹ‘ҖвңЁ
      рҹ‘үрҹҸ»https://x.com/TOWER_Machida/status/1993590175050744106
      
      1stгғ•гғ«гӮўгғ«гғҗгғ гҖҺMEMEгҖҸ
      вңЁрҹҗұеҘҪи©•зҷәеЈІдёӯрҹҗұвңЁ
      
      гҖҢгҒӮгҒӮгғҗгғігғүгӮ„гӮҠгҒҹгҒ„пјҒгҖҚГ—NEK! гӮӯгғЈгғігғҡгғјгғій–ӢеӮ¬дёӯвқЈпёҸ
      рҹ”—https://tower.jp/article/news/2025/11/12/n101
      
      з”әз”°еә—гҒ§гҒҜгҖҒзҷәеЈІгӮ’иЁҳеҝөгҒ—гҒҰ
      гӮөгӮӨгғіе…ҘгӮҠгғ‘гғҚгғ«еұ•пјҶжҠҪйҒёгғ—гғ¬гӮјгғігғҲгӮӮй–ӢеӮ¬дёӯрҹҺүвңЁ
      
      гҒңгҒІгҒ”жқҘеә—гҒҠеҫ…гҒЎгҒ—гҒҰгҒҠгӮҠгҒҫгҒҷрҹ«¶рҹҸ»рҹ’•
      
      @nekiband_jp 
      #NEKI
    translation: |-
      гҖҗNEK!гҖ‘
      
      Today, the release date of the 1st full album "#MEME",
      the two members visited our storeвқЈпёҸвңЁ
      
      They gave us signatures, comment cards,
      and posters at the display locationрҹҷҢрҹҸ»
      
      Thank you so much for coming during your busy scheduleвҳәпёҸрҹ’“
      
      We have posted photos on the Machida store official X,
      so please be sure to check them out as wellрҹ‘ҖвңЁ
      рҹ‘үрҹҸ»https://x.com/TOWER_Machida/status/1993590175050744106
      
      1st full album "MEME"
      вңЁрҹҗұNow on saleрҹҗұвңЁ
      
      "Ah, I want to start a band!" x NEK! Campaign in progressвқЈпёҸ
      рҹ”—https://tower.jp/article/news/2025/11/12/n101
      
      To celebrate the release, the Machida store is also holding
      a signed panel exhibition & prize lotteryрҹҺүвңЁ
      
      We look forward to your visitрҹ«¶рҹҸ»рҹ’•
      
      @nekiband_jp 
      #NEK!
