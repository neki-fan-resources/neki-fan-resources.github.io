      チョー最高のアルバムになったと胸を張って言えるのでお楽しみに！
    translation: |-
      NEK! 1st Album "MEME"
      Only 1 day left until the early release day!
      The thought that some people will have our album tomorrow makes me so excited and nervous🫶🏻🫶🏻
      Just thinking about which songs you'll like and what kind of reaction you'll give makes me happy
      I can proudly say it turned out to be the absolute best album, so please look forward to it!
