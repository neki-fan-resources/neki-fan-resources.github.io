- postx:
    id: 1993947612781924573
    account: coco_102
    label: NEK! MEME Radio
    published-date: 2025-11-27
    text: |-
      『MEME』の初回盤Bに収録している
      NEK!のミームラジオはもう聴きましたか？？
      
      メンバーのみで録った初のラジオ😂💥
      4人の視点から収録曲についてたくさんお話しているので、聴いていただけたらより深くMEMEがお楽しみいただけると思います！
      
      それぞれのレコーディング秘話も🫢
      
      #NEKI #ネキミーム
    translation: |-
      Included in the First Press Limited Edition B of "MEME"
      Have you listened to NEK! Meme Radio yet??
      
      The first radio show recorded with just the members😂💥
      We talk a lot about the tracks from the 4 members' perspectives, so if you listen, I think you can enjoy MEME even more deeply!
      
      Also, secret stories from each of our recordings🫢
      
      #NEKI #NEKMEME
    image:
    - G6vsyMca0AAl0Ui
    part-of:
      album: meme

