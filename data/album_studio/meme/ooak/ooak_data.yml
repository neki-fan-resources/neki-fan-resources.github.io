- postinstagram:
    id: DLLxx-mh0Bu
    account: cocoro_drum
    label: 10k views, BtS talk
    published-date: 2025-06-22
    text: |-
      🌳🤍
      
      "OOAK" Music Video 1万回再生ありがとう！早すぎ！！
      
      感謝の気持ちを込めて私のお気に入りのカットと、オフショット公開します🫶🏻
      
      撮影日は生憎の雨でしたが、そのお陰でかわいい傘も小道具として使えたし、これから雨の匂いを嗅ぐとこの日の楽しかった記憶が鮮明に蘇りそうで結果ラッキー！楽しい雨の思い出がひとつできました^^
      
      初めて楽器を一切持たずに挑んだ今回のMV。私たちの新境地をこうやってひとつの映像作品として残せたことが何よりも嬉しいです！これからもたくさんの方に届きますように🦋
      
      #neki #neki_band #girlsband #ooak #film
    translation: |-
      🌳🤍
      
      Thank you for 10,000 views on the "OOAK" Music Video! That was so fast!!
      
      To show my gratitude, I'm releasing my favorite cuts and some off-shots🫶🏻
      
      Unfortunately, it was raining on the day of the shoot, but thanks to that, we were able to use cute umbrellas as props, and now whenever I smell rain, the happy memories of this day will probably come back vividly, so in the end, it was lucky! I made a happy rain memory^^
      
      This was our first MV where we took on the challenge without holding any instruments at all. More than anything, I'm happy that we were able to leave behind our new frontier as a piece of visual art like this! I hope it continues to reach many people🦋
      
      #neki #neki_band #girlsband #ooak #film
