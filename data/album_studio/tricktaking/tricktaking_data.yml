      Pre-orders for the 2nd EP "TR!CK TAK!NG" have started!
      
      Pre-orders are also being taken at the venue today after the solo live show ends💿
      
      Those who pre-order will receive a "Dreams!!!!" cover art sticker as a bonus!!
      
      Furthermore, winners of the lottery will receive a solo artist photo poster as a gift🎁
      
      Please be sure to check it out!
      
      #NEKI
