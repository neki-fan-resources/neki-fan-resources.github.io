    published-date: 2024-12-29
    text: |-
      2nd EP「TR!CK TAK!NG」先行予約受付開始！
      
      本日のワンマン終演後にも会場にて先行予約を実施しております💿
      
      ご予約いただいた方には「Dreams!!!!」のジャケットステッカーの特典付！！
      
