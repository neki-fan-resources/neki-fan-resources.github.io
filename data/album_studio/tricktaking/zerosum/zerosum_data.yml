    account: coco_102
    label: zero-sum rehearsal
    published-date: 2025-02-28
    text: |-
      zero-sumでいちばん足が忙しなく動いてるところ🐾
      
      高速4連打が何度も出てくるこのフレーズ、、イントロとBaソロのときにやっているのですが、どうしてもハイハットやスネアの音にかき消されがちなのでぜひバスドラの音にも注目して聴いてみてほしい🥹
      
      来週末の東名阪に向けて最終調整頑張るぞーーー
    translation: |-
      The part in zero-sum where my feet are moving most busily🐾
      
      This phrase where high-speed quadruple hits appear over and over... I'm doing it during the intro and the bass solo, but since it tends to get drowned out by the hi-hat and snare sounds, I'd really like you to try and focus on the kick drum sound while listening 🥹
      
      I'll do my best with final adjustments for the Tokyo-Nagoya-Osaka tour next weekend!
