      д»Ҡж—ҘгҒҜгғүгғ©гғ гҒ®ж—ҘрҹҘҒрҹ’ҡ
      
      гҒ“гҒ®жҘҪеҷЁгҒЁеҮәдјҡгҒ„з§ҒгҒ®дәәз”ҹгҒҜеӨ§гҒҚгҒҸеӨүгӮҸгӮҠгҒҫгҒ—гҒҹгҖӮ
      д»Ҡз§ҒгҒ®е‘ЁгӮҠгҒ«гҒ„гӮӢд»Ій–“гӮӮгҒҝгӮ“гҒӘгҖҒгғүгғ©гғ гӮ’гҒ—гҒҰгҒ„гӮӢгҒӢгӮүгҒ“гҒқеҮәдјҡгҒҲгҒҫгҒ—гҒҹгҖӮ
      
      гҒ“гҒ®жҘҪеҷЁгҒҢз№ӢгҒ’гҒҰгҒҸгӮҢгҒҹз„Ўж•°гҒ®зёҒгӮ’еӨ§еҲҮгҒ«гҖҒгҒ“гӮҢгҒӢгӮүгӮӮгҒ“гҒ®йӯ…еҠӣзҡ„гҒӘгғүгғ©гғ гҒЁгҒ„гҒҶжҘҪеҷЁгҒ«иҰӢеҗҲгҒҶгғүгғ©гғһгғјзӣ®жҢҮгҒ—гҒҰйӮҒйҖІгҒ—гҒҰгҒҫгҒ„гӮҠгҒҫгҒҷрҹ”Ҙ
      
      #гғүгғ©гғ гҒ®ж—Ҙ
    translation: |-
      Today is Drum Day рҹҘҒрҹ’ҡ
      
      My life changed completely after I encountered this instrument.
      All the friends I have around me now, I met precisely because I play the drums.
      
