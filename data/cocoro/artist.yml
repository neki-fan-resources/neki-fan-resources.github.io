    published-date: 2025-04-30
    text: |-
      My spirit resides here.
      
      東名阪のファイナルで撮ってもらった1枚。
      手元の写真今まであんまなかったからお気に入り🫶🏻
      
      スティックが程よい削れ具合なのも割と貴重です笑
      
      #NEKI #拡散中 #ネキ界隈
    translation: |-
      My spirit resides here.
      
      A photo taken at the final show of our Tokyo-Nagoya-Osaka tour.
      I haven't had many photos of my hands until now, so it's a favorite🫶🏻
      
      It's also pretty rare to see the sticks worn down just the right amount lol
      
